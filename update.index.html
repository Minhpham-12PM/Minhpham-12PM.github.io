<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>12PM CLUB</title>
  <style>
    :root{
      --bg:#0a1220;
      --bg-2:#111c2d;
      --panel:#101a2b;
      --panel-2:#162235;
      --panel-3:#0c1524;
      --text:#e5edf8;
      --muted:#94a3b8;
      --line:#26344a;
      --line-soft:#1c2a40;
      --primary:#7c3aed;
      --primary-2:#9333ea;
      --green:#16a34a;
      --green-soft:#0f301d;
      --blue:#2563eb;
      --blue-soft:#102545;
      --pink:#ef9aa7;
      --pink-soft:#3b1e29;
      --yellow:#f59e0b;
      --danger:#ef4444;
      --orange:#ff8a4c;
      --shadow:0 18px 40px rgba(2,8,23,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top,#17263c 0%,#0a1220 45%,#08111d 100%);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif}
    body{min-height:100vh}
    .app-shell{max-width:1720px;margin:0 auto;padding:18px}
    .app-header{display:flex;justify-content:space-between;align-items:center;gap:16px;background:linear-gradient(180deg,#1c2a40,#121c2e);padding:18px 20px;border-radius:28px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.06)}
    .brand{display:flex;align-items:center;gap:16px}
    .brand-badge{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:800;box-shadow:0 14px 32px rgba(49,46,129,.28)}
    .brand-text h1{margin:0;font-size:30px;letter-spacing:.6px;color:#fff}
    .brand-text p{margin:4px 0 0;color:#b6c4da;font-size:14px}
    .header-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:none;border-radius:14px;padding:11px 16px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:var(--shadow)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}
    .btn.secondary{background:#172336;color:#f8fafc;border:1px solid #2c3a51}
    .btn.warn{background:#3b2a0b;color:#facc15;border:1px solid #854d0e}
    .btn.danger{background:#3b1318;color:#fecaca;border:1px solid #7f1d1d}
    .btn.sm{padding:8px 10px;font-size:12px;border-radius:10px;box-shadow:none}
    .btn[disabled]{opacity:.62;cursor:not-allowed;filter:saturate(.55)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 8px;padding:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:24px;backdrop-filter:blur(10px)}
    .workspace-toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0 8px;padding:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);border-radius:24px;backdrop-filter:blur(10px)}
    .workspace-chip{display:flex;align-items:center;gap:8px;padding:6px;border-radius:20px;background:linear-gradient(180deg,#122033,#0f1a2a);border:1px solid #213149;box-shadow:var(--shadow)}
    .workspace-chip.active{background:linear-gradient(180deg,#1c3150,#14253c);border-color:#60a5fa}
    .workspace-main{display:flex;align-items:center;gap:10px;min-width:190px;max-width:260px;padding:12px 16px;border:none;border-radius:16px;background:transparent;color:#e5edf8;font-size:14px;font-weight:900;cursor:pointer;text-align:left}
    .workspace-chip.active .workspace-main{color:#fff}
    .workspace-index{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:rgba(255,255,255,.09);color:#cfe0ff;font-size:12px;font-weight:900;flex:0 0 auto}
    .workspace-title{display:block;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .workspace-edit{width:38px;height:38px;border:none;border-radius:12px;background:#172336;color:#dbe8ff;font-size:16px;font-weight:900;cursor:pointer;border:1px solid #2a3950;flex:0 0 auto}
    .pill-tab{padding:14px 22px;border-radius:18px;background:#172336;border:1px solid #2a3850;font-size:15px;font-weight:800;color:#b7c4d8;cursor:pointer;box-shadow:var(--shadow)}
    .pill-tab.active{background:linear-gradient(180deg,#ffffff,#e8edf8);color:#111827;border-color:#fff}
    .main-card{background:linear-gradient(180deg,#121c2e,#0f1828);border-radius:28px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.06);padding:18px;margin-top:12px}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .section-title h2{margin:0;font-size:21px;color:#fff}
    .muted{color:var(--muted)}
    .note{color:#9db0ca;font-size:13px}
    .grid-2{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:13px;color:#cbd5e1;font-weight:800}
    .field input,.field select,.field textarea{width:100%;border:1px solid #2d3b52;border-radius:14px;padding:11px 12px;font-size:14px;background:#0b1524;color:#f8fafc}
    .field textarea{min-height:210px;resize:vertical;line-height:1.45}
    .sub-card{background:linear-gradient(180deg,#131f31,#101a2c);border:1px solid #243249;border-radius:20px;padding:14px}
    .sub-card h3{margin:0 0 10px;font-size:16px;color:#fff}
    .rows{display:flex;flex-direction:column;gap:10px}
    .mini-table{width:100%;border-collapse:collapse;border:1px solid #2a3950;border-radius:14px;overflow:hidden;background:#0e1727;color:#e5edf8}
    .mini-table th,.mini-table td{border:1px solid #2a3950;padding:8px 10px;font-size:13px;text-align:left;vertical-align:top}
    .mini-table th{background:#172336;color:#f8fafc}
    .summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .summary-box{background:linear-gradient(180deg,#172336,#101a2b);border:1px solid #26364f;border-radius:18px;padding:14px}
    .summary-box .label{font-size:12px;color:#9db0ca;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
    .summary-box .value{font-size:26px;font-weight:900;margin-top:6px;color:#fff}
    .sub-tabs{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:10px;background:rgba(255,255,255,.04);border-radius:24px;border:1px solid rgba(255,255,255,.05)}
    .tab-btn{padding:14px 22px;border-radius:18px;border:1px solid #2a3950;background:#172336;font-size:18px;font-weight:800;cursor:pointer;box-shadow:var(--shadow);color:#c4d0e3}
    .tab-btn.active{background:linear-gradient(180deg,#ffffff,#e8edf8);color:#111827;border-color:#fff}
    .group-board{display:flex;flex-direction:column;gap:16px}
.group-second-row{display:flex;flex-direction:column;gap:16px}
.standing-wrap{overflow:auto;border:1px solid #26364f;border-radius:18px}
    .panel{background:linear-gradient(180deg,#101a2c,#0c1524);border:1px solid #243249;border-radius:22px;padding:14px;color:#e5edf8}
    .panel h3,.panel h4{margin:0 0 10px;color:#fff}
    .standing-table{width:100%;min-width:980px;border-collapse:collapse;border-radius:16px;overflow:hidden;table-layout:fixed}
    .standing-table th,.standing-table td{border:1px solid #2a3950;padding:8px 10px;font-size:12px;text-align:center;color:#e5edf8;white-space:nowrap}
    .standing-table th{background:#172336}
    .standing-table th.rank-col,.standing-table td.rank-col{min-width:76px;width:76px}.standing-table th.stt-col2,.standing-table td.stt-col2{min-width:76px;width:76px}.standing-table th.name,.standing-table td.name{text-align:left;min-width:460px;width:460px;white-space:normal;word-break:break-word;line-height:1.45;font-weight:700}
.standing-table th.stat-col,.standing-table td.stat-col{min-width:74px;width:74px}
    .matrix-wrap{overflow:auto;border:1px solid #2b3950;border-radius:22px;background:#09111d;padding:10px}
    .matrix-table{border-collapse:collapse;min-width:max-content;width:100%}
    .matrix-table th,.matrix-table td{border:1px solid #31435f;font-size:12px;text-align:center;vertical-align:middle;color:#e5edf8}
    .matrix-table th{background:#142136;position:sticky;top:0;z-index:3;font-weight:900;height:48px}
    .matrix-table .stt-head{min-width:54px;left:0;position:sticky;z-index:4;background:#142136}
    .matrix-table .team-head{min-width:340px;text-align:left;left:54px;z-index:4;background:#142136;position:sticky;padding:0 12px}
    .matrix-table .rank-head,.matrix-table .stat-head{min-width:72px;width:72px;background:#142136;font-weight:900}
    .matrix-table .stt-col{position:sticky;left:0;background:#0d1626;z-index:2;width:54px;min-width:54px;font-weight:900}
    .matrix-table .team-col{position:sticky;left:54px;background:#0d1626;text-align:left;z-index:2;min-width:340px;padding:0 12px;font-weight:700;line-height:1.35}
    .matrix-table .rank-col,.matrix-table .stat-col-matrix{width:72px;min-width:72px;background:#0d1626;font-weight:900}
    .matrix-table .pair-head,.matrix-table .pair-cell{width:82px;min-width:82px;height:82px;padding:0}
    .matrix-table .pair-head{font-size:14px}
    .diag-cell{position:relative;background:
      linear-gradient(45deg, transparent calc(50% - 1.2px), #8da2c4 calc(50% - 1.2px), #8da2c4 calc(50% + 1.2px), transparent calc(50% + 1.2px)),
      linear-gradient(-45deg, transparent calc(50% - 1.2px), #8da2c4 calc(50% - 1.2px), #8da2c4 calc(50% + 1.2px), transparent calc(50% + 1.2px)),
      #101a2b}
    .matrix-box{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:6px;gap:4px}
    .matrix-box .mx-main{font-size:18px;font-weight:900;line-height:1;color:#fff}
    .matrix-box .mx-sub{font-size:10px;line-height:1.15;color:#9fb1cb;text-align:center;white-space:normal}
    .diff-pos{color:#4ade80 !important;font-weight:900}
    .diff-neg{color:#ff6b6b !important;font-weight:900}
    .diff-zero{color:#c0cadb !important;font-weight:800}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
    input[type=number]{ -moz-appearance:textfield; appearance:textfield; }
    .match-list{display:flex;flex-direction:column;gap:12px}
    .match-row{display:grid;grid-template-columns:100px 1fr auto auto auto;gap:10px;align-items:center;padding:14px;border:1px solid #273750;border-radius:18px;background:linear-gradient(180deg,#0f1728,#0c1421)}
    .match-row .teams{font-weight:700;line-height:1.4;color:#f8fafc}
    .match-row .teams small{display:block;color:#9fb1cb;font-weight:500}
    .score-inline{display:flex;align-items:center;gap:6px}
    .score-inline input{width:72px;text-align:center;border:1px solid #31435f;border-radius:12px;padding:10px 6px;font-size:20px;font-weight:900;background:#06101d;color:#fff}
    .match-row select,.match-row input[type="time"]{border:1px solid #31435f;border-radius:10px;padding:9px 8px;background:#09111d;color:#fff}
    .badge{display:inline-flex;align-items:center;gap:5px;background:#152238;color:#d5e1f3;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:800}
    .badge.purple{background:#2b1654;color:#dac4ff}
    .badge.green{background:#0f301d;color:#86efac}
    .badge.blue{background:#102545;color:#93c5fd}
    .badge.pink{background:#3b1e29;color:#fecdd3}
    .columns{display:flex;gap:22px;overflow:auto;padding:18px 10px 8px;background:#040b14;border:1px solid #1b2637;border-radius:24px}
    .round-col{min-width:380px;display:flex;flex-direction:column;gap:14px}
    .round-pill{align-self:flex-start;padding:12px 22px;border-radius:999px;font-weight:900;font-size:15px;box-shadow:var(--shadow)}
    .round-pill.blue{background:#163761;color:#d8e8ff}
    .round-pill.pink{background:#472133;color:#ffe2e6}
    .match-card{position:relative;background:linear-gradient(180deg,#0d1523,#09111c);border:1px solid #16253a;border-radius:18px;box-shadow:0 12px 28px rgba(0,0,0,.28);overflow:hidden;color:#eef4ff}
    .match-meta-strip{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,#1fa11d,#148113);color:#fff;padding:8px 12px;font-weight:900;font-size:14px;line-height:1.3}
    .match-meta-strip .dot{display:inline-flex;width:12px;height:12px;border-radius:999px;background:#ff2b2b;box-shadow:0 0 0 3px rgba(255,255,255,.18)}
    .match-card-head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(180deg,#0f1b2c,#0c1624);border-bottom:1px solid #16253a}
    .match-card-body{padding:0}
    .participant{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 14px;border-bottom:1px solid #142133}
    .participant:last-child{border-bottom:none}
    .participant.winner{background:linear-gradient(90deg,rgba(34,197,94,.16),rgba(34,197,94,.05))}
    .participant .pname{font-weight:900;line-height:1.35;color:#f8fafc}
    .participant .psub{font-size:12px;color:#7fb3ff;margin-top:6px}
    .participant .scorebox{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px}
    .participant .scorebox input{width:66px;border:1px solid #26384f;border-radius:12px;padding:10px 6px;text-align:center;font-size:22px;font-weight:900;background:#06101d;color:#fff}
    .card-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;background:#08111d;color:#a7b8cf;font-size:12px;border-top:1px solid #16253a}
    .card-footer.hidden-meta{justify-content:flex-end}
    .tiny{font-size:12px;color:#9db0ca}
    .config-editor{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
    .source-editor{border:1px solid #243249;background:#0f1828;border-radius:18px;padding:12px}
    .source-editor h4{margin:0 0 10px;font-size:14px;color:#fff}
    .source-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .source-grid select{width:100%;border:1px solid #31435f;border-radius:10px;padding:8px 10px;font-size:13px;background:#09111d;color:#fff}
    .overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
    .list-scroll{max-height:460px;overflow:auto;padding-right:4px}
    .compact-card{border:1px solid #243249;border-radius:18px;background:linear-gradient(180deg,#111b2d,#0c1524);padding:12px;margin-bottom:10px;color:#e5edf8}
    .compact-card h4{margin:0 0 8px;font-size:14px;color:#fff}
    .compact-card p{margin:0;font-size:13px;line-height:1.5}
    .svg-panel{overflow:visible;border:none;border-radius:0;background:transparent;padding:0}

    .bracket-toolbar{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .zoom-group{display:inline-flex;align-items:center;gap:8px;background:#0f1828;border:1px solid #243249;border-radius:999px;padding:6px 8px}
    .zoom-btn{width:38px;height:38px;border:none;border-radius:999px;background:#172336;color:#f8fafc;font-size:22px;font-weight:900;cursor:pointer}
    .zoom-value{min-width:72px;text-align:center;font-weight:900;color:#e5edf8}
    .save-btn{border:none;border-radius:999px;padding:10px 16px;background:#172336;color:#f8fafc;font-weight:900;cursor:pointer;border:1px solid #243249}
    .bracket-stage{overflow:auto;border:1px solid #1e2a3c;border-radius:24px;background:#050b14;padding:14px}
    .bracket-scale{display:inline-block;transform-origin:top left}
    .overall-grid{display:grid;grid-template-columns:1fr;gap:16px}
    .bracket-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
    .legend{display:flex;gap:8px;flex-wrap:wrap}
    .status-complete{color:#86efac;background:#0f301d;padding:6px 10px;border-radius:999px;font-weight:900}
    .status-pending{color:#fcd34d;background:#3b2a0b;padding:6px 10px;border-radius:999px;font-weight:900}
    .assign-preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
    .assign-item{padding:10px 12px;border-radius:14px;border:1px solid #243249;background:#0f1828;color:#e5edf8}
    .assign-item strong{display:block;margin-bottom:4px;color:#fff}
    .footer-note{margin-top:10px;color:#9db0ca;font-size:13px}
    .full-name{white-space:normal;word-break:break-word}
    .hide-mobile{display:inline}
    .app-header::after{content:'';display:block;position:absolute;pointer-events:none}
    @media (max-width:1100px){
      .grid-2,.group-board{grid-template-columns:1fr}
      .match-row{grid-template-columns:1fr;align-items:start}
      .match-row .score-inline input{width:86px}
      .round-col{min-width:320px}
    }
    @media (max-width:760px){
      .app-shell{padding:12px}
      .app-header{padding:14px 16px;flex-direction:column;align-items:flex-start}
      .brand-text h1{font-size:26px}
      .toolbar{gap:8px}
      .pill-tab,.tab-btn{padding:12px 14px;font-size:14px}
      .match-card-head{flex-wrap:wrap}
      .participant{grid-template-columns:1fr}
      .participant .scorebox{align-items:flex-start}
      .hide-mobile{display:none}
      .matrix-table .team-head,.matrix-table .team-col{min-width:320px}
      .matrix-table .pair-head,.matrix-table .pair-cell{width:92px;min-width:92px;height:92px}
      .schedule-card{width:290px;max-width:290px;flex-basis:290px}
      .zoom-btn{width:34px;height:34px;font-size:20px}
      .zoom-value{min-width:62px}
    }

    /* v4 schedule/control refinements */
    .match-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,258px));justify-content:flex-start;align-content:flex-start;gap:10px}
    .schedule-card{width:258px;max-width:258px;flex:0 0 258px;background:linear-gradient(180deg,#0c1320,#09101b);border:1px solid #132238;border-radius:16px;box-shadow:0 10px 20px rgba(0,0,0,.26);overflow:hidden}
    .schedule-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:6px 8px;background:linear-gradient(180deg,#141f32,#0f1727);border-bottom:1px solid #16253a}
    .schedule-strip{display:flex;align-items:center;gap:6px;padding:6px 8px;background:linear-gradient(180deg,#1fa11d,#148113);color:#fff;font-size:11px;font-weight:900;line-height:1.2}
    .schedule-strip.complete{background:linear-gradient(180deg,#ff9d5c,#ff7b3d);color:#1b1308}
    .play-icon{display:inline-flex;align-items:center;justify-content:center;width:16px;height:14px;border-radius:4px;background:#ff1f1f;color:#fff;font-size:9px;font-weight:900;flex:0 0 auto}
    .schedule-body{display:flex;flex-direction:column}
    .schedule-player{display:grid;grid-template-columns:minmax(0,1fr) 50px;gap:6px;align-items:center;padding:7px 8px;border-bottom:1px solid #142133}
    .schedule-player:last-child{border-bottom:none}
    .schedule-player.winner{background:linear-gradient(90deg,rgba(34,197,94,.16),rgba(34,197,94,.05))}
    .schedule-player .p-main{min-width:0}
    .schedule-name{font-size:12px;font-weight:900;line-height:1.22;color:#f8fafc;white-space:normal;word-break:break-word}
    .schedule-sub{font-size:10px;color:#7fb3ff;line-height:1.2;margin-top:3px;white-space:normal;word-break:break-word}
    .score-input{width:46px;height:34px;border:1px solid #26384f;border-radius:9px;padding:5px 4px;text-align:center;font-size:16px;font-weight:900;background:#06101d;color:#fff;outline:none}
    .score-input.score-win{color:#4ade80}
    .score-input.score-lose{color:#ef4444}
    .score-input:focus{border-color:#4f8cff;box-shadow:0 0 0 3px rgba(79,140,255,.18)}
    .schedule-editor{display:grid;grid-template-columns:minmax(92px,1fr) 92px auto;gap:6px;align-items:end;padding:7px 8px;background:#08111d;border-top:1px solid #16253a}
    .editor-field{display:flex;flex-direction:column;gap:6px}
    .editor-field label{font-size:10px;color:#9db0ca;font-weight:800;text-transform:uppercase;letter-spacing:.35px}
    .editor-field input,.editor-field select{width:100%;border:1px solid #31435f;border-radius:8px;padding:6px 7px;background:#09111d;color:#fff;font-size:12px}
    .editor-status{display:flex;align-items:center;justify-content:flex-end}
    .columns{display:flex;gap:22px;overflow:auto;padding:18px 12px 14px;background:#040b14;border:1px solid #1b2637;border-radius:24px}
    .round-col{min-width:410px;display:flex;flex-direction:column;gap:16px}
    .round-pill{align-self:flex-start;padding:14px 28px;border-radius:18px;font-weight:900;font-size:18px;min-width:240px;text-align:center;box-shadow:var(--shadow)}
    .round-pill small{display:block;font-size:13px;font-weight:700;opacity:.9;margin-top:3px}

    .draw-wheel-wrap{position:relative;display:grid;place-items:center;min-height:520px;border-radius:18px;border:1px solid #16283d;background:radial-gradient(circle at 50% 40%,rgba(59,130,246,.12),rgba(8,16,26,.96) 64%);overflow:hidden;isolation:isolate}
    .draw-wheel-wrap::before{content:'';position:absolute;inset:26px;border-radius:999px;border:2px solid rgba(191,219,254,.12);box-shadow:0 0 0 18px rgba(29,78,216,.06)}
    .draw-wheel-glow{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(34,211,238,.18),rgba(8,16,26,0) 58%);opacity:.4;transition:opacity .25s ease, transform .25s ease}

    .draw-wheel-pointer{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:34px solid #ef4444;filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));z-index:3}

    .draw-wheel-spark{position:absolute;left:50%;top:50%;width:10px;height:24px;border-radius:999px;opacity:0;transform:translate(-50%,-50%) rotate(0deg);animation:drawWheelSpark 1.1s cubic-bezier(.18,.82,.24,1) forwards;filter:drop-shadow(0 0 12px rgba(255,255,255,.28))}
    .draw-wheel-wrap.burst::after{content:'';position:absolute;inset:18px;border-radius:999px;border:2px solid rgba(250,204,21,.36);animation:drawWheelPulse .55s ease-out}
    @keyframes drawWheelGlow{0%{filter:blur(0px)}100%{filter:blur(8px)}}

    @keyframes drawWheelSpark{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(0deg)}12%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.05) rotate(var(--rot))}}

    .draw-win-confetti{position:absolute;left:50%;top:50%;width:12px;height:18px;border-radius:4px;opacity:0;transform:translate(-50%,-50%) rotate(0deg);pointer-events:none;animation:drawWinConfetti 1.7s cubic-bezier(.16,.82,.3,1) forwards}
    @keyframes drawWinOverlayFade{from{opacity:0}to{opacity:1}}

    @keyframes drawWinConfetti{0%{opacity:0;transform:translate(-50%,-50%) scale(.45) rotate(0deg)}10%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(1)}}

    const ADMIN_PASSWORD_DEFAULT = 'Admin3011';
    const ACCESS_MODE_SESSION_KEY = STORAGE_KEY + '-access-mode-session';
    const ACCESS_MODE_PERSIST_KEY = STORAGE_KEY + '-access-mode-persist';
    const ACCESS_ALLOWED_VIEW_TABS = new Set(['setup','roster','groups','control','bracket']);
    let accessState = {
      modeChosen: false,
      mode: '',
      authenticated: false,
      error: '',
      allowProfiles: true,
      lastAttemptAt: 0
    };

    function isAdminMode(){
      return !!(accessState && accessState.modeChosen && accessState.mode === 'admin' && accessState.authenticated);
    }

    function isViewerMode(){
      return !!(accessState && accessState.modeChosen && accessState.mode === 'viewer');
    }

    function shouldBlockPersistence(){
      return false;
    }

    function getAdminPassword(){
      const stored = tryLoadJsonFromStorage([ACCESS_MODE_SESSION_KEY + '-password']);
      const value = typeof stored === 'string' ? stored.trim() : '';
      return value || ADMIN_PASSWORD_DEFAULT;
    }

    function clearAccessError(){
      if(accessState) accessState.error = '';
      const input = document.getElementById('adminPasswordInput');
      if(input) input.value = '';
    }

    function enterViewerMode(reason = ''){
      accessState.modeChosen = true;
      accessState.mode = 'viewer';
      accessState.authenticated = false;
      accessState.error = String(reason || '');
      try{ sessionStorage.setItem(ACCESS_MODE_SESSION_KEY, 'viewer'); }catch(err){ console.warn(err); }
      try{ saveJsonToStorage([ACCESS_MODE_PERSIST_KEY], 'viewer'); }catch(err){ console.warn(err); }
      renderApp();
    }

    function enterAdminMode(password){
      const expected = getAdminPassword();
      const provided = String(password || '').trim();
      if(provided && provided === expected){
        accessState.modeChosen = true;
        accessState.mode = 'admin';
        accessState.authenticated = true;
        accessState.error = '';
        try{ sessionStorage.setItem(ACCESS_MODE_SESSION_KEY, 'admin'); }catch(err){ console.warn(err); }
        try{ saveJsonToStorage([ACCESS_MODE_PERSIST_KEY], 'admin'); }catch(err){ console.warn(err); }
        renderApp();
        return true;
      }
      accessState.modeChosen = true;
      accessState.mode = 'viewer';
      accessState.authenticated = false;
      accessState.lastAttemptAt = Date.now();
      accessState.error = 'Sai mật khẩu ADMIN. Hệ thống đã tự chuyển về chế độ CHỈ XEM.';
      try{ sessionStorage.setItem(ACCESS_MODE_SESSION_KEY, 'viewer'); }catch(err){ console.warn(err); }
      try{ saveJsonToStorage([ACCESS_MODE_PERSIST_KEY], 'viewer'); }catch(err){ console.warn(err); }
      renderApp();
      try{ alert('Sai mật khẩu ADMIN. Hệ thống đã tự chuyển về chế độ CHỈ XEM.'); }catch(err){ console.warn(err); }
      return false;
    }

    function submitAdminAccess(){
      const input = document.getElementById('adminPasswordInput');
      const password = input ? input.value : '';
      return enterAdminMode(password);
    }

    function resetAccessChoice(){
      accessState.modeChosen = false;
      accessState.mode = '';
      accessState.authenticated = false;
      accessState.error = '';
      try{ sessionStorage.removeItem(ACCESS_MODE_SESSION_KEY); }catch(err){ console.warn(err); }
      try{ getStorageAreas().forEach(area => area.removeItem(ACCESS_MODE_PERSIST_KEY)); }catch(err){ console.warn(err); }
      renderApp();
    }

    function hydrateAccessModePersistent(){
      try{
        const sessionMode = (() => { try{ return sessionStorage.getItem(ACCESS_MODE_SESSION_KEY) || ''; }catch(err){ console.warn(err); return ''; } })();
        if(sessionMode === 'viewer'){
          accessState.modeChosen = true;
          accessState.mode = 'viewer';
          accessState.authenticated = false;
          accessState.error = '';
          return true;
        }
        const persistedMode = String(tryLoadJsonFromStorage([ACCESS_MODE_PERSIST_KEY]) || '').trim();
        if(persistedMode === 'viewer'){
          accessState.modeChosen = true;
          accessState.mode = 'viewer';
          accessState.authenticated = false;
          accessState.error = '';
          try{ sessionStorage.setItem(ACCESS_MODE_SESSION_KEY, 'viewer'); }catch(err){ console.warn(err); }
          return true;
        }
      }catch(err){
        console.warn('hydrateAccessModePersistent failed', err);
      }
      return false;
    }

    function requireAdminAccess(actionLabel = 'Thao tác này'){
      if(isAdminMode()) return true;

    function renderAccessChooser(){
      return `

    function applyViewerReadOnlyUi(root){
      if(!root || !isViewerMode()) return;
      const mainCard = root.querySelector('.main-card');

      root.querySelectorAll('.workspace-edit').forEach(el => el.classList.add('viewer-hidden'));
      const actionPatterns = /(applySetup|resetTournament|savePermanentSystemState|chooseLocalJsonAutoSaveFile|writeNowToLocalJsonAutoSaveFile|exportSystemDataToFile|openSystemDataImportPicker|handleSystemDataImportInput|commitGroupScore|commitBracketScore|setMatchCourt|setMatchTimeOverride|setMatchOverride|updateSetting|setGroupCount|setBranchCount|setGroupSize|setGroupQualifier|setGroupName|setGroupMatchPrefix|setGroupMatchCodePlan|setGroupsPerBranch|autoBalanceBranches|handleRosterInput|importRosterFile|applyRosterToTournament|togglePlayerProfileEdit|savePlayerProfileEdits|rosterPatchAddImportedPlayer|rosterPatchAddEmptyRow|rosterPatchClearEmptyRows|rosterPatchApplyPaste|rosterPatchImportTextFile|rosterPatchUpdateRowField|rosterPatchRemoveRegisterRow|rosterPatchApplyRosterToTournament|rosterPatchLoadDrawPool|rosterPatchDrawSpin|rosterPatchResetDraw|rosterPatchImportDrawFile|hardResetDisplayCache|setApplySetupButtonsBusy|saveBracketImage|rosterPatchAddScorePoolRow|rosterPatchDeleteScorePoolRow|rosterPatchTransferRedToOfficial|rosterPatchUpdateScorePoolCell)/i;
      root.querySelectorAll('button').forEach(btn => {
        const onclick = String(btn.getAttribute('onclick') || '');
        if(actionPatterns.test(onclick) || btn.matches('[data-admin-only="1"]')){
          btn.disabled = true;
          btn.classList.add('viewer-hidden');
        }
      });
      root.querySelectorAll('input, textarea, select').forEach(control => {

        control.disabled = true;
        control.readOnly = true;
      });

    function saveJsonToStorage(keys, value){
      const list = Array.isArray(keys) ? keys : [keys];
      const payload = JSON.stringify(value);
      const areas = getStorageAreas();
      let wrote = 0;
      for(const storageArea of areas){
        for(const key of list){
          if(!key) continue;
          try{
            storageArea.setItem(key, payload);
            wrote++;
          }catch(err){
            console.warn('Storage save failed', key, err);
          }
        }
      }
      return wrote > 0;
    }

    function saveJsonToStorageVerified(keys, value){
      const list = Array.isArray(keys) ? keys : [keys];
      const payload = JSON.stringify(value);
      const areas = getStorageAreas();
      let verified = 0;
      for(const storageArea of areas){
        for(const key of list){
          if(!key) continue;
          try{
            storageArea.setItem(key, payload);
            if(storageArea.getItem(key) === payload) verified++;
          }catch(err){
            console.warn('Storage verified save failed', key, err);
          }
        }
      }
      return verified > 0;
    }

    function normalizeShellEnvelope(raw, fallbackSavedAt = 0){
      if(!raw || typeof raw !== 'object') return null;
      if(raw.shellState && typeof raw.shellState === 'object'){
        return {
          savedAt: Number(raw.savedAt || raw.meta?.savedAt || fallbackSavedAt || 0) || 0,
          shellState: raw.shellState,
          version: Number(raw.version || 0) || 0
        };
      }
      if(raw.workspaces || raw.settings){
        return {
          savedAt: Number(fallbackSavedAt || 0) || 0,
          shellState: raw,
          version: 0
        };
      }
      return null;
    }

    function loadBestShellEnvelopeFromStorage(){
      try{
        const legacyMeta = tryLoadJsonFromStorage([STORAGE_META_KEY]) || {};
        const fallbackSavedAt = Number(legacyMeta?.savedAt || 0) || 0;
        const keys = [STORAGE_MANUAL_SAVE_KEY, STORAGE_MANUAL_SAVE_BACKUP_KEY, STORAGE_PERMA_MAIN_KEY, STORAGE_PERMA_MAIN_BACKUP_KEY, STORAGE_KEY, STORAGE_KEY_BACKUP, STORAGE_KEY_SNAPSHOT, ...STORAGE_ARCHIVE_KEYS];
        const areas = getStorageAreas();
        const candidates = [];
        for(const storageArea of areas){
          for(const key of keys){
            if(!key) continue;
            try{
              const raw = storageArea.getItem(key);
              if(!raw) continue;
              const parsed = JSON.parse(raw);
              const envelope = normalizeShellEnvelope(parsed, fallbackSavedAt);
              if(envelope && envelope.shellState) candidates.push({ ...envelope, key });
            }catch(err){
              console.warn('Shell envelope parse failed', key, err);
            }
          }
        }
        if(!candidates.length) return null;
        candidates.sort((a,b) => {
          const diff = (Number(b.savedAt || 0) - Number(a.savedAt || 0));
          if(diff) return diff;
          const rankForKey = key => {
            const value = String(key || '');
            if(value.includes('manual-save-main')) return 3;
            if(value.includes('perma-main')) return 2;
            if(value.includes('boot-snapshot')) return 1;
            return 0;
          };
          return rankForKey(b.key) - rankForKey(a.key);
        });
        return candidates[0];
      }catch(err){
        console.warn('loadBestShellEnvelopeFromStorage failed', err);
        return null;
      }
    }

    function saveJsonToRotatingArchive(keys, value, trackerName){
      const list = Array.isArray(keys) ? keys.filter(Boolean) : [keys].filter(Boolean);

      const areas = getStorageAreas();
      try{
        const archiveIndex = trackerName === 'red' ? redArchiveRotateIndex : archiveRotateIndex;
        const key = list[archiveIndex % list.length];
        if(trackerName === 'red') redArchiveRotateIndex = (redArchiveRotateIndex + 1) % list.length;
        else archiveRotateIndex = (archiveRotateIndex + 1) % list.length;
        areas.forEach(storageArea => {
          try{
            storageArea.setItem(key, payload);
          }catch(err){
            console.warn('Archive save failed', key, err);
          }
        });
      }catch(err){
        console.warn('Archive save failed', err);
      }
      return true;
    }

    function getVaultDb(){
      if(vaultDbPromise) return vaultDbPromise;
      vaultDbPromise = new Promise(resolve => {
        try{
          if(!window.indexedDB){ resolve(null); return; }
          const request = window.indexedDB.open(STORAGE_VAULT_DB, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if(!db.objectStoreNames.contains(STORAGE_VAULT_STORE)) db.createObjectStore(STORAGE_VAULT_STORE);
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => {
            console.warn('Vault DB open failed', request.error);
            resolve(null);
          };
        }catch(err){
          console.warn('Vault DB init failed', err);
          resolve(null);
        }
      });
      return vaultDbPromise;
    }

    function saveJsonToVault(key, value){
      return getVaultDb().then(db => new Promise(resolve => {
        if(!db){ resolve(false); return; }
        try{
          const tx = db.transaction(STORAGE_VAULT_STORE, 'readwrite');
          tx.objectStore(STORAGE_VAULT_STORE).put({ key, value, savedAt: Date.now() }, key);
          tx.oncomplete = () => resolve(true);
          tx.onerror = () => { console.warn('Vault save failed', key, tx.error); resolve(false); };
          tx.onabort = () => resolve(false);
        }catch(err){
          console.warn('Vault save failed', key, err);
          resolve(false);
        }
      }));
    }

    function loadJsonFromVault(key){
      return getVaultDb().then(db => new Promise(resolve => {
        if(!db){ resolve(null); return; }
        try{
          const tx = db.transaction(STORAGE_VAULT_STORE, 'readonly');
          const request = tx.objectStore(STORAGE_VAULT_STORE).get(key);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => {
            console.warn('Vault load failed', key, request.error);
            resolve(null);
          };
        }catch(err){
          console.warn('Vault load failed', key, err);
          resolve(null);
        }
      }));
    }

    function queueImmediatePersist(reason = ''){
      const why = String(reason || 'immediate');
      if(immediatePersistBusy){
        immediatePersistQueuedReason = why;
        return false;
      }
      immediatePersistBusy = true;
      let saved = false;
      try{
        let activeReason = why;
        do{
          immediatePersistQueuedReason = '';
          persistFocusedField(activeReason);
          forcePersistAll({ localJsonReason: activeReason });
          saved = true;
          activeReason = immediatePersistQueuedReason;
        }while(activeReason);
        return saved;
      }catch(err){
        console.warn('queueImmediatePersist failed', err);
        return saved;
      }finally{
        immediatePersistBusy = false;
      }
    }

    function isPersistableField(el){
      return !!(el && el.tagName && /^(INPUT|TEXTAREA|SELECT)$/i.test(el.tagName));
    }

    function getElementPersistKey(el){
      try{
        if(!isPersistableField(el)) return '';
        if(el.id) return 'id:' + el.id;
        if(el.name) return 'name:' + el.name;
        const explicitKey = el.getAttribute && el.getAttribute('data-persist-key');
        if(explicitKey) return 'data:' + explicitKey;
        const path = [];
        let node = el;
        while(node && node !== document.body && path.length < 12){
          const parent = node.parentElement;
          if(!parent) break;
          const index = Array.prototype.indexOf.call(parent.children, node);
          path.unshift(node.tagName.toLowerCase() + ':' + index);
          node = parent;
        }
        return path.length ? 'path:' + path.join('/') : '';
      }catch(err){
        console.warn('getElementPersistKey failed', err);
        return '';
      }
    }

    function findElementByPersistKey(key){
      try{
        const raw = String(key || '');
        if(!raw) return null;
        if(raw.startsWith('id:')) return document.getElementById(raw.slice(3));
        if(raw.startsWith('name:')) return document.querySelector('[name="' + CSS.escape(raw.slice(5)) + '"]');
        if(raw.startsWith('data:')) return document.querySelector('[data-persist-key="' + CSS.escape(raw.slice(5)) + '"]');
        if(!raw.startsWith('path:')) return null;
        const segments = raw.slice(5).split('/').filter(Boolean);
        let node = document.body;
        for(const segment of segments){
          const parts = segment.split(':');
          const index = Number(parts[1]);
          if(!node || !node.children || index < 0 || !node.children[index]) return null;
          node = node.children[index];
        }
        return isPersistableField(node) ? node : null;
      }catch(err){
        console.warn('findElementByPersistKey failed', err);
        return null;
      }
    }

    function readPersistableFieldValue(el){
      if(!isPersistableField(el)) return null;
      const type = String(el.type || '').toLowerCase();
      if(type === 'checkbox' || type === 'radio') return { kind: 'checked', value: !!el.checked };
      return { kind: 'value', value: String(el.value ?? '') };
    }

    function writePersistableFieldValue(el, payload){
      if(!isPersistableField(el) || !payload || typeof payload !== 'object') return false;
      const kind = payload.kind || 'value';
      if(kind === 'checked'){
        const next = !!payload.value;
        if(!!el.checked === next) return false;
        el.checked = next;
      } else {
        const next = String(payload.value ?? '');
        if(String(el.value ?? '') === next) return false;
        el.value = next;
      }
      try{ el.dispatchEvent(new Event('input', { bubbles: true })); }catch(err){ console.warn(err); }
      try{ el.dispatchEvent(new Event('change', { bubbles: true })); }catch(err){ console.warn(err); }
      return true;
    }

    function loadLastChanceDraft(){

    function saveLastChanceDraft(draft){
      if(!draft || typeof draft !== 'object') return false;
      const savedAt = Number(draft.savedAt || Date.now()) || Date.now();
      draft.savedAt = savedAt;
      saveJsonToStorage([STORAGE_LAST_CHANCE_KEY, STORAGE_LAST_CHANCE_BACKUP_KEY], draft);
      saveJsonToStorage([STORAGE_LAST_CHANCE_META_KEY], { savedAt, version: 1 });
      return true;
    }

    function getUsableLastChanceDraft(){
      const draft = loadLastChanceDraft();
      if(!draft) return null;
      const savedAt = Number(draft.savedAt || 0);
      if(!savedAt) return null;
      if((Date.now() - savedAt) > LAST_CHANCE_MAX_AGE_MS) return null;
      const localMeta = tryLoadJsonFromStorage([STORAGE_META_KEY]) || {};
      const localSavedAt = Number(localMeta?.savedAt || 0);
      if(savedAt < localSavedAt) return null;
      return draft;
    }

    function persistLastChanceField(el, reason = ''){
      try{
        if(!isPersistableField(el)) return false;
        const key = getElementPersistKey(el);
        const payload = readPersistableFieldValue(el);
        if(!key || !payload) return false;
        const draft = loadLastChanceDraft() || { fields: {} };
        draft.fields = draft.fields && typeof draft.fields === 'object' ? draft.fields : {};
        draft.fields[key] = payload;
        draft.activeKey = key;
        draft.reason = String(reason || '');
        draft.workspaceIndex = Number(shellState?.activeWorkspace || 0);
        draft.ui = {
          mainTab: String(state?.ui?.mainTab || ''),
          controlTab: String(state?.ui?.controlTab || ''),
          groupTab: Number(state?.ui?.groupTab || 1),
          bracketTab: String(state?.ui?.bracketTab || '')
        };
        draft.savedAt = Date.now();
        return saveLastChanceDraft(draft);
      }catch(err){
        console.warn('persistLastChanceField failed', err);
        return false;
      }
    }

    function persistFocusedField(reason = ''){
      try{
        const activeEl = document.activeElement;
        if(isPersistableField(activeEl)) persistLastChanceField(activeEl, reason);
      }catch(err){
        console.warn('persistFocusedField failed', err);
      }
    }

    function hydrateUiFromLastChanceDraft(){
      try{
        const draft = getUsableLastChanceDraft();
        if(!draft) return false;
        let changed = false;
        const draftWorkspace = Math.max(0, Math.min(WORKSPACE_COUNT - 1, Math.floor(Number(draft.workspaceIndex) || shellState.activeWorkspace)));
        if(draftWorkspace !== shellState.activeWorkspace){
          bindStateToShell();
          shellState.activeWorkspace = draftWorkspace;
          state = normalizeState(deepClone(shellState.workspaces[draftWorkspace]?.data || createDefaultState()));
          syncStoredGroupMatchCodes();
          changed = true;
        }
        const ui = draft.ui && typeof draft.ui === 'object' ? draft.ui : {};
        if(ui.mainTab && state.ui.mainTab !== ui.mainTab){ state.ui.mainTab = ui.mainTab; changed = true; }

    function restoreLastChanceDraftToDom(attempt = 0){
      if(lastChanceRestoreTimer){
        clearTimeout(lastChanceRestoreTimer);
        lastChanceRestoreTimer = null;
      }
      try{
        const draft = getUsableLastChanceDraft();
        if(!draft || !draft.fields || typeof draft.fields !== 'object') return false;
        let restoredAny = false;
        let pendingAny = false;
        Object.entries(draft.fields).forEach(([key, payload]) => {
          const el = findElementByPersistKey(key);
          if(!el){
            pendingAny = true;
            return;
          }
          if(writePersistableFieldValue(el, payload)) restoredAny = true;
        });
        if(restoredAny) scheduleAutoSave(0);
        if((pendingAny || !restoredAny) && attempt < 6){
          const waits = [40, 120, 260, 520, 900, 1400, 2000];
          lastChanceRestoreTimer = setTimeout(() => restoreLastChanceDraftToDom(attempt + 1), waits[attempt] || 1200);
        }
        return restoredAny;
      }catch(err){
        console.warn('restoreLastChanceDraftToDom failed', err);
        return false;
      }

    function getGroupMatchPrefix(groupNo){
      const prefix = state?.settings?.groupMatchPrefixes?.[groupNo - 1];

    function getGroupMatchCodePlan(groupNo){

    function parseGroupMatchCodes(plan){
      return String(plan ?? '')
        .split(/\r?\n|,|;|\t/)
        .map(item => String(item ?? '').trim())
        .filter(Boolean);
    }

    function getPresetGroupPairOrder(size){
      const presets = {
        2: [[1,2]],
        3: [[1,2],[2,3],[1,3]],
        4: [[1,4],[2,3],[1,2],[3,4],[1,3],[2,4]],
        5: [[1,4],[2,3],[1,5],[2,4],[3,5],[1,2],[4,5],[1,3],[2,5],[3,4]]
      };
      return presets[size] ? presets[size].map(pair => pair.slice()) : [];
    }

    function getGroupSeedPair(group, match){
      if(!group || !match || !Array.isArray(group.teamIds)) return [0,0];
      const a = group.teamIds.indexOf(match.teamA) + 1;
      const b = group.teamIds.indexOf(match.teamB) + 1;
      if(a < 1 || b < 1) return [0,0];
      return a < b ? [a,b] : [b,a];
    }

    function getGroupPairCodeFromSeeds(seedA, seedB){
      if(!seedA || !seedB) return '';
      return seedA + '-' + seedB;
    }

    function getGroupPairCode(group, match){
      const [seedA, seedB] = getGroupSeedPair(group, match);
      return getGroupPairCodeFromSeeds(seedA, seedB);
    }

    function getOrderedGroupMatches(group){
      if(!group || !Array.isArray(group.matches)) return [];
      const preset = getPresetGroupPairOrder(Number((group.teamIds || []).length || 0));
      if(preset.length){
        const orderMap = new Map(preset.map((pair, idx) => [pair.join('-'), idx]));
        return group.matches.slice().sort((a,b)=> {
          const aKey = getGroupPairCode(group, a);
          const bKey = getGroupPairCode(group, b);
          const aOrder = orderMap.has(aKey) ? orderMap.get(aKey) : Number.MAX_SAFE_INTEGER;
          const bOrder = orderMap.has(bKey) ? orderMap.get(bKey) : Number.MAX_SAFE_INTEGER;
          return aOrder - bOrder || aKey.localeCompare(bKey) || String(a.id || '').localeCompare(String(b.id || ''));
        });
      }
      return group.matches.slice().sort((a,b)=> {
        const aPair = getGroupSeedPair(group, a);
        const bPair = getGroupSeedPair(group, b);
        return aPair[0] - bPair[0] || aPair[1] - bPair[1] || String(a.id || '').localeCompare(String(b.id || ''));
      });
    }

    function buildGroupMatchCodes(groupNo, matchCount){
      const prefix = getGroupMatchPrefix(groupNo);
      const customCodes = parseGroupMatchCodes(getGroupMatchCodePlan(groupNo));
      const codes = [];
      for(let i=0;i<Math.max(0, Number(matchCount) || 0);i++) codes.push(customCodes[i] || (prefix + (i + 1)));
      return codes;
    }

    function syncStoredGroupMatchCodes(){
      if(!state || !state.tournament || !Array.isArray(state.tournament.groups)) return;
      state.tournament.groups.forEach(group => {
        if(!group || !Array.isArray(group.matches)) return;
        group.matches.forEach(match => {
          if(match && match.type === 'group') match.displayCode = getGroupPairCode(group, match);
        });
      });
    }

    function eachTournamentMatch(tournament, callback){
      if(!tournament) return;
      (tournament.groups || []).forEach(group => (group.matches || []).forEach(match => callback(match, 'group', group)));
      (tournament.branches || []).forEach(branch => (branch.rounds || []).forEach(round => (round.matches || []).forEach(match => callback(match, 'branch', branch, round))));
      if(tournament.finals) (tournament.finals.rounds || []).forEach(round => (round.matches || []).forEach(match => callback(match, 'finals', tournament.finals, round)));
    }

    function snapshotTournamentState(tournament){
      const snapshot = { groupPairState:{}, matchState:{} };
      if(!tournament) return snapshot;
      eachTournamentMatch(tournament, (match, type, owner) => {
        const base = {
          scoreA: match.scoreA,
          scoreB: match.scoreB,
          court: match.court,
          timeOverride: match.timeOverride || '',
          overrideA: match.overrideA || '',
          overrideB: match.overrideB || ''
        };
        if(type === 'group'){
          const pairCode = getGroupPairCode(owner, match);
          if(pairCode) snapshot.groupPairState['G' + owner.no + ':' + pairCode] = base;
        } else if(match && match.id){
          snapshot.matchState[match.id] = base;
        }
      });
      return snapshot;
    }

    function applyStoredManualOverridesToSettings(tournament){
      if(!state || !state.settings) return;
      const merged = Object.assign({}, state.settings.manualSourceOverrides || {});
      if(tournament){
        eachTournamentMatch(tournament, (match, type) => {
          if(type === 'group' || !match || !match.id) return;
          const hasOverride = !!((match.overrideA && String(match.overrideA).trim()) || (match.overrideB && String(match.overrideB).trim()));
          if(hasOverride){
            merged[match.id] = { A: match.overrideA || '', B: match.overrideB || '' };
          } else if(merged[match.id]){
            delete merged[match.id];
          }
        });
      }
      state.settings.manualSourceOverrides = merged;
    }

    function restoreTournamentStateFromSnapshot(tournament, snapshot){
      if(!tournament || !snapshot) return;
      eachTournamentMatch(tournament, (match, type, owner) => {
        let source = null;
        if(type === 'group'){
          const pairCode = getGroupPairCode(owner, match);
          source = snapshot.groupPairState['G' + owner.no + ':' + pairCode] || null;
        } else {
          source = snapshot.matchState[match.id] || null;
        }
        if(!source) return;
        match.scoreA = source.scoreA;
        match.scoreB = source.scoreB;
        match.court = source.court;
        match.timeOverride = source.timeOverride || '';
        if(type !== 'group'){
          match.overrideA = source.overrideA || '';
          match.overrideB = source.overrideB || '';
        }
      });
    }

    function applyManualSourceOverridesToTournament(tournament){
      if(!tournament || !state || !state.settings) return;
      const overrides = state.settings.manualSourceOverrides || {};
      eachTournamentMatch(tournament, (match, type) => {
        if(type === 'group' || !match || !match.id) return;
        const entry = overrides[match.id];
        if(!entry || typeof entry !== 'object') return;
        match.overrideA = String(entry.A || '');
        match.overrideB = String(entry.B || '');
      });
    }

    async function writeLocalJsonBundleToChosenFile(handle, bundle){
      if(!handle || typeof handle.createWritable !== 'function') throw new Error('Không tìm thấy file JSON cục bộ để ghi dữ liệu.');
      const writable = await handle.createWritable();

    async function flushLocalJsonAutoSave(reason = 'autosave-local-json'){
      if(!isLocalJsonAutoSaveSupported()) return false;
      const meta = refreshLocalJsonAutoSaveMetaFromStorage();
      if(!meta.enabled || !localJsonAutoSaveFileHandle) return false;
      const why = String(reason || 'autosave-local-json');
      if(localJsonAutoSaveBusy){
        localJsonAutoSaveQueuedReason = why;
        return false;
      }
      localJsonAutoSaveBusy = true;
      let wrote = false;
      try{
        let activeReason = why;
        do{
          localJsonAutoSaveQueuedReason = '';
          const permission = await getLocalJsonAutoSavePermission(false);
          if(permission !== 'granted'){
            saveLocalJsonAutoSaveMeta({
              enabled: true,
              fileName: String(localJsonAutoSaveFileHandle?.name || meta.fileName || ''),
              lastError: 'Chưa được cấp quyền ghi file JSON cục bộ.',
              lastReason: activeReason,
              permission: String(permission || 'prompt')
            });
            return wrote;
          }
          const savedAt = Date.now();
          const bundle = createLocalJsonAutoSaveBundle(savedAt, activeReason);
          await writeLocalJsonBundleToChosenFile(localJsonAutoSaveFileHandle, bundle);
          saveLocalJsonAutoSaveMeta({
            enabled: true,
            fileName: String(localJsonAutoSaveFileHandle?.name || meta.fileName || '12PM_CLUB_TU_DONG.json'),
            lastSavedAt: savedAt,
            lastError: '',

    function svgFitText(x, y, width, text, fontSize=13, fontWeight=800, fill='#f8fafc', anchor='start'){
      const safeWidth = Math.max(18, Number(width) || 18);
      const anchorAttr = anchor !== 'start' ? ` text-anchor="${anchor}"` : '';
      const rawText = String(text ?? '');
      const approxCharWidth = Math.max(5.2, fontSize * 0.58);
      const minFontSize = Math.max(9, Math.round(fontSize * 0.78));
      const estimatedWidth = rawText.length * approxCharWidth;
      let finalFontSize = fontSize;
      if(estimatedWidth > safeWidth){
        finalFontSize = Math.max(minFontSize, Math.floor((safeWidth / Math.max(1, rawText.length)) / 0.58));
      }
      const finalCharWidth = Math.max(4.8, finalFontSize * 0.58);
      const maxChars = Math.max(1, Math.floor(safeWidth / finalCharWidth));
      const displayText = rawText.length <= maxChars ? rawText : (maxChars <= 1 ? rawText.slice(0,1) : rawText.slice(0, maxChars));
      return `<text x="${x}" y="${y}" font-size="${finalFontSize}" font-weight="${fontWeight}" fill="${fill}"${anchorAttr}>${escapeHtml(displayText)}</text>`;
    }
    function toMinutes(hhmm){
      if(!hhmm || !hhmm.includes(':')) return 0;
      const parts = hhmm.split(':').map(Number);
      return (parts[0] || 0) * 60 + (parts[1] || 0);
    }
    function fromMinutes(total){
      const safe = ((total % (24*60)) + 24*60) % (24*60);
      const h = Math.floor(safe / 60);
      const m = safe % 60;
      return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    }
    function nextPowerOfTwo(n){
      let p = 2;
      while(p < Math.max(2,n)) p *= 2;

    function distribute(total, parts){
      const n = Math.max(1, parts);
      const arr = Array(n).fill(Math.floor(total / n));
      for(let i=0;i<total % n;i++) arr[i] += 1;
      return arr;
    }
    function parseRosterText(text){
      return String(text || '')
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const cells = line.split(/\t|,/).map(x => x.trim()).filter(Boolean);
          if(cells.length === 0) return '';
          if(cells.length === 1) return cells[0];
          const filtered = cells[0].match(/^\d+$/) ? cells.slice(1) : cells;
          return filtered.join(' + ');
        })
        .filter(Boolean);
    }

      while((state.settings.groupMatchPrefixes || []).length < n) state.settings.groupMatchPrefixes.push('B' + (state.settings.groupMatchPrefixes.length + 1) + '-T');
      state.settings.groupMatchPrefixes = state.settings.groupMatchPrefixes.slice(0,n).map((prefix, idx) => {

    function applyRosterToTournament(){

      rosterPatchEnsureState();

    function validateSetup(){
      const totalTeams = totalConfiguredTeams();
      if(totalTeams < 2){
        alert('Tổng số đội phải từ 2 trở lên. Hiện tại: ' + totalTeams);
        return false;
      }
      const branchSum = state.settings.groupsPerBranch.reduce((a,b)=>a + (Number(b) || 0), 0);
      if(branchSum !== state.settings.groupCount){
        alert('Tổng số bảng của các nhánh phải bằng số lượng bảng.');
        return false;
      }
      if(state.settings.groupSizes.some(x => Number(x) < 1)){
        alert('Mỗi bảng phải có ít nhất 1 đội.');
        return false;
      }
      return true;
    }

    function applySetup(){
      if(!validateSetup()) return;
      const snapshot = snapshotTournamentState(state.tournament);
      state.tournament = buildTournament();
      restoreTournamentStateFromSnapshot(state.tournament, snapshot);
      applyManualSourceOverridesToTournament(state.tournament);
      assignSchedule(state.tournament);
      state.ui.mainTab = 'groups';
      state.ui.groupTab = 1;
      state.ui.controlTab = 'overview';
      state.ui.bracketTab = state.tournament.branches.length >= 2 ? 'overall' : ('branch-' + ((state.tournament.branches[0] && state.tournament.branches[0].branchNo) || 1));
      saveState();
      renderApp();
    }

    function buildRoundRobinRounds(teamIds){
      const ids = teamIds.slice();
      const hasBye = ids.length % 2 === 1;
      if(hasBye) ids.push(null);
      const arr = ids.slice();
      const rounds = [];
      const roundsCount = arr.length - 1;
      for(let r=0;r<roundsCount;r++){
        const pairs = [];
        for(let i=0;i<arr.length/2;i++){
          const a = arr[i];
          const b = arr[arr.length - 1 - i];
          if(a && b) pairs.push([a,b]);
        }
        rounds.push(pairs);
        const fixed = arr[0];
        const rest = arr.slice(1);
        rest.unshift(rest.pop());
        arr.splice(0, arr.length, fixed, ...rest);
      }
      return rounds;
    }

    function buildDefaultSeedOrder(groupNos){
      const maxQ = Math.max(...groupNos.map(g => state.settings.groupQualifiers[g-1] || 0), 0);
      const buckets = [];
      for(let rank=1; rank<=maxQ; rank++){
        let bucket = groupNos.filter(g => (state.settings.groupQualifiers[g-1] || 0) >= rank).map(g => 'G' + g + '-' + rank);
        if(rank % 2 === 0) bucket = bucket.reverse();
        buckets.push(bucket);
      }
      const maxLen = Math.max(...buckets.map(b => b.length), 0);
      const order = [];
      for(let i=0;i<maxLen;i++){
        for(let b=0;b<buckets.length;b++) if(buckets[b][i]) order.push(buckets[b][i]);
      }
      return order;
    }

    function createKnockout(prefix, label, slotSources, branchNo){
      const slotCount = nextPowerOfTwo(slotSources.length || 2);
      const sources = slotSources.slice();
      while(sources.length < slotCount) sources.push('BYE');
      const rounds = [];
      let matchCount = slotCount / 2;
      for(let roundNo=1; roundNo<=Math.log2(slotCount); roundNo++){
        const matches = [];
        for(let i=1;i<=matchCount;i++){
          const id = prefix + '-R' + roundNo + '-M' + i;
          let baseSourceA = '';
          let baseSourceB = '';
          if(roundNo === 1){
            baseSourceA = sources[(i-1)*2] || 'BYE';
            baseSourceB = sources[(i-1)*2 + 1] || 'BYE';
          } else {
            baseSourceA = 'W:' + rounds[roundNo - 2].matches[(i-1)*2].id;
            baseSourceB = 'W:' + rounds[roundNo - 2].matches[(i-1)*2 + 1].id;
          }
          matches.push({
            id,
            label,
            branchNo,
            roundNo,
            index: i,
            baseSourceA,
            baseSourceB,
            overrideA: '',
            overrideB: '',
            scoreA: '',
            scoreB: '',
            court: null,
            time: '',
            timeOverride: ''
          });
        }
        rounds.push({ roundNo, matches });
        matchCount = matchCount / 2;
      }
      return { prefix, label, branchNo, slotCount, slotSources: sources, rounds };
    }

    function buildTournament(){
      const settings = deepClone(state.settings);
      const roster = parseRosterText(state.rosterText);
      const totalTeams = settings.groupSizes.reduce((a,b)=>a + b, 0);
      const teams = [];
      for(let i=0;i<totalTeams;i++) teams.push({ id: 'T' + (i+1), stt: i+1, name: roster[i] || ('Đội ' + (i+1)) });

      let pointer = 0;
      const groups = [];
      for(let g=1; g<=settings.groupCount; g++){
        const size = settings.groupSizes[g-1];
        const qualifierCount = settings.groupQualifiers[g-1];
        const teamIds = teams.slice(pointer, pointer + size).map(t=>t.id);
        pointer += size;
        teamIds.forEach((id, idx) => {
          const team = teams.find(t => t.id === id);
          team.groupNo = g;
          team.groupSeed = idx + 1;
        });
        const rounds = buildRoundRobinRounds(teamIds);
        const totalMatchCount = rounds.reduce((sum, pairs) => sum + pairs.length, 0);
        const matches = [];
        let displayCounter = 0;
        rounds.forEach((pairs, ridx) => {
          pairs.forEach((pair, midx) => {
            matches.push({
              id: 'G' + g + '-R' + (ridx+1) + '-M' + (midx+1),
              displayCode: getGroupPairCodeFromSeeds(teamIds.indexOf(pair[0]) + 1, teamIds.indexOf(pair[1]) + 1),
              type: 'group',
              groupNo: g,
              roundNo: ridx + 1,
              index: midx + 1,
              teamA: pair[0],
              teamB: pair[1],
              scoreA: '',
              scoreB: '',
              court: null,
              time: '',
              timeOverride: ''
            });
            displayCounter += 1;
          });
        });
        groups.push({ no: g, name: settings.groupNames[g-1] || ('Bảng ' + g), size, qualifierCount, teamIds, matches });
      }

      const branches = [];
      let groupCursor = 1;
      for(let b=1; b<=settings.branchCount; b++){
        const count = settings.groupsPerBranch[b-1] || 0;
        const groupNos = [];
        for(let i=0;i<count;i++) groupNos.push(groupCursor++);
        if(!groupNos.length) continue;
        const slotSources = buildDefaultSeedOrder(groupNos);
        const branch = createKnockout('BR' + b, 'Nhánh ' + b, slotSources, b);
        branch.groupNos = groupNos;
        branch.seedOptions = groupNos.flatMap(g => {
          const q = settings.groupQualifiers[g-1] || 0;
          return Array.from({length:q}, (_,i)=>'G' + g + '-' + (i+1));
        });
        branches.push(branch);
      }

      let finals = null;
      if(branches.length >= 2){
        const branchWinnerSources = branches.map(branch => 'BW' + branch.branchNo);
        finals = createKnockout('FIN', 'Chung kết', branchWinnerSources, 0);
        finals.seedOptions = branchWinnerSources.slice();
      }

      const tournament = { teams, groups, branches, finals };
      assignSchedule(tournament);
      return tournament;
    }

    function assignSchedule(tournament){
      const start = toMinutes(state.settings.startTime);
      const courts = Math.max(1, Number(state.settings.courts) || 1);
      const perMatch = Math.max(1, Number(state.settings.matchMinutes) || 1);
      const queue = [];

      tournament.groups.forEach(group => {
        group.matches
          .slice()
          .sort((a,b)=> a.roundNo - b.roundNo || a.groupNo - b.groupNo || a.index - b.index)
          .forEach(m => queue.push(m));
      });
      tournament.branches.forEach(branch => {
        branch.rounds.forEach(round => round.matches.forEach(m => queue.push(m)));
      });
      if(tournament.finals){
        tournament.finals.rounds.forEach(round => round.matches.forEach(m => queue.push(m)));
      }

      queue.forEach((match, idx) => {
        const slot = Math.floor(idx / courts);
        const autoTime = fromMinutes(start + slot * perMatch);
        match.time = match.timeOverride || autoTime;
        if(!match.court || match.court > courts) match.court = (idx % courts) + 1;
        match.order = idx;
      });
    }

    function getTeamById(teamId){
      return state.tournament.teams.find(t => t.id === teamId);
    }
    function getGroupByNo(groupNo){
      return state.tournament.groups.find(g => g.no === groupNo);
    }
    function getBranchByNo(branchNo){
      return state.tournament.branches.find(b => b.branchNo === branchNo);
    }
    function getBranchChampion(branch){
      if(!branch || !branch.rounds || !branch.rounds.length) return { name:'TBD', subtitle:'', teamId:null };
      const lastRound = branch.rounds[branch.rounds.length - 1];
      return getKnockoutWinner(lastRound.matches[0]) || { name:'Vô địch Nhánh ' + branch.branchNo, subtitle:'Chờ kết quả', teamId:null };
    }
    function getRoundLabel(roundNo){
      return 'Vòng ' + roundNo;
    }
    function getGroupMatchCode(match){
      if(!match) return '';
      if(match.type === 'group'){
        const group = getGroupByNo(match.groupNo);
        const pairCode = getGroupPairCode(group, match);
        return pairCode || match.displayCode || '';
      }
      return match.id || '';
    }
    function isFilledScore(value){ return value !== '' && value !== null && value !== undefined && !Number.isNaN(Number(value)); }
    function isCompleteScore(match){ return isFilledScore(match.scoreA) && isFilledScore(match.scoreB) && Number(match.scoreA) !== Number(match.scoreB); }
    function isGroupComplete(group){ return !!group && group.matches.every(isCompleteScore); }

    function rerenderPreserveView(){
      const scrollX = window.scrollX || 0;
      const scrollY = window.scrollY || 0;
      const scrollers = Array.from(document.querySelectorAll('.columns,.bracket-stage,.matrix-wrap,.standing-wrap,.list-scroll')).map((el, idx) => {
        if(!el.dataset.persistId) el.dataset.persistId = 'persist-' + idx + '-' + Math.random().toString(36).slice(2,8);
        return { id: el.dataset.persistId, left: el.scrollLeft, top: el.scrollTop };
      });
      renderApp();
      requestAnimationFrame(() => {
        window.scrollTo(scrollX, scrollY);
        scrollers.forEach(item => {
          const el = document.querySelector(`[data-persist-id="${item.id}"]`);
          if(el){ el.scrollLeft = item.left; el.scrollTop = item.top; }
        });
      });
    }

    function handleScoreTyping(el){
      const cleaned = String(el.value || '').replace(/[^0-9]/g,'');
      if(el.value !== cleaned) el.value = cleaned;
    }

    function maybeCommitScore(event, el){
      if(event.key === 'Enter'){
        event.preventDefault();
        el.blur();
      }
    }

    function computeGroupRanking(group){
      const rows = group.teamIds.map(id => {
        const team = getTeamById(id);
        return { teamId:id, stt:team.stt, name:team.name, wins:0, losses:0, pf:0, pa:0, diff:0 };
      });
      const rowById = Object.fromEntries(rows.map(r => [r.teamId, r]));
      group.matches.forEach(match => {
        if(!isCompleteScore(match)) return;
        const a = rowById[match.teamA];
        const b = rowById[match.teamB];
        const sa = Number(match.scoreA), sb = Number(match.scoreB);
        a.pf += sa; a.pa += sb; a.diff += sa - sb;
        b.pf += sb; b.pa += sa; b.diff += sb - sa;
        if(sa > sb){ a.wins += 1; b.losses += 1; }
        else { b.wins += 1; a.losses += 1; }
      });
      rows.sort((x,y) => y.wins - x.wins || y.diff - x.diff || y.pf - x.pf || x.stt - y.stt);
      rows.forEach((row, idx)=> row.rank = idx + 1);
      return rows;
    }

    function sourceLabel(source){
      if(!source) return 'Auto';
      if(source === 'BYE') return 'Bye';
      if(/^G\d+-\d+$/.test(source)){
        const parts = source.slice(1).split('-').map(Number);
        return rankLabel(parts[1]) + ' ' + getGroupName(parts[0]);
      }
      if(/^BW\d+$/.test(source)){
        return 'Vô địch Nhánh ' + source.slice(2);
      }
      if(source.startsWith('W:')) return 'Thắng ' + source.slice(2);
      return source;
    }

    function resolveSource(source, visited){
      if(!state.tournament) return { name:'TBD', subtitle:'', teamId:null };
      if(!source) return { name:'TBD', subtitle:'', teamId:null };
      const seen = new Set(visited || []);
      const sourceKey = 'S:' + source;
      if(seen.has(sourceKey)) return { name: sourceLabel(source), subtitle:'Vòng lặp nguồn', teamId:null };
      seen.add(sourceKey);
      if(source === 'BYE') return { name:'Bye', subtitle:'Vắng mặt', teamId:'BYE', bye:true };
      if(/^G\d+-\d+$/.test(source)){
        const parts = source.slice(1).split('-').map(Number);
        const groupNo = parts[0], rank = parts[1];
        const group = getGroupByNo(groupNo);
        if(!group) return { name: sourceLabel(source), subtitle:'', teamId:null };
        if(!isGroupComplete(group)) return { name: sourceLabel(source), subtitle:getGroupName(groupNo) + ' chưa hoàn thành', teamId:null };
        const ranking = computeGroupRanking(group);
        const row = ranking[rank - 1];
        if(row) return { name: row.name, subtitle:'#' + row.stt + ' • ' + sourceLabel(source), teamId: row.teamId, rankSource: sourceLabel(source) };
        return { name: sourceLabel(source), subtitle:'Chưa có xếp hạng', teamId:null };
      }
      if(/^BW\d+$/.test(source)){
        const no = Number(source.slice(2));
        const branch = state.tournament.branches.find(b => b.branchNo === no);
        if(!branch) return { name: sourceLabel(source), subtitle:'', teamId:null };
        const lastRound = branch.rounds[branch.rounds.length - 1];
        const champion = getKnockoutWinner(lastRound.matches[0], seen);
        return champion || { name: sourceLabel(source), subtitle:'Nhánh ' + no + ' chưa xong', teamId:null };
      }
      if(source.startsWith('W:')){
        const matchId = source.slice(2);
        const match = findMatchById(matchId);
        if(!match) return { name: sourceLabel(source), subtitle:'', teamId:null };
        const winner = getKnockoutWinner(match, seen);
        if(winner) return winner;
        return { name: sourceLabel(source), subtitle:'Chờ kết quả', teamId:null };
      }
      return { name: sourceLabel(source), subtitle:'', teamId:null };
    }

    function getRawSource(match, side){
      return (side === 'A' ? match.overrideA || match.baseSourceA : match.overrideB || match.baseSourceB) || '';
    }

    function getDisplayParticipant(match, side, visited){
      const source = getRawSource(match, side);
      return resolveSource(source, visited);
    }

    function getResolvedParticipant(match, side, visited){
      const rawSource = getRawSource(match, side);
      const resolved = getDisplayParticipant(match, side, visited) || {};
      const sourceName = sourceLabel(rawSource);
      let name = String(resolved.name ?? '').trim();
      let subtitle = String(resolved.subtitle ?? '').trim();
      if(!name || name === 'TBD') name = sourceName || 'TBD';
      if(!subtitle && rawSource){
        if(/^G\d+-\d+$/.test(rawSource)){
          const parts = rawSource.slice(1).split('-').map(Number);
          const groupNo = parts[0];
          const group = getGroupByNo(groupNo);
          if(group && !isGroupComplete(group)) subtitle = getGroupName(groupNo) + ' chưa hoàn thành';
        } else if(rawSource.startsWith('W:')){
          subtitle = 'Chờ kết quả';
        } else if(/^BW\d+$/.test(rawSource)){
          const branchNo = Number(rawSource.slice(2));
          const branch = getBranchByNo(branchNo);
          if(branch && !getBranchChampion(branch).teamId) subtitle = 'Nhánh ' + branchNo + ' chưa xong';
        }
      }
      return Object.assign({}, resolved, { source: rawSource, sourceName, name, subtitle });
    }

    function getMatchParticipants(match, visited){
      return {
        a: getResolvedParticipant(match, 'A', visited),
        b: getResolvedParticipant(match, 'B', visited)
      };
    }

    function getMatchHeaderText(match, winner){
      if(winner) return 'Hoàn thành';
      const parts = getMatchParticipants(match);
      const aName = String(parts.a.name || parts.a.sourceName || 'TBD').trim();
      const bName = String(parts.b.name || parts.b.sourceName || 'TBD').trim();
      const timeText = (match.time || '--:--');
      const courtText = 'Sân ' + (match.court || '-');
      return `${aName} vs ${bName} • ${timeText}; ${courtText}`;
    }

    function getKnockoutWinner(match, visited){
      const seen = new Set(visited || []);
      const matchKey = 'M:' + match.id;
      if(seen.has(matchKey)) return null;
      seen.add(matchKey);
      const pa = getDisplayParticipant(match, 'A', seen);
      const pb = getDisplayParticipant(match, 'B', seen);
      if(isCompleteScore(match)) return Number(match.scoreA) > Number(match.scoreB) ? pa : pb;
      return null;
    }

    function findMatchById(matchId){
      if(!state.tournament) return null;
      for(const group of state.tournament.groups){
        const found = group.matches.find(m => m.id === matchId);
        if(found) return found;
      }
      for(const branch of state.tournament.branches){
        for(const round of branch.rounds){
          const found = round.matches.find(m => m.id === matchId);
          if(found) return found;
        }
      }
      if(state.tournament.finals){
        for(const round of state.tournament.finals.rounds){
          const found = round.matches.find(m => m.id === matchId);
          if(found) return found;
        }
      }
      return null;
    }

    function normalizeScoreValue(value){
      const cleaned = String(value ?? '').replace(/[^0-9]/g,'');
      return cleaned === '' ? '' : Math.max(0, Number(cleaned));
    }
    function commitGroupScore(matchId, side, value){
      const match = findMatchById(matchId);
      if(!match) return;
      const normalized = normalizeScoreValue(value);
      if(match['score' + side] === normalized) return;
      match['score' + side] = normalized;
      saveState();
      rerenderPreserveView();
    }
    function setMatchCourt(matchId, value){
      const match = findMatchById(matchId);
      if(!match) return;
      match.court = Number(value) || null;
      saveState();
      rerenderPreserveView();
    }
    function setMatchTimeOverride(matchId, value){
      const match = findMatchById(matchId);
      if(!match) return;
      match.timeOverride = value || '';
      if(match.timeOverride) match.time = match.timeOverride;
      else assignSchedule(state.tournament);
      saveState();
      rerenderPreserveView();
    }
    function refreshManualBracketSetup(){
      if(!state || !state.tournament) return;
      assignSchedule(state.tournament);
      saveState();
      rerenderPreserveView();
    }
    function setMatchOverride(matchId, side, value){
      const match = findMatchById(matchId);
      if(!match) return;
      const nextValue = value || '';
      if(match['override' + side] === nextValue) return;
      match['override' + side] = nextValue;
      applyStoredManualOverridesToSettings(state.tournament);
      refreshManualBracketSetup();
    }
    function commitBracketScore(matchId, side, value){
      const match = findMatchById(matchId);
      if(!match) return;
      const normalized = normalizeScoreValue(value);
      if(match['score' + side] === normalized) return;
      match['score' + side] = normalized;
      saveState();
      rerenderPreserveView();
    }

    function getSetupStats(){
      const totalTeams = totalConfiguredTeams();
      const rrMatches = state.settings.groupSizes.reduce((sum, n) => sum + (n * (n-1) / 2), 0);
      const activeBranches = buildBranchPreview().filter(item => item.groupNos.length > 0);
      const branchKnockoutMatches = activeBranches.reduce((sum, item) => sum + Math.max(0, (item.slotCount || 0) - 1), 0);
      const finalsMatches = activeBranches.length >= 2 ? nextPowerOfTwo(activeBranches.length) - 1 : 0;
      const totalMatches = rrMatches + branchKnockoutMatches + finalsMatches;
      const blocks = Math.ceil(totalMatches / Math.max(1, Number(state.settings.courts) || 1));
      const duration = blocks * Math.max(1, Number(state.settings.matchMinutes) || 1);
      return { totalTeams, rrMatches, branchKnockoutMatches, finalsMatches, totalMatches, endTime: fromMinutes(toMinutes(state.settings.startTime) + duration), duration };
    }

    function buildBranchPreview(){
      let groupCursor = 1;
      const list = [];
      for(let b=1; b<=state.settings.branchCount; b++){
        const count = Number(state.settings.groupsPerBranch[b-1] || 0);
        const groupNos = [];
        for(let i=0;i<count;i++) groupNos.push(groupCursor++);
        const seeds = buildDefaultSeedOrder(groupNos);
        list.push({ branchNo:b, groupNos, seedCount:seeds.length, slotCount: groupNos.length ? nextPowerOfTwo(Math.max(2,seeds.length || 2)) : 0 });
      }
      return list;
    }


    function isPhoneViewerLayout(){
      if(!isViewerMode()) return false;
      try{
        return !!(window.matchMedia && window.matchMedia('(max-width: 920px)').matches);
      }catch(err){
        return true;
      }
    }

    function ensurePhoneViewerDefaults(){
      if(!isViewerMode()) return;
      state.ui = state.ui || {};
      if(!state.ui.mainTab || state.ui.mainTab === 'setup') state.ui.mainTab = 'roster';
      if(!state.ui.controlTab) state.ui.controlTab = 'overview';
      if(isPhoneViewerLayout()){
        const allowedRosterTabs = ['register','male','female','maleRed','femaleRed','draw'];
        if(!allowedRosterTabs.includes(state.ui.playersSubtab)) state.ui.playersSubtab = 'male';
      }
    }

    function viewerPhoneSetSection(mainTab, rosterSubtab){
      state.ui = state.ui || {};
