    function importViewerDataFromPayload(payload, sourceName = '', options = {}){
      const opts = options && typeof options === 'object' ? options : {};
      const silent = !!opts.silent;
      const importSource = String(opts.source || 'viewer-import-file');
      try{
        const importedShell = extractImportedShellState(payload);
        if(!importedShell) throw new Error('File dữ liệu không đúng định dạng của 12PM CLUB.');
        const importedSavedAt = getImportedPayloadSavedAt(payload);
        const importedRedStorage = extractImportedRedScoreStorage(payload);
        shellState = normalizeShell(deepClone(importedShell));
        state = normalizeState(deepClone(shellState.workspaces[shellState.activeWorkspace]?.data || createDefaultState()));
        applyImportedRedStorageToActiveState(importedRedStorage);
        syncStoredGroupMatchCodes();
        const envelope = { savedAt: importedSavedAt, version: 6, shellState: deepClone(shellState), imported: true, sourceName: String(sourceName || '') };
        const bootSnapshot = payload?.bootSnapshot && typeof payload.bootSnapshot === 'object'
          ? payload.bootSnapshot
          : createBootSnapshot(importedSavedAt);
        const metaPayload = { savedAt: importedSavedAt, version: 6, mode: 'viewer-import-json-file', source: importSource };
        saveJsonToStorageVerified([STORAGE_MANUAL_SAVE_KEY, STORAGE_MANUAL_SAVE_BACKUP_KEY], envelope);
        saveJsonToStorageVerified([STORAGE_PERMA_MAIN_KEY, STORAGE_PERMA_MAIN_BACKUP_KEY], envelope);
        saveJsonToStorageVerified([STORAGE_BOOT_SNAPSHOT_KEY, STORAGE_BOOT_SNAPSHOT_BACKUP_KEY], bootSnapshot);
        saveJsonToStorage([STORAGE_KEY, STORAGE_KEY_BACKUP, STORAGE_KEY_SNAPSHOT], shellState);
        saveJsonToRotatingArchive(STORAGE_ARCHIVE_KEYS, shellState, 'main');
        saveJsonToStorage([RED_SCORE_POOL_STORAGE_KEY, RED_SCORE_POOL_STORAGE_BACKUP_KEY], importedRedStorage);
        saveJsonToRotatingArchive(RED_SCORE_POOL_ARCHIVE_KEYS, importedRedStorage, 'red');
        saveJsonToStorage([STORAGE_MANUAL_META_KEY, STORAGE_META_KEY], metaPayload);
        saveJsonToVault(STORAGE_VAULT_MAIN_KEY, { shellState: deepClone(shellState), savedAt: importedSavedAt, version: 6, bootSnapshot, manual: true, imported: true, sourceName: String(sourceName || ''), source: importSource });
        saveJsonToVault(STORAGE_VAULT_RED_KEY, { storage: deepClone(importedRedStorage), savedAt: importedSavedAt, version: 6, manual: true, imported: true, sourceName: String(sourceName || ''), source: importSource });
        saveJsonToVault(STORAGE_VAULT_META_KEY, metaPayload);
        latestLoadedShellMeta = { savedAt: importedSavedAt, source: importSource };
        latestManualSaveMeta = { savedAt: importedSavedAt, source: importSource };
        requestPersistentStorage();
        renderApp();
        if(!silent){
          try{
            alert('Đã nạp dữ liệu xem giải từ file ' + (sourceName || 'JSON') + '. Chế độ khán giả đã được cập nhật.');
          }catch(err){
            console.warn('importViewerDataFromPayload alert failed', err);
          }
        }
        return true;
      }catch(err){
        console.warn('importViewerDataFromPayload failed', err);
        if(!silent){
          try{ alert('Nạp dữ liệu xem giải thất bại: ' + (err && err.message ? err.message : 'Không xác định')); }catch(alertErr){ console.warn(alertErr); }
        }
        return false;
      }
    }

    async function handleViewerJsonImportInput(input){
      try{
        const file = input && input.files && input.files[0] ? input.files[0] : null;
        if(!file) return false;
        const text = await file.text();
        const payload = JSON.parse(text);
        const imported = importViewerDataFromPayload(payload, file.name || 'du_lieu_btc.json', { source:'viewer-mobile-import' });
        input.value = '';
        return imported;
      }catch(err){
        console.warn('handleViewerJsonImportInput failed', err);
        try{ alert('Đọc file JSON của BTC thất bại: ' + (err && err.message ? err.message : 'Không xác định')); }catch(alertErr){ console.warn(alertErr); }
        try{ if(input) input.value = ''; }catch(resetErr){ console.warn(resetErr); }
        return false;
      }
    }

                  <div class="viewer-readonly-note">CHẾ ĐỘ CHỈ XEM: khán giả được xem toàn bộ tab, hồ sơ vận động viên, điểm đỏ nam, điểm đỏ nữ và màn hình bốc thăm; toàn bộ nút điều khiển, lưu, reset, import/export, nhập điểm, quay bốc thăm và cập nhật dữ liệu vẫn bị khóa để bảo vệ dữ liệu gốc của BTC.</div>
                  <button class="btn secondary" onclick="setMainTab('roster')">Đi đến DS VDV</button>
                  <div class="note">${escapeHtml(localJsonAutoSaveText)}</div>
                `}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderSourceEditors(){
      return `
        <div class="sub-card">
          <div class="section-title"><h3>Chỉnh thủ công nguồn vào các vòng</h3><span class="note">Cho phép BTC chỉnh như “Nhất bảng 1 gặp Nhì bảng 2”, hoặc chỉnh các vòng sau.</span></div>
          <div class="config-editor">
            ${state.tournament.branches.map(branch => renderBranchSourceEditor(branch)).join('')}
            ${state.tournament.finals ? renderFinalSourceEditor(state.tournament.finals) : ''}
          </div>
        </div>
      `;
    }

    function branchSourceOptions(branch){
      const opts = [''];
      branch.groupNos.forEach(g => {
        const q = state.settings.groupQualifiers[g-1] || 0;
        for(let r=1;r<=q;r++) opts.push('G' + g + '-' + r);
      });
      branch.rounds.forEach(round => round.matches.forEach(match => opts.push('W:' + match.id)));
      opts.push('BYE');
      return Array.from(new Set(opts));
    }

    function finalSourceOptions(finals){
      const opts = [''];
      state.tournament.branches.forEach(branch => opts.push('BW' + branch.branchNo));
      finals.rounds.forEach(round => round.matches.forEach(match => opts.push('W:' + match.id)));
      opts.push('BYE');
      return Array.from(new Set(opts));
    }

    function renderSourceSelect(selected, options, matchId, side){
      return `<select onchange="setMatchOverride('${matchId}','${side}', this.value)">${options.map(opt => `<option value="${opt}" ${selected===opt?'selected':''}>${opt === '' ? 'Auto' : escapeHtml(sourceLabel(opt))}</option>`).join('')}</select>`;
    }

    function renderBranchSourceEditor(branch){
      const opts = branchSourceOptions(branch);
      const cards = branch.rounds.map(round => round.matches.map(match => `
        <div class="source-editor">
          <h4>${escapeHtml(branch.label)} • ${getRoundLabel(round.roundNo)} • Trận ${match.index}</h4>
          <div class="source-grid">
            ${renderSourceSelect(match.overrideA || '', opts, match.id, 'A')}
            ${renderSourceSelect(match.overrideB || '', opts, match.id, 'B')}
          </div>
          <div class="footer-note">Tự động: <strong>${escapeHtml(sourceLabel(match.baseSourceA))}</strong> vs <strong>${escapeHtml(sourceLabel(match.baseSourceB))}</strong></div>
        </div>
      `).join('')).join('');
      return `<div>${cards}</div>`;
    }

    function renderFinalSourceEditor(finals){
      const opts = finalSourceOptions(finals);
      const cards = finals.rounds.map(round => round.matches.map(match => `
        <div class="source-editor">
          <h4>Chung kết • ${getRoundLabel(round.roundNo)} • Trận ${match.index}</h4>
          <div class="source-grid">
            ${renderSourceSelect(match.overrideA || '', opts, match.id, 'A')}
            ${renderSourceSelect(match.overrideB || '', opts, match.id, 'B')}
          </div>
          <div class="footer-note">Tự động: <strong>${escapeHtml(sourceLabel(match.baseSourceA))}</strong> vs <strong>${escapeHtml(sourceLabel(match.baseSourceB))}</strong></div>
        </div>
      `).join('')).join('');
      return `<div>${cards}</div>`;
    }

    function renderRosterTab(){
      const entries = parseRosterText(state.rosterText);
      return `
        <div class="section-title"><h2>Danh sách VĐV / Đội</h2><div class="note">Dán trực tiếp từ Excel hoặc nhập từng dòng. Nếu mỗi hàng có nhiều cột, hệ thống sẽ ghép thành tên đội.</div></div>
        <div class="grid-2">
          <div class="rows">
            <div class="sub-card">
              <h3>Nhập danh sách</h3>
              <div class="field">
                <label>Dán danh sách từ Excel hoặc nhập từng dòng</label>
                <textarea onchange="handleRosterInput(this.value)">${escapeHtml(state.rosterText)}</textarea>
              </div>
              <div class="config-grid">
                <div class="field">
                  <label>Import file văn bản / CSV</label>
                  <input type="file" accept=".txt,.csv,.tsv" onchange="importRosterFile(this)">
                </div>
              </div>
              <div class="toolbar">
                <button class="btn primary" onclick="applyRosterToTournament()">Áp dụng vào giải hiện tại</button>
                <button class="btn secondary" onclick="setMainTab('setup')">Quay lại Thiết lập</button>
              </div>
              <div class="footer-note">Tổng dòng hợp lệ hiện tại: <strong>${entries.length}</strong> • Tổng slot theo thiết lập: <strong>${totalConfiguredTeams()}</strong></div>
            </div>
          </div>
          <div class="rows">
            <div class="sub-card">
              <h3>Xem trước phân bổ theo bảng</h3>
              ${renderRosterPreview(entries)}
            </div>
          </div>
        </div>
      `;
    }

    function renderRosterPreview(entries){
      const totalSlots = totalConfiguredTeams();
      let cursor = 0;
      const html = [];
      for(let g=1; g<=state.settings.groupCount; g++){
        const size = state.settings.groupSizes[g-1] || 0;
        html.push(`<div class="assign-item"><strong>${escapeHtml(getGroupName(g))}</strong><div class="tiny">STT ${cursor+1} → ${cursor+size}</div><div class="tiny">${Array.from({length:size}, (_,i) => escapeHtml(entries[cursor + i] || ('Đội ' + (cursor + i + 1)))).join('<br>')}</div></div>`);
        cursor += size;
      }
      if(totalSlots === 0) return '<div class="tiny">Chưa có thiết lập bảng.</div>';
      return `<div class="assign-preview">${html.join('')}</div>`;
    }

    function renderGroupsTab(){
      if(!state.tournament) return `<div class="note">Chưa có dữ liệu giải. Hãy vào <strong>Thiết lập</strong> và bấm <strong>Tạo / Cập nhật giải</strong>.</div>`;
      const groupButtons = state.tournament.groups.map(group => `<button class="tab-btn ${state.ui.groupTab===group.no?'active':''}" onclick="setGroupTab(${group.no})">${escapeHtml(getGroupName(group.no))}</button>`).join('');
      const group = getGroupByNo(state.ui.groupTab) || state.tournament.groups[0];
      const ranking = computeGroupRanking(group);
      return `
        <div class="section-title"><h2>Bảng xích ma & xếp hạng</h2><div class="note">Dòng 1 là bảng xích ma. Dòng 2 là bảng đội/xếp hạng với cột Hạng, STT, Đội, Thắng, Thua, Điểm +, Điểm - hiển thị rộng hơn. Mã trận của từng bảng được tự sắp xếp tự động.</div></div>
        <div class="sub-tabs">${groupButtons}</div>
        ${renderSingleGroupBoard(group, ranking)}
      `;
    }

    function renderSingleGroupBoard(group, ranking){
      const orderedMatches = getOrderedGroupMatches(group);
      return `
        <div class="group-board">
          <div class="panel">
            <h3>Dòng 1 • Bảng xích ma • ${escapeHtml(getGroupName(group.no))}</h3>
            <div class="matrix-wrap">${renderMatrixTable(group, ranking)}</div>
            <div class="result-board-wrap">${renderGroupResultBoard(group)}</div>
          </div>
          <div class="group-second-row">
            <div class="panel">
              <h3>Dòng 2 • Bảng đội & xếp hạng • ${escapeHtml(getGroupName(group.no))}</h3>
              <div class="standing-wrap">
                <table class="standing-table">
                  <thead>
                    <tr><th class="rank-col">Hạng</th><th class="stt-col2">STT</th><th class="name">Đội</th><th class="stat-col">Thắng</th><th class="stat-col">Thua</th><th class="stat-col">Điểm +</th><th class="stat-col">Điểm -</th><th class="stat-col">Hiệu số</th></tr>
                  </thead>
                  <tbody>
                    ${ranking.map(row => `
                      <tr>
                        <td class="rank-col">${row.rank}</td>
                        <td class="stt-col2">${row.stt}</td>
                        <td class="name">${renderInteractiveTeamNameById(row.teamId, row.name)}</td>
                        <td class="stat-col">${row.wins}</td>
                        <td class="stat-col">${row.losses}</td>
                        <td class="stat-col">${row.pf}</td>
                        <td class="stat-col">${row.pa}</td>
                        <td class="stat-col">${row.diff > 0 ? '+' + row.diff : row.diff}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              <div class="footer-note">Xếp hạng mặc định: <strong>Thắng → Hiệu số → Điểm + → STT</strong>.</div>
            </div>
            <div class="panel">
              <h3>Lịch & nhập điểm ${escapeHtml(getGroupName(group.no))}</h3>
              <div class="match-list">
                ${orderedMatches.map(match => renderGroupMatchRow(match)).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderGroupResultBoard(group){
      const orderedMatches = getOrderedGroupMatches(group);
      return `
        <div class="result-board">
          <div class="result-board-title">Bảng kết quả trận đấu</div>
          <div class="standing-wrap">
            <table class="standing-table result-table-custom">
              <thead>
                <tr>
                  <th class="code-col">Mã trận</th>
                  <th class="team-side">Đội</th>
                  <th class="result-col">Kết quả</th>
                  <th class="team-side">Đội</th>
                </tr>
              </thead>
              <tbody>
                ${orderedMatches.map(match => {
                  const teamA = getTeamById(match.teamA);
                  const teamB = getTeamById(match.teamB);
                  const resultText = isCompleteScore(match) ? `${match.scoreA} - ${match.scoreB}` : '-';
                  return `
                    <tr>
                      <td class="code-col">${escapeHtml(getGroupMatchCode(match))}</td>
                      <td class="team-side team-side-name">${renderInteractiveTeamNameById(teamA.id, teamA.name)}</td>
                      <td class="result-col">${escapeHtml(resultText)}</td>
                      <td class="team-side team-side-name">${renderInteractiveTeamNameById(teamB.id, teamB.name)}</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderGroupMatchRow(match){
      const teamA = getTeamById(match.teamA), teamB = getTeamById(match.teamB);
      const complete = isCompleteScore(match);
      const scoreA = match.scoreA === '' ? '' : Number(match.scoreA);
      const scoreB = match.scoreB === '' ? '' : Number(match.scoreB);
      const winA = complete && scoreA > scoreB;
      const winB = complete && scoreB > scoreA;
      const matchCode = getGroupMatchCode(match);
      return `
        <div class="schedule-card">
          <div class="schedule-tags">
            <span class="badge purple">${escapeHtml(matchCode)}</span>
            <span class="badge blue">${escapeHtml(getRoundLabel(match.roundNo))}</span>
            <span class="badge ${complete ? 'green' : 'pink'}">${complete ? 'Hoàn thành' : 'Chờ nhập điểm'}</span>
          </div>
          <div class="schedule-strip ${complete ? 'complete' : ''}"><span>${complete ? 'Hoàn thành' : escapeHtml(matchCode + ' (' + (match.time || '--:--') + '; Sân ' + (match.court || '-') + ')')}</span></div>
          <div class="schedule-body">
            <div class="schedule-player ${winA ? 'winner' : ''}">
              <div class="p-main">
                <div class="schedule-name">${renderInteractiveTeamNameById(teamA.id, teamA.name)}</div>
                <div class="schedule-sub">STT #${teamA.stt}${winA ? ' • Đội thắng' : ''}</div>
              </div>
              <input class="score-input ${winA ? 'score-win' : (winB ? 'score-lose' : '')}" type="text" inputmode="numeric" pattern="[0-9]*" value="${match.scoreA}" oninput="handleScoreTyping(this)" onkeydown="maybeCommitScore(event,this)" onblur="commitGroupScore('${match.id}','A', this.value)">
            </div>
            <div class="schedule-player ${winB ? 'winner' : ''}">
              <div class="p-main">
                <div class="schedule-name">${renderInteractiveTeamNameById(teamB.id, teamB.name)}</div>
                <div class="schedule-sub">STT #${teamB.stt}${winB ? ' • Đội thắng' : ''}</div>
              </div>
              <input class="score-input ${winB ? 'score-win' : (winA ? 'score-lose' : '')}" type="text" inputmode="numeric" pattern="[0-9]*" value="${match.scoreB}" oninput="handleScoreTyping(this)" onkeydown="maybeCommitScore(event,this)" onblur="commitGroupScore('${match.id}','B', this.value)">
            </div>
          </div>
          <div class="schedule-editor">
            <div class="editor-field">
              <label>Time</label>
              <input type="time" value="${escapeHtml(match.time)}" onchange="setMatchTimeOverride('${match.id}', this.value)">
            </div>
            <div class="editor-field">
              <label>Sân</label>
              <select onchange="setMatchCourt('${match.id}', this.value)">${Array.from({length: Math.max(1, Number(state.settings.courts)||1)}, (_,i)=>`<option value="${i+1}" ${Number(match.court)===i+1?'selected':''}>Sân ${i+1}</option>`).join('')}</select>
            </div>
            <div class="editor-status">${complete ? '<span class="status-complete">Hoàn thành</span>' : '<span class="status-pending">Chờ nhập điểm</span>'}</div>
          </div>
        </div>
      `;
    }

    function renderMatrixTable(group, ranking){
      const teamIds = group.teamIds;
      const rows = teamIds.map(id => getTeamById(id));
      const statMap = new Map((ranking || computeGroupRanking(group)).map(row => [row.teamId, row]));
      return `
        <table class="matrix-table">
          <thead>
            <tr>
              <th class="stt-head">STT</th>
              <th class="team-head">Đội</th>
              ${rows.map((team, idx) => `<th class="pair-head">${idx+1}</th>`).join('')}
              <th class="stat-head">Hiệu số</th>
              <th class="stat-head">Điểm</th>
              <th class="rank-head">Xếp hạng</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((teamA, i) => {
              const stat = statMap.get(teamA.id) || {};
              const diffText = stat.diff > 0 ? '+' + stat.diff : (stat.diff ?? '');
              const pointText = stat.wins ?? '';
              const rankText = stat.rank ?? '';
              return `
              <tr>
                <td class="stt-col">${i+1}</td>
                <td class="team-col full-name">${renderInteractiveTeamNameById(teamA.id, teamA.name)}</td>
                ${rows.map((teamB, j) => i===j ? `<td class="pair-cell diag-cell"></td>` : renderMatrixCell(group, teamA.id, teamB.id)).join('')}
                <td class="stat-col-matrix">${diffText}</td>
                <td class="stat-col-matrix">${pointText}</td>
                <td class="rank-col">${rankText}</td>
              </tr>
            `}).join('')}
          </tbody>
        </table>
      `;
    }

    function renderMatrixCell(group, teamAId, teamBId){
      const match = group.matches.find(m => (m.teamA===teamAId && m.teamB===teamBId) || (m.teamA===teamBId && m.teamB===teamAId));
      if(!match) return `<td class="pair-cell"><div class="matrix-box"><div class="mx-main diff-zero">-</div></div></td>`;
      const matchCode = getGroupMatchCode(match);
      if(!isCompleteScore(match)){
        return `<td class="pair-cell"><div class="matrix-box"><div class="mx-main diff-zero">-</div><div class="mx-sub">${escapeHtml(matchCode)}</div></div></td>`;
      }
      let diff = 0;
      if(match.teamA === teamAId) diff = Number(match.scoreA) - Number(match.scoreB);
      else diff = Number(match.scoreB) - Number(match.scoreA);
      const cls = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : 'diff-zero';
      const text = diff > 0 ? '+' + diff : String(diff);
      return `<td class="pair-cell"><div class="matrix-box"><div class="mx-main ${cls}">${text}</div><div class="mx-sub">${escapeHtml(matchCode)}</div></div></td>`;
    }

    function renderControlTab(){
      if(!state.tournament) return `<div class="note">Chưa có dữ liệu giải. Hãy tạo giải ở phần Thiết lập.</div>`;
      const tabs = [['overview','Tổng giải']].concat(state.tournament.branches.map(b => ['branch-' + b.branchNo, 'Nhánh ' + b.branchNo]));
      if(state.tournament.finals) tabs.push(['final','Chung kết']);
      return `
        <div class="section-title"><h2>Điều khiển giải đấu</h2><div class="note">Mỗi nhánh một tab, cuối cùng có tab điều khiển tổng và tab Chung kết.</div></div>
        <div class="sub-tabs">${tabs.map(([id,label]) => `<button class="tab-btn ${state.ui.controlTab===id?'active':''}" onclick="setControlTab('${id}')">${label}</button>`).join('')}</div>
        ${renderControlContent()}
      `;
    }

    function renderControlContent(){
      if(state.ui.controlTab === 'overview') return renderOverviewControl();
      if(state.ui.controlTab === 'final' && state.tournament.finals) return renderKnockoutControl(state.tournament.finals, 'Chung kết');
      if(state.ui.controlTab.startsWith('branch-')){
        const branchNo = Number(state.ui.controlTab.split('-')[1]);
        const branch = getBranchByNo(branchNo);
        if(branch) return renderKnockoutControl(branch, 'Nhánh ' + branchNo);
      }
      return '<div class="note">Không có dữ liệu.</div>';
    }

    function renderOverviewControl(){
      const upcomingGroups = state.tournament.groups.map(group => ({ group, pending: group.matches.filter(m => !isCompleteScore(m)).length, done: group.matches.filter(m => isCompleteScore(m)).length }));
      const branches = state.tournament.branches.map(branch => ({ branch, pending: branch.rounds.flatMap(r => r.matches).filter(m => !getKnockoutWinner(m)).length }));
      return `
        <div class="overview-grid">
          <div class="sub-card">
            <h3>Vòng bảng</h3>
            <div class="list-scroll">
              ${upcomingGroups.map(item => `
                <div class="compact-card">
                  <h4>${escapeHtml(getGroupName(item.group.no))}</h4>
                  <p>${item.done}/${item.group.matches.length} trận hoàn thành<br>${item.pending} trận chờ nhập điểm</p>
                  <button class="btn sm secondary" onclick="setMainTab('groups'); setGroupTab(${item.group.no})">Mở ${escapeHtml(getGroupName(item.group.no))}</button>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="sub-card">
            <h3>Nhánh đấu</h3>
            <div class="list-scroll">
              ${branches.map(item => `
                <div class="compact-card">
                  <h4>Nhánh ${item.branch.branchNo}</h4>
                  <p>Bảng trong nhánh: ${item.branch.groupNos.map(no => escapeHtml(getGroupName(no))).join(', ')}<br>${item.pending} ô đang chờ kết quả / nguồn vào.</p>
                  <button class="btn sm secondary" onclick="setControlTab('branch-${item.branch.branchNo}')">Đi tới Nhánh ${item.branch.branchNo}</button>
                </div>
              `).join('')}
              ${state.tournament.finals ? `
                <div class="compact-card">
                  <h4>Chung kết</h4>
                  <p>Gồm các đội vô địch nhánh đi tiếp.</p>
                  <button class="btn sm secondary" onclick="setControlTab('final')">Đi tới Chung kết</button>
                </div>
              ` : ''}
            </div>
          </div>
          <div class="sub-card">
            <h3>Match feed nhanh</h3>
            <div class="list-scroll">
              ${renderQuickFeed()}
            </div>
          </div>
        </div>
      `;
    }

    function renderQuickFeed(){
      const all = [];
      state.tournament.groups.forEach(group => group.matches.forEach(match => all.push({ label:getGroupName(group.no), match, type:'group' })));
      state.tournament.branches.forEach(branch => branch.rounds.forEach(round => round.matches.forEach(match => all.push({ label:'Nhánh ' + branch.branchNo + ' • ' + getRoundLabel(round.roundNo), match, type:'ko' }))));
      if(state.tournament.finals) state.tournament.finals.rounds.forEach(round => round.matches.forEach(match => all.push({ label:'Chung kết • ' + getRoundLabel(round.roundNo), match, type:'ko' })));
      all.sort((a,b)=>(a.match.order||0)-(b.match.order||0));
      return all.map(item => {
        const pending = item.type === 'group' ? !isCompleteScore(item.match) : !getKnockoutWinner(item.match);
        const a = item.type === 'group' ? getTeamById(item.match.teamA) : getResolvedParticipant(item.match,'A');
        const b = item.type === 'group' ? getTeamById(item.match.teamB) : getResolvedParticipant(item.match,'B');
        return `<div class="compact-card"><h4>${escapeHtml(item.label)}</h4><p>${escapeHtml(a.name)} vs ${escapeHtml(b.name)}<br>Time ${escapeHtml(item.match.time)} • Sân ${item.match.court || '-'}<br>${pending ? '<span class="status-pending">Chờ</span>' : '<span class="status-complete">Hoàn thành</span>'}</p></div>`;
      }).join('');
    }

    function renderKnockoutControl(container, title){
      return `
        <div class="control-note">Lịch & nhập điểm hiển thị theo từng cột vòng đấu. Các ô cặp đôi thi đấu xếp cân đối, Time/Sân chỉnh ngay dưới từng trận và màu điểm tự đổi theo đội thắng thua.</div>
        <div class="columns">
          ${container.rounds.map((round, idx) => `
            <div class="round-col">
              <div class="round-pill ${idx < 2 ? 'blue' : 'pink'}">${getRoundLabel(round.roundNo)}<small>${round.matches.length} trận</small></div>
              ${round.matches.map(match => renderKnockoutMatchCard(match, title)).join('')}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderKnockoutMatchCard(match, title){
      const { a: pa, b: pb } = getMatchParticipants(match);
      const winner = getKnockoutWinner(match);
      const scoreA = match.scoreA === '' ? '' : Number(match.scoreA);
      const scoreB = match.scoreB === '' ? '' : Number(match.scoreB);
      const winA = winner && winner.teamId === pa.teamId;
      const winB = winner && winner.teamId === pb.teamId;
      return `
        <div class="match-card">
          <div class="match-card-head">
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
              <span class="badge purple">${escapeHtml(match.id)}</span>
              <span class="badge blue">${escapeHtml(title)}</span>
              <span class="badge ${winner ? 'green' : 'pink'}">${winner ? 'Hoàn thành' : 'Đang chờ'}</span>
            </div>
          </div>
          <div class="match-meta-strip ${winner ? 'complete' : ''}"><span>${escapeHtml(getMatchHeaderText(match, winner))}</span></div>
          <div class="match-card-body">
            <div class="participant ${winA ? 'winner' : ''}">
              <div>
                <div class="pname full-name">${renderInteractiveMatchSideName(match, 'A') || escapeHtml(pa.name || 'TBD')}</div>
                <div class="psub full-name">${escapeHtml(pa.subtitle || '')}${winA ? ' • Đội thắng' : ''}</div>
              </div>
              <div class="scorebox">
                <input class="${winA ? 'score-win' : (winB ? 'score-lose' : '')}" type="text" inputmode="numeric" pattern="[0-9]*" value="${match.scoreA}" oninput="handleScoreTyping(this)" onkeydown="maybeCommitScore(event,this)" onblur="commitBracketScore('${match.id}','A', this.value)">
              </div>
            </div>
            <div class="participant ${winB ? 'winner' : ''}">
              <div>
                <div class="pname full-name">${renderInteractiveMatchSideName(match, 'B') || escapeHtml(pb.name || 'TBD')}</div>
                <div class="psub full-name">${escapeHtml(pb.subtitle || '')}${winB ? ' • Đội thắng' : ''}</div>
              </div>
              <div class="scorebox">
                <input class="${winB ? 'score-win' : (winA ? 'score-lose' : '')}" type="text" inputmode="numeric" pattern="[0-9]*" value="${match.scoreB}" oninput="handleScoreTyping(this)" onkeydown="maybeCommitScore(event,this)" onblur="commitBracketScore('${match.id}','B', this.value)">
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="editor-field">
              <label>Time</label>
              <input type="time" value="${escapeHtml(match.time || '')}" onchange="setMatchTimeOverride('${match.id}', this.value)">
            </div>
            <div class="editor-field">
              <label>Sân</label>
              <select onchange="setMatchCourt('${match.id}', this.value)">${Array.from({length: Math.max(1, Number(state.settings.courts)||1)}, (_,i)=>`<option value="${i+1}" ${Number(match.court)===i+1?'selected':''}>Sân ${i+1}</option>`).join('')}</select>
            </div>
            <div class="footer-right">${winner ? '<span class="status-complete">Người thắng tự đẩy tiếp</span>' : '<span class="status-pending">Chờ nhập điểm</span>'}</div>
          </div>
        </div>
      `;
    }

    function renderParticipantBlock(match, participant, side, isWinner){
      return ``;
    }

    function renderBracketTab(){
      if(!state.tournament) return `<div class="note">Chưa có dữ liệu giải. Hãy tạo giải trước.</div>`;
      const tabs = [];
      if(state.tournament.branches.length >= 2 && state.tournament.finals) tabs.push(['overall','Sơ đồ tổng']);
      tabs.push(...state.tournament.branches.map(b => ['branch-' + b.branchNo, 'Nhánh ' + b.branchNo]));
      if(state.tournament.finals) tabs.push(['final','Chung kết']);
      const active = tabs.some(([id]) => id === state.ui.bracketTab) ? state.ui.bracketTab : tabs[0][0];
      let content = '';
      if(active === 'overall' && state.tournament.finals){
        content = renderOverallCenterBracket();
      } else if(active === 'final' && state.tournament.finals){
        content = renderBracketSvg(state.tournament.finals, 'Chung kết');
      } else {
        const branchNo = Number((active || 'branch-1').split('-')[1] || 1);
        const branch = getBranchByNo(branchNo) || state.tournament.branches[0];
        content = renderBracketSvg(branch, 'Nhánh ' + branch.branchNo);
      }
      const zoomLabel = Math.round(getBracketZoom() * 100) + '%';
      return `
        <div class="section-title"><h2>Sơ đồ</h2><div class="note">Tên giải đấu tự cập nhật từ phần Thiết lập.</div></div>
        <div class="sub-tabs">${tabs.map(([id,label]) => `<button class="tab-btn ${active===id?'active':''}" onclick="setBracketTab('${id}')">${label}</button>`).join('')}</div>
        <div class="bracket-toolbar">
          <div class="zoom-group">
            <button class="zoom-btn" onclick="zoomBracketBy(-0.1)">−</button>
            <div class="zoom-value">${zoomLabel}</div>
            <button class="zoom-btn" onclick="zoomBracketBy(0.1)">+</button>
          </div>
          <button class="save-btn" onclick="saveBracketImage()">Lưu ảnh sơ đồ</button>
        </div>
        ${content}
      `;
    }


    function renderOverallCenterBracket(){
      const branches = state.tournament.branches || [];
      const finals = state.tournament.finals;
      if(!finals || branches.length < 2) return `<div class="note">Cần từ 2 nhánh để hiển thị sơ đồ tổng.</div>`;

      const slotCount = nextPowerOfTwo(Math.max(2, branches.length));
      const half = slotCount / 2;
      const branchBoxW = 220;
      const branchBoxH = 68;
      const branchGapX = 82;
      const branchStep = 94;
      const finalBoxW = 250;
      const finalBoxH = 68;
      const finalGapX = 96;
      const leftMargin = 40;
      const rightMargin = 40;
      const leafGap = 72;
      const finalLinkGap = 110;
      const maxBranchRounds = Math.max(1, ...branches.map(b => b.rounds.length || 1));
      const branchAreaW = branchBoxW + (maxBranchRounds - 1) * (branchBoxW + branchGapX);
      const maxBranchR1 = Math.max(1, ...branches.map(b => (b.rounds[0]?.matches?.length) || 1));
      const maxBranchH = branchBoxH + (maxBranchR1 - 1) * branchStep;
      const slotGap = maxBranchH + 60;
      const totalHeight = Math.max(280, 120 + (half - 1) * slotGap + maxBranchH);
      const leftChampionX = leftMargin + branchAreaW - branchBoxW;
      const finalsSideRounds = half > 1 ? Math.log2(half) : 0;
      let finalX, rightChampionX, totalWidth, rightInnerX;
      if(finalsSideRounds > 0){
        const leftFirstFinalX = leftChampionX + branchBoxW + leafGap;
        const leftInnerX = leftFirstFinalX + (finalsSideRounds - 1) * (finalBoxW + finalGapX);
        finalX = leftInnerX + finalBoxW + finalLinkGap;
        rightInnerX = finalX + finalBoxW + finalLinkGap;
        const rightFirstFinalX = rightInnerX + (finalsSideRounds - 1) * (finalBoxW + finalGapX);
        rightChampionX = rightFirstFinalX + finalBoxW + leafGap;
        totalWidth = rightChampionX + branchAreaW + rightMargin;
      } else {
        finalX = leftChampionX + branchBoxW + 160;
        rightChampionX = finalX + finalBoxW + 160;
        rightInnerX = finalX + finalBoxW + 80;
        totalWidth = rightChampionX + branchAreaW + rightMargin;
      }

      const leftSlots = Array.from({length: half}, (_,i)=> i < branches.length ? branches[i] : null);
      const rightSlots = Array.from({length: half}, (_,i)=> (half + i) < branches.length ? branches[half + i] : null);
      const lines = [];
      const boxes = [];
      const labels = [];

      function renderByeLeaf(x, centerY, label){
        const y = centerY - branchBoxH/2;
        return {
          node: { x, y, centerY, boxW: branchBoxW },
          svg: `
            <g>
              <title>${escapeHtml(label)}</title>
              <rect x="${x}" y="${y}" rx="18" ry="18" width="${branchBoxW}" height="${branchBoxH}" fill="#0b1422" stroke="#21324b" stroke-width="1.8"></rect>
              <rect x="${x}" y="${y}" rx="18" ry="18" width="${branchBoxW}" height="28" fill="#1f2937"></rect>
              ${svgFitText(x + 12, y + 17, branchBoxW - 24, label, 12, 800, '#cbd5e1')}
              ${svgFitText(x + 12, y + 44, branchBoxW - 24, 'BYE', 16, 900, '#f8fafc')}
              ${svgFitText(x + 12, y + 60, branchBoxW - 24, 'Chờ nhánh', 11, 700, '#9db0ca')}
            </g>`
        };
      }

      function renderBranchMini(branch, side, championX, centerY){
        const rounds = branch.rounds || [];
        const roundCount = rounds.length || 1;
        const baseCount = rounds[0]?.matches?.length || 1;
        const totalH = branchBoxH + (baseCount - 1) * branchStep;
        const topY = centerY - totalH / 2;
        const pos = [];
        if(rounds.length){
          pos[0] = rounds[0].matches.map((m, i) => ({
            x: side === 'left' ? championX - (roundCount - 1) * (branchBoxW + branchGapX) : championX + (roundCount - 1) * (branchBoxW + branchGapX),
            y: topY + i * branchStep
          }));
          for(let r=1; r<rounds.length; r++){
            pos[r] = rounds[r].matches.map((m, i) => ({
              x: side === 'left' ? championX - (roundCount - 1 - r) * (branchBoxW + branchGapX) : championX + (roundCount - 1 - r) * (branchBoxW + branchGapX),
              y: (pos[r-1][i*2].y + pos[r-1][i*2 + 1].y) / 2
            }));
          }
        }
        labels.push(`<text x="${side === 'left' ? Math.max(20, pos[0][0].x) : championX}" y="${topY - 18}" font-size="17" font-weight="900" fill="#dbeafe">Nhánh ${branch.branchNo}</text>`);
        rounds.forEach((round, rIdx) => {
          round.matches.forEach((match, mIdx) => {
            const p = pos[rIdx][mIdx];
            const center = p.y + branchBoxH / 2;
            if(rIdx > 0){
              const c1 = pos[rIdx - 1][mIdx * 2];
              const c2 = pos[rIdx - 1][mIdx * 2 + 1];
              if(side === 'left'){
                const midX = p.x - 28;
                lines.push(`<line x1="${c1.x + branchBoxW}" y1="${c1.y + branchBoxH/2}" x2="${midX}" y2="${c1.y + branchBoxH/2}" stroke="#ff8a4c" stroke-width="3"/>`);
                lines.push(`<line x1="${c2.x + branchBoxW}" y1="${c2.y + branchBoxH/2}" x2="${midX}" y2="${c2.y + branchBoxH/2}" stroke="#ff8a4c" stroke-width="3"/>`);
                lines.push(`<line x1="${midX}" y1="${c1.y + branchBoxH/2}" x2="${midX}" y2="${c2.y + branchBoxH/2}" stroke="#ff8a4c" stroke-width="3"/>`);
                lines.push(`<line x1="${midX}" y1="${center}" x2="${p.x}" y2="${center}" stroke="#ff8a4c" stroke-width="3"/>`);
              } else {
                const midX = p.x + branchBoxW + 28;
                lines.push(`<line x1="${c1.x}" y1="${c1.y + branchBoxH/2}" x2="${midX}" y2="${c1.y + branchBoxH/2}" stroke="#ff8a4c" stroke-width="3"/>`);
                lines.push(`<line x1="${c2.x}" y1="${c2.y + branchBoxH/2}" x2="${midX}" y2="${c2.y + branchBoxH/2}" stroke="#ff8a4c" stroke-width="3"/>`);
                lines.push(`<line x1="${midX}" y1="${c1.y + branchBoxH/2}" x2="${midX}" y2="${c2.y + branchBoxH/2}" stroke="#ff8a4c" stroke-width="3"/>`);
                lines.push(`<line x1="${p.x + branchBoxW}" y1="${center}" x2="${midX}" y2="${center}" stroke="#ff8a4c" stroke-width="3"/>`);
              }
            }
            const { a, b } = getMatchParticipants(match);
            const w = getKnockoutWinner(match);
            const showMeta = !w;
            const winA = w && w.teamId === a.teamId;
            const winB = w && w.teamId === b.teamId;
            boxes.push(`
              <g>
                <title>${escapeHtml(a.name)} vs ${escapeHtml(b.name)}</title>
                <rect x="${p.x}" y="${p.y}" rx="18" ry="18" width="${branchBoxW}" height="${branchBoxH}" fill="#0b1422" stroke="#21324b" stroke-width="1.8"></rect>
                <rect x="${p.x}" y="${p.y}" rx="18" ry="18" width="${branchBoxW}" height="28" fill="${showMeta ? '#1b9530' : '#ff8a4c'}"></rect>
                ${svgFitText(p.x + 12, p.y + 17, branchBoxW - 24, getMatchHeaderText(match, w), 12, 900, showMeta ? '#f8fafc' : '#1b1308')}
                ${svgFitText(p.x + 12, p.y + 43, branchBoxW - 70, a.name || 'TBD', 13, 900, '#f8fafc')}
                ${svgFitText(p.x + branchBoxW - 16, p.y + 43, 22, match.scoreA === '' ? '' : match.scoreA, 18, 900, winA ? '#4ade80' : (winB ? '#ef4444' : '#e5edf8'), 'end')}
                ${svgFitText(p.x + 12, p.y + 59, branchBoxW - 70, b.name || 'TBD', 13, 900, '#f8fafc')}
                ${svgFitText(p.x + branchBoxW - 16, p.y + 59, 22, match.scoreB === '' ? '' : match.scoreB, 18, 900, winB ? '#4ade80' : (winA ? '#ef4444' : '#e5edf8'), 'end')}
              </g>`);
          });
        });
        const championPos = rounds.length ? pos[rounds.length - 1][0] : { x: championX, y: centerY - branchBoxH/2 };
        return { x: championPos.x, y: championPos.y, centerY: championPos.y + branchBoxH/2, boxW: branchBoxW };
      }

      const leftLeaves = leftSlots.map((branch, i) => {
        const centerY = 80 + maxBranchH/2 + i * slotGap;
        if(branch){
          const node = renderBranchMini(branch, 'left', leftChampionX, centerY);
          return { ...node, branchNo: branch.branchNo };
        }
        const bye = renderByeLeaf(leftChampionX, centerY, 'BYE');
        boxes.push(bye.svg);
        return { ...bye.node, branchNo: null };
      });

      const rightLeaves = rightSlots.map((branch, i) => {
        const centerY = 80 + maxBranchH/2 + i * slotGap;
        if(branch){
          const node = renderBranchMini(branch, 'right', rightChampionX, centerY);
          return { ...node, branchNo: branch.branchNo };
        }
        const bye = renderByeLeaf(rightChampionX, centerY, 'BYE');
        boxes.push(bye.svg);
        return { ...bye.node, branchNo: null };
      });

      function sideMatches(side){
        const isLeft = side === 'left';
        let nodes = (isLeft ? leftLeaves : rightLeaves).map(item => ({...item}));
        const roundsCount = Math.max(1, Math.log2(half));
        for(let lr = 0; lr < roundsCount; lr++){
          const next = [];
          const matchCount = nodes.length / 2;
          for(let i=0; i<matchCount; i++){
            const n1 = nodes[i*2], n2 = nodes[i*2+1];
            let match;
            if(lr === roundsCount - 1){
              match = finals.rounds[finals.rounds.length - 2]?.matches[isLeft ? 0 : 1];
            } else {
              const roundIdx = lr;
              match = finals.rounds[roundIdx].matches[isLeft ? i : i + matchCount];
            }
            const x = isLeft
              ? (leftChampionX + branchBoxW + leafGap + lr * (finalBoxW + finalGapX))
              : (rightChampionX - leafGap - finalBoxW - lr * (finalBoxW + finalGapX));
            const y = (n1.centerY + n2.centerY) / 2 - finalBoxH / 2;
            const centerY = y + finalBoxH / 2;
            if(isLeft){
              const midX = x - 34;
              lines.push(`<line x1="${n1.x + n1.boxW}" y1="${n1.centerY}" x2="${midX}" y2="${n1.centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
              lines.push(`<line x1="${n2.x + n2.boxW}" y1="${n2.centerY}" x2="${midX}" y2="${n2.centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
              lines.push(`<line x1="${midX}" y1="${n1.centerY}" x2="${midX}" y2="${n2.centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
              lines.push(`<line x1="${midX}" y1="${centerY}" x2="${x}" y2="${centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
            } else {
              const midX = x + finalBoxW + 34;
              lines.push(`<line x1="${n1.x}" y1="${n1.centerY}" x2="${midX}" y2="${n1.centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
              lines.push(`<line x1="${n2.x}" y1="${n2.centerY}" x2="${midX}" y2="${n2.centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
              lines.push(`<line x1="${midX}" y1="${n1.centerY}" x2="${midX}" y2="${n2.centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
              lines.push(`<line x1="${x + finalBoxW}" y1="${centerY}" x2="${midX}" y2="${centerY}" stroke="#ff8a4c" stroke-width="3"/>`);
            }
            const { a: pa, b: pb } = getMatchParticipants(match);
            const winner = getKnockoutWinner(match);
            const winA = winner && winner.teamId === pa.teamId;
            const winB = winner && winner.teamId === pb.teamId;
            boxes.push(`
              <g>
                <title>${escapeHtml(pa.name)} vs ${escapeHtml(pb.name)}</title>
                <rect x="${x}" y="${y}" rx="18" ry="18" width="${finalBoxW}" height="${finalBoxH}" fill="#0b1422" stroke="#21324b" stroke-width="1.8"></rect>
                <rect x="${x}" y="${y}" rx="18" ry="18" width="${finalBoxW}" height="28" fill="${winner ? '#ff8a4c' : '#1b9530'}"></rect>
                ${svgFitText(x + 12, y + 17, finalBoxW - 24, getMatchHeaderText(match, winner), 12, 900, winner ? '#1b1308' : '#f8fafc')}
                ${svgFitText(x + 12, y + 43, finalBoxW - 72, pa.name || 'TBD', 13, 900, '#f8fafc')}
                ${svgFitText(x + finalBoxW - 16, y + 43, 24, match.scoreA === '' ? '' : match.scoreA, 18, 900, winA ? '#4ade80' : (winB ? '#ef4444' : '#e5edf8'), 'end')}
                ${svgFitText(x + 12, y + 59, finalBoxW - 72, pb.name || 'TBD', 13, 900, '#f8fafc')}
                ${svgFitText(x + finalBoxW - 16, y + 59, 24, match.scoreB === '' ? '' : match.scoreB, 18, 900, winB ? '#4ade80' : (winA ? '#ef4444' : '#e5edf8'), 'end')}
              </g>`);
            next.push({ x, y, centerY, boxW: finalBoxW });
          }
          nodes = next;
        }
        return nodes[0];
      }

      let leftFinalNode, rightFinalNode;
      if(half === 1){
        leftFinalNode = leftLeaves[0];
        rightFinalNode = rightLeaves[0];
      } else {
        leftFinalNode = sideMatches('left');
        rightFinalNode = sideMatches('right');
      }

      const finalMatch = finals.rounds[finals.rounds.length - 1].matches[0];
      const finalY = (leftFinalNode.centerY + rightFinalNode.centerY) / 2 - finalBoxH / 2;
      const finalCenterY = finalY + finalBoxH / 2;
      lines.push(`<line x1="${leftFinalNode.x + leftFinalNode.boxW}" y1="${leftFinalNode.centerY}" x2="${finalX - 40}" y2="${leftFinalNode.centerY}" stroke="#ff8a4c" stroke-width="3.2"/>`);
      lines.push(`<line x1="${finalX - 40}" y1="${leftFinalNode.centerY}" x2="${finalX - 40}" y2="${rightFinalNode.centerY}" stroke="#ff8a4c" stroke-width="3.2"/>`);
      lines.push(`<line x1="${finalX - 40}" y1="${finalCenterY}" x2="${finalX}" y2="${finalCenterY}" stroke="#ff8a4c" stroke-width="3.2"/>`);
      lines.push(`<line x1="${rightFinalNode.x}" y1="${rightFinalNode.centerY}" x2="${finalX + finalBoxW + 40}" y2="${rightFinalNode.centerY}" stroke="#ff8a4c" stroke-width="3.2"/>`);
      lines.push(`<line x1="${finalX + finalBoxW + 40}" y1="${leftFinalNode.centerY}" x2="${finalX + finalBoxW + 40}" y2="${rightFinalNode.centerY}" stroke="#ff8a4c" stroke-width="3.2"/>`);
      lines.push(`<line x1="${finalX + finalBoxW}" y1="${finalCenterY}" x2="${finalX + finalBoxW + 40}" y2="${finalCenterY}" stroke="#ff8a4c" stroke-width="3.2"/>`);
      const fA = getDisplayParticipant(finalMatch, 'A');
      const fB = getDisplayParticipant(finalMatch, 'B');
      const fWinner = getKnockoutWinner(finalMatch);
      boxes.push(`
        <g>
          <title>${escapeHtml(fA.name)} vs ${escapeHtml(fB.name)}</title>
          <rect x="${finalX}" y="${finalY}" rx="20" ry="20" width="${finalBoxW}" height="${finalBoxH}" fill="#0b1422" stroke="#21324b" stroke-width="1.8"></rect>
          <rect x="${finalX}" y="${finalY}" rx="20" ry="20" width="${finalBoxW}" height="28" fill="${fWinner ? '#ff8a4c' : '#163761'}"></rect>
          ${svgFitText(finalX + 12, finalY + 17, finalBoxW - 24, fWinner ? 'Hoàn thành' : `${finalMatch.id} • Chung kết (${finalMatch.time || '--:--'}; Sân ${finalMatch.court || '-'})`, 12, 900, fWinner ? '#1b1308' : '#e5edf8')}
          ${svgFitText(finalX + 12, finalY + 43, finalBoxW - 72, fA.name || 'TBD', 13, 900, '#f8fafc')}
          ${svgFitText(finalX + finalBoxW - 16, finalY + 43, 24, finalMatch.scoreA === '' ? '' : finalMatch.scoreA, 18, 900, fWinner && fWinner.teamId === fA.teamId ? '#4ade80' : (fWinner ? '#ef4444' : '#e5edf8'), 'end')}
          ${svgFitText(finalX + 12, finalY + 59, finalBoxW - 72, fB.name || 'TBD', 13, 900, '#f8fafc')}
          ${svgFitText(finalX + finalBoxW - 16, finalY + 59, 24, finalMatch.scoreB === '' ? '' : finalMatch.scoreB, 18, 900, fWinner && fWinner.teamId === fB.teamId ? '#4ade80' : (fWinner ? '#ef4444' : '#e5edf8'), 'end')}
          ${fWinner ? svgFitText(finalX + finalBoxW + 58, finalCenterY, 210, `Vô địch: ${fWinner.name}`, 18, 900, '#4ade80') : ''}
        </g>`);

      return `
        <div class="bracket-title">
          <div>
            <h3 style="margin:0">${escapeHtml(state.settings.eventName)} • Sơ đồ tổng</h3>
            <div class="tiny">Tất cả các sơ đồ nhánh được gom vào cùng một sơ đồ tổng và đối đầu dần về trung tâm.</div>
          </div>
          <div class="legend">
            <span class="badge blue">Tất cả nhánh cùng một sơ đồ</span>
            
          </div>
        </div>
        <div class="bracket-stage"><div class="bracket-scale" style="transform:scale(${getBracketZoom()});"><div class="svg-panel">
          <svg width="${totalWidth}" height="${totalHeight}" viewBox="0 0 ${totalWidth} ${totalHeight}" xmlns="http://www.w3.org/2000/svg">
            ${labels.join('')}
            ${lines.join('')}
            ${boxes.join('')}
          </svg>
        </div></div></div>`;
    }

    function renderBracketSvg(container, title){
      const rounds = container.rounds;
      const boxW = 268;
      const boxH = 74;
      const gapX = 124;
      const baseStep = 132;
      const pos = [];
      const round1Count = rounds[0].matches.length;
      pos[0] = rounds[0].matches.map((m, i) => ({ x: 40, y: 40 + i * baseStep }));
      for(let r=1;r<rounds.length;r++){
        pos[r] = rounds[r].matches.map((m, i) => ({
          x: 40 + r * (boxW + gapX),
          y: (pos[r-1][i*2].y + pos[r-1][i*2 + 1].y) / 2
        }));
      }
      const width = 40 + rounds.length * (boxW + gapX) + 60;
      const height = Math.max(180, 80 + (round1Count - 1) * baseStep + boxH + 30);
      const lines = [];
      const boxes = [];
      rounds.forEach((round, rIdx) => {
        round.matches.forEach((match, mIdx) => {
          const p = pos[rIdx][mIdx];
          const centerY = p.y + boxH/2;
          if(rIdx > 0){
            const leftA = pos[rIdx-1][mIdx*2];
            const leftB = pos[rIdx-1][mIdx*2 + 1];
            const childX = leftA.x + boxW;
            const childAY = leftA.y + boxH/2;
            const childBY = leftB.y + boxH/2;
            const midX = p.x - 40;
            lines.push(`<line x1="${childX}" y1="${childAY}" x2="${midX}" y2="${childAY}" stroke="#ff8a4c" stroke-width="3" />`);

            lines.push(`<line x1="${midX}" y1="${childAY}" x2="${midX}" y2="${childBY}" stroke="#ff8a4c" stroke-width="3" />`);
            lines.push(`<line x1="${midX}" y1="${centerY}" x2="${p.x}" y2="${centerY}" stroke="#ff8a4c" stroke-width="3" />`);
          }
          const a = getDisplayParticipant(match, 'A');
          const b = getDisplayParticipant(match, 'B');
          const w = getKnockoutWinner(match);
          const showMeta = !w;
          boxes.push(`
            <g>
              <title>${escapeHtml(a.name)} vs ${escapeHtml(b.name)}</title>
              <rect x="${p.x}" y="${p.y}" rx="18" ry="18" width="${boxW}" height="${boxH}" fill="#0b1422" stroke="#21324b" stroke-width="1.8"></rect>
              <rect x="${p.x}" y="${p.y}" rx="18" ry="18" width="${boxW}" height="30" fill="${showMeta ? '#1b9530' : '#ff8a4c'}"></rect>
              ${svgFitText(p.x + 14, p.y + 18, boxW - 28, getMatchHeaderText(match, w), 12, 900, showMeta ? '#f8fafc' : '#1b1308')}
              ${svgFitText(p.x + 14, p.y + 48, boxW - 78, a.name, 13, 800, '#f8fafc')}
              ${svgFitText(p.x + boxW - 18, p.y + 48, 24, match.scoreA === '' ? '' : match.scoreA, 18, 900, w && w.teamId === a.teamId ? '#4ade80' : (w ? '#ef4444' : '#e5edf8'), 'end')}
              ${svgFitText(p.x + 14, p.y + 66, boxW - 78, b.name, 13, 800, '#f8fafc')}
              ${svgFitText(p.x + boxW - 18, p.y + 66, 24, match.scoreB === '' ? '' : match.scoreB, 18, 900, w && w.teamId === b.teamId ? '#4ade80' : (w ? '#ef4444' : '#e5edf8'), 'end')}
            </g>
          `);
        });
      });
      return `
        <div class="bracket-title">
          <div>
            <h3 style="margin:0">${escapeHtml(state.settings.eventName)} • ${escapeHtml(title)}</h3>
            <div class="tiny">Sơ đồ nhánh cập nhật trực tiếp từ Thiết lập, nguồn vào thủ công và Điều khiển giải đấu.</div>

            <span class="badge blue">Time/Sân chỉ hiện khi trận chưa xong</span>

          </div>
        </div>
        <div class="bracket-stage"><div class="bracket-scale" style="transform:scale(${getBracketZoom()});"><div class="svg-panel">
          <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
            ${rounds.map((round, idx) => `<text x="${40 + idx * (268 + 124)}" y="22" font-size="16" font-weight="800" fill="#cfe2ff">${escapeHtml(getRoundLabel(round.roundNo))}</text>`).join('')}
            ${lines.join('')}
            ${boxes.join('')}
          </svg>
        </div></div></div>
      `;
    }

    function saveBracketImage(){
      const svg = document.querySelector('#app .bracket-stage svg');
      if(!svg){
        alert('Chưa có sơ đồ để lưu ảnh.');
        return;
      }
      const rect = svg.viewBox && svg.viewBox.baseVal && svg.viewBox.baseVal.width
        ? { width: svg.viewBox.baseVal.width, height: svg.viewBox.baseVal.height }
        : { width: svg.width.baseVal.value || svg.clientWidth || 1200, height: svg.height.baseVal.value || svg.clientHeight || 800 };
      const serializer = new XMLSerializer();
      let source = serializer.serializeToString(svg);
      if(!source.includes('xmlns=')) source = source.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
      if(!source.includes('xmlns:xlink=')) source = source.replace('<svg', '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
      const svgBlob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = function(){
        const canvas = document.createElement('canvas');
        const scale = 2;
        canvas.width = Math.ceil(rect.width * scale);
        canvas.height = Math.ceil(rect.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#050b14';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0, rect.width, rect.height);
        URL.revokeObjectURL(url);
        const link = document.createElement('a');
        const safeName = (state.settings.eventName || '12PM CLUB').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'');
        link.download = `${safeName || '12PM_CLUB'}_${state.ui.bracketTab || 'so_do'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      img.onerror = function(){
        URL.revokeObjectURL(url);
        alert('Không thể lưu ảnh sơ đồ.');
      };
      img.src = url;
    }
