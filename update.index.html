    const RESERVED_SCORE_POOL_STT = new Set(['13','49','53']);

    function normalizeScorePoolRow(row){
      const cells = Array.isArray(row) ? row.slice(0, 5) : [];
      while(cells.length < 5) cells.push('');
      return cells.map(value => String(value ?? ''));
    }

    function ensureScorePoolsState(){
      if(!state.scorePools || typeof state.scorePools !== 'object') state.scorePools = {};
      const persistedRedEntry = getActiveWorkspaceRedScorePoolEntry();
      Object.keys(SCORE_POOL_META).forEach(viewKey => {
        if(isRedScorePoolView(viewKey)){
          const currentRows = Array.isArray(state.scorePools[viewKey]) ? state.scorePools[viewKey].map(normalizeScorePoolRow) : [];
          const persistedRows = Array.isArray(persistedRedEntry[viewKey]) ? persistedRedEntry[viewKey].map(normalizeScorePoolRow) : [];
          const importedRows = Array.isArray(IMPORTED_SCORE_DATA[viewKey]?.rows) ? IMPORTED_SCORE_DATA[viewKey].rows.map(normalizeScorePoolRow) : [];
          state.scorePools[viewKey] = currentRows.length ? currentRows : (persistedRows.length ? persistedRows : importedRows);
          return;
        }
        if(!Array.isArray(state.scorePools[viewKey])){
          const imported = IMPORTED_SCORE_DATA[viewKey]?.rows;
          state.scorePools[viewKey] = Array.isArray(imported) ? imported.map(normalizeScorePoolRow) : [];
        } else {
          state.scorePools[viewKey] = state.scorePools[viewKey].map(normalizeScorePoolRow);
        }
      });
      persistActiveWorkspaceRedScorePools();
    }

    function buildScorePoolFallbackRowsFromProfiles(viewKey){
      profileEnsureState();
      const targetView = String(viewKey || '');
      const targetPointType = importedPointType(targetView).toLowerCase();
      const targetIsRed = targetView === 'maleRed' || targetView === 'femaleRed';
      const targetGender = targetView.toLowerCase().includes('female') ? 'female' : (targetView.toLowerCase().includes('male') ? 'male' : '');
      const rows = Object.values(state.playerProfiles || {}).filter(profile => {
        if(!profile || !String(profile.name || '').trim()) return false;
        const pointTypeText = String(profile.pointType || '').trim().toLowerCase();
        const statusTypeText = String(profile.statusType || '').trim().toLowerCase();
        const genderBucket = getProfileGenderBucket(profile);
        if(targetGender && genderBucket && genderBucket !== targetGender) return false;
        if(pointTypeText === targetPointType) return true;
        if(targetIsRed){
          if(!statusTypeText.includes('điểm đỏ')) return false;
          if(targetGender && genderBucket) return genderBucket === targetGender;
          return true;
        }
        return false;
      }).map(profile => {
        const scoreValue = profile.currentSystemScore !== '' && profile.currentSystemScore !== null && profile.currentSystemScore !== undefined
          ? profile.currentSystemScore
          : (profile.newScoreAfterLastEvent !== '' && profile.newScoreAfterLastEvent !== null && profile.newScoreAfterLastEvent !== undefined
              ? profile.newScoreAfterLastEvent
              : profile.oldScoreAtStart);
        return normalizeScorePoolRow([
          String(profile.stt || ''),
          String(profile.name || ''),
          String(profile.club || ''),
          profileFormatStorageScore(scoreValue),
          String(profile.phone || '')
        ]);
      });
      rows.sort((a, b) => {
        const aRaw = String(a[0] || '').trim();
        const bRaw = String(b[0] || '').trim();
        const aNum = /^\d+$/.test(aRaw) ? Number(aRaw) : Number.MAX_SAFE_INTEGER;
        const bNum = /^\d+$/.test(bRaw) ? Number(bRaw) : Number.MAX_SAFE_INTEGER;
        if(aNum !== bNum) return aNum - bNum;
        return String(a[1] || '').localeCompare(String(b[1] || ''), 'vi');
      });
      return rows;
    }

    function getScorePoolDataset(viewKey){
      ensureScorePoolsState();
      const key = String(viewKey || '');
      const meta = SCORE_POOL_META[key] || { title:'Dữ liệu', headers:['STT','TÊN VDV','CÂU LẠC BỘ','Điểm trình','SDT'] };
      let rows = Array.isArray(state.scorePools?.[key]) ? state.scorePools[key].map(normalizeScorePoolRow) : [];
      if(!rows.length){
        try{
          const redEntry = getActiveWorkspaceRedScorePoolEntry();
          const storedRows = Array.isArray(redEntry?.[key]) ? redEntry[key].map(normalizeScorePoolRow) : [];
          if(storedRows.length){
            rows = storedRows;
            state.scorePools[key] = storedRows.map(normalizeScorePoolRow);
          }
        }catch(err){
          console.warn('getScorePoolDataset red storage fallback failed', err);
        }
      }
      if(!rows.length){
        const fallbackRows = buildScorePoolFallbackRowsFromProfiles(key);
        if(fallbackRows.length){
          rows = fallbackRows;
          state.scorePools[key] = fallbackRows.map(normalizeScorePoolRow);
        }
      }
      return { title: meta.title, headers: meta.headers, rows };
    }

    function scorePoolTargetViewFromRed(viewKey){
      if(viewKey === 'maleRed') return 'male';
      if(viewKey === 'femaleRed') return 'female';
      return '';
    }

    function scorePoolIdentityText(row){
      const cells = normalizeScorePoolRow(row);
      const name = profileSlug(cells[1] || '');
      const phone = String(cells[4] || '').replace(/\D+/g, '');
      const stt = String(cells[0] || '').trim();
      return [name, phone, stt].filter(Boolean).join('|');
    }

    function collectUsedScorePoolSttValues(exceptViewKey='', exceptRowIndex=-1){
      ensureScorePoolsState();
      const used = new Set();
      Object.keys(SCORE_POOL_META).forEach(viewKey => {
        const rows = Array.isArray(state.scorePools?.[viewKey]) ? state.scorePools[viewKey] : [];
        rows.forEach((row, rowIndex) => {
          if(viewKey === exceptViewKey && Number(rowIndex) === Number(exceptRowIndex)) return;
          const stt = String(normalizeScorePoolRow(row)[0] || '').trim();
          if(stt) used.add(stt);
        });
      });
      return used;
    }

    function isReservedScorePoolStt(value){
      return RESERVED_SCORE_POOL_STT.has(String(value ?? '').trim());
    }

    function shouldSkipScorePoolStt(value, options={}){
      const raw = String(value ?? '').trim();
      if(!raw) return true;
      if(options && options.avoidReserved && isReservedScorePoolStt(raw)) return true;
      if(options && Array.isArray(options.avoidEndingDigits) && /^\d+$/.test(raw)){
        const lastDigit = raw.slice(-1);
        if(options.avoidEndingDigits.map(item => String(item)).includes(lastDigit)) return true;
      }
      return false;
    }

    function getNextAvailableScorePoolStt(exceptViewKey='', exceptRowIndex=-1, preferredStart=1, options={}){
      const used = collectUsedScorePoolSttValues(exceptViewKey, exceptRowIndex);
      let cursor = Math.max(1, Math.floor(Number(preferredStart) || 1));
      while(used.has(String(cursor)) || shouldSkipScorePoolStt(cursor, options)) cursor += 1;
      return String(cursor);
    }

    function getRandomAvailableScorePoolStt(exceptViewKey='', exceptRowIndex=-1, options={}){
      const used = collectUsedScorePoolSttValues(exceptViewKey, exceptRowIndex);
      const numericUsed = Array.from(used)
        .map(value => String(value || '').trim())
        .filter(value => /^\d+$/.test(value))
        .map(value => Number(value));
      const maxUsed = numericUsed.length ? Math.max(...numericUsed) : 0;
      const upperBound = Math.max(maxUsed + 240, 300);
      const candidates = [];
      for(let cursor = 1; cursor <= upperBound; cursor += 1){
        if(used.has(String(cursor))) continue;
        if(shouldSkipScorePoolStt(cursor, options)) continue;
        candidates.push(String(cursor));
      }
      if(candidates.length){
        const pickIndex = Math.floor(Math.random() * candidates.length);
        return candidates[pickIndex];
      }
      return getNextAvailableScorePoolStt(exceptViewKey, exceptRowIndex, upperBound + 1, options);
    }

    function ensureUniqueScorePoolStt(value, viewKey='', rowIndex=-1){
      const raw = String(value ?? '').trim();
      if(!raw) return '';
      const used = collectUsedScorePoolSttValues(viewKey, rowIndex);
      if(!used.has(raw)) return raw;
      const preferredStart = /^\d+$/.test(raw) ? Number(raw) : 1;
      return getNextAvailableScorePoolStt(viewKey, rowIndex, preferredStart);
    }

    function findScorePoolRowIndex(viewKey, row){
      const dataset = getScorePoolDataset(viewKey);
      const identity = scorePoolIdentityText(row);
      if(!identity) return -1;
      return dataset.rows.findIndex(item => scorePoolIdentityText(item) === identity);
    }

    function scorePoolPersonIdentityText(row){
      const cells = normalizeScorePoolRow(row);
      const name = profileSlug(cells[1] || '');
      const phone = String(cells[4] || '').replace(/\D+/g, '');
      return [name, phone].filter(Boolean).join('|');
    }

    function findScorePoolRowIndexByPerson(viewKey, row){
      const dataset = getScorePoolDataset(viewKey);
      const identity = scorePoolPersonIdentityText(row);
      if(!identity) return -1;
      return dataset.rows.findIndex(item => scorePoolPersonIdentityText(item) === identity);
    }

    function syncImportedProfileFromRow(viewKey, rowIndex){
      profileEnsureState();
      ensureScorePoolsState();
      const row = getImportedRow(viewKey, rowIndex);
      if(!row) return null;
      const pointType = importedPointType(viewKey);
      const key = buildImportedProfileKey(viewKey, rowIndex);
      const profile = ensureProfileShape(state.playerProfiles[key], key);
      profile.sourceKey = key;
      profile.manualSource = 'imported';
      profile.stt = String(row[0] || '');
      profile.name = String(row[1] || '');
      profile.club = String(row[2] || '');
      profile.phone = String(row[4] || '');
      if(!profile.gender) profile.gender = inferGenderFromPointType(pointType);
      profile.pointType = pointType;
      profile.statusType = statusTypeFromPointType(pointType);
      const parsedScore = profileParseNumber(row[3]);
      const activeEventKey = currentProfileEventKey();
      const eventRecord = profile?.events?.[activeEventKey] || null;
      const hasLiveEventScore = !!(eventRecord && (Array.isArray(eventRecord.matches) && eventRecord.matches.length));
      if(hasLiveEventScore && profile.currentSystemScore !== '' && profile.currentSystemScore !== null && profile.currentSystemScore !== undefined && !Number.isNaN(Number(profile.currentSystemScore))){
        const liveScore = profileRound(Number(profile.currentSystemScore), 5);
        profile.currentSystemScore = liveScore;
        const liveScoreText = profileFormatStorageScore(liveScore);
        if(String(row[3] || '') !== liveScoreText) row[3] = liveScoreText;
      } else {
        profile.currentSystemScore = parsedScore === '' ? '' : parsedScore;
      }
      [String(row[1] || '').trim(), profile.name].filter(Boolean).forEach(name => {
        if(!profile.aliases.includes(name)) profile.aliases.unshift(name);
      });
      if(profile.aliases.length > 20) profile.aliases = profile.aliases.slice(0,20);
      profile.updatedAt = Date.now();
      state.playerProfiles[key] = profile;
      return profile;
    }

    function getProfileGenderBucket(profile){
      const genderText = String(profile?.gender || '').trim().toLowerCase();
      const pointTypeText = String(profile?.pointType || '').trim().toLowerCase();
      if(genderText === 'nam' || pointTypeText.includes('nam')) return 'male';
      if(genderText === 'nữ' || genderText === 'nu' || pointTypeText.includes('nữ') || pointTypeText.includes('nu')) return 'female';
      return '';
    }

    function profileFormatStorageScore(value){
      if(value === '' || value === null || value === undefined || Number.isNaN(Number(value))) return '';
      return profileFormatNumber(profileRound(Number(value), 5), 5);
    }

    function buildProfilePersonIdentity(profile){
      return scorePoolPersonIdentityText([profile?.stt || '', profile?.name || '', profile?.club || '', profile?.currentSystemScore || '', profile?.phone || '']);
    }

    function syncScorePoolScoresFromProfiles(){
      profileEnsureState();
      ensureScorePoolsState();
      const scoreByIdentity = new Map();
      Object.values(state.playerProfiles || {}).forEach(profile => {
        if(!profile) return;
        const identity = buildProfilePersonIdentity(profile);
        const parsedScore = profileParseNumber(profile.currentSystemScore);
        if(!identity || parsedScore === '') return;
        const currentEvent = profile?.events?.[currentProfileEventKey()] || null;
        const priority = currentEvent && Array.isArray(currentEvent.matches) && currentEvent.matches.length ? 2 : 1;
        const updatedAt = Number(profile.updatedAt || 0);
        const existing = scoreByIdentity.get(identity);
        if(!existing || priority > existing.priority || (priority === existing.priority && updatedAt >= existing.updatedAt)){
          scoreByIdentity.set(identity, { score: profileRound(Number(parsedScore), 5), priority, updatedAt });
        }
      });
      let changed = false;
      Object.keys(SCORE_POOL_META).forEach(viewKey => {
        const rows = Array.isArray(state.scorePools?.[viewKey]) ? state.scorePools[viewKey] : [];
        rows.forEach((row, rowIndex) => {
          const normalized = normalizeScorePoolRow(row);
          const identity = scorePoolPersonIdentityText(normalized);
          const best = identity ? scoreByIdentity.get(identity) : null;
          if(!best) return;
          const nextScoreText = profileFormatStorageScore(best.score);
          if(String(normalized[3] || '') !== nextScoreText){
            normalized[3] = nextScoreText;
            state.scorePools[viewKey][rowIndex] = normalized;
            changed = true;
          }
          const profileKey = buildImportedProfileKey(viewKey, rowIndex);
          const linkedProfile = state.playerProfiles?.[profileKey];
          if(linkedProfile){
            const linkedScore = profileParseNumber(linkedProfile.currentSystemScore);
            if(linkedScore === '' || Number(linkedScore) !== Number(best.score)){
              linkedProfile.currentSystemScore = best.score;
              linkedProfile.updatedAt = Date.now();
              changed = true;
            }
          }
        });
      });
      return changed;
    }

    function rosterPatchAddScorePoolRow(viewKey){
      ensureScorePoolsState();
      const isRedView = viewKey === 'maleRed' || viewKey === 'femaleRed';
      const nextStt = isRedView
        ? getNextAvailableScorePoolStt(viewKey, -1, 1, { avoidReserved:true, avoidEndingDigits:['3','9'] })
        : getNextAvailableScorePoolStt(viewKey);
      state.scorePools[viewKey].push([nextStt,'','','','']);
      saveState();
      renderApp();
    }

    function rosterPatchUpdateScorePoolCell(viewKey, rowIndex, cellIndex, value){
      ensureScorePoolsState();
      const dataset = state.scorePools[viewKey];
      if(!Array.isArray(dataset) || !dataset[Number(rowIndex)]) return;
      let nextValue = String(value ?? '');
      if(Number(cellIndex) === 0){
        const trimmed = nextValue.trim();
        const uniqueStt = ensureUniqueScorePoolStt(trimmed, viewKey, rowIndex);
        if(trimmed && uniqueStt !== trimmed){
          nextValue = uniqueStt;
          alert('STT bị trùng ở các tab điểm. Hệ thống đã tự đổi sang STT ' + uniqueStt + ' để không trùng lặp.');
        } else {
          nextValue = trimmed;
        }
      }
      dataset[Number(rowIndex)][Number(cellIndex)] = nextValue;
      syncImportedProfileFromRow(viewKey, rowIndex);
      saveState();
    }

    function rosterPatchOpenImportedProfile(viewKey, rowIndex){
      const profile = syncImportedProfileFromRow(viewKey, rowIndex);
      if(!profile || !String(profile.name || '').trim()){
        alert('Hãy nhập tên VĐV trước khi mở hồ sơ.');
        return;
      }
      openPlayerProfile(profile.key);
    }

    function rosterPatchTransferRedToOfficial(viewKey, rowIndex){
      const targetView = scorePoolTargetViewFromRed(viewKey);
      if(!targetView){
        alert('Chức năng này chỉ áp dụng cho tab điểm đỏ.');
        return;
      }
      ensureScorePoolsState();
      const sourceRows = state.scorePools[viewKey];
      const sourceIndex = Number(rowIndex);
      const sourceRow = normalizeScorePoolRow(getImportedRow(viewKey, sourceIndex));
      if(!sourceRow || !String(sourceRow[1] || '').trim()){
        alert('Hãy nhập tên VĐV trước khi chuyển sang điểm xé vé chính thức.');
        return;
      }
      const targetRows = state.scorePools[targetView];
      let targetIndex = findScorePoolRowIndexByPerson(targetView, sourceRow);
      const targetRow = sourceRow.slice();
      if(targetIndex < 0){
        targetRow[0] = getRandomAvailableScorePoolStt(targetView, -1, { avoidReserved:true });
        targetRows.push(targetRow);
        targetIndex = targetRows.length - 1;
      } else {
        targetRow[0] = getRandomAvailableScorePoolStt(targetView, targetIndex, { avoidReserved:true });
        targetRows[targetIndex] = targetRow;
      }
      syncImportedProfileFromRow(targetView, targetIndex);
      if(Array.isArray(sourceRows) && sourceRows[sourceIndex]){
        sourceRows.splice(sourceIndex, 1);
        rosterPatchReindexScorePoolReferencesAfterDelete(viewKey, sourceIndex);
      }
      saveState();
      renderApp();
      alert('Đã add sang tab ' + (targetView === 'male' ? 'điểm xé vé nam' : 'điểm xé vé nữ') + ' và xóa khỏi tab điểm đỏ. STT được random, không trùng và tự tránh các số 13, 49, 53.');
    }


    function rosterPatchReindexScorePoolReferencesAfterDelete(viewKey, removedIndex){
      profileEnsureState();
      const viewPrefix = 'IMP|' + String(viewKey || '') + '|';
      const nextProfiles = {};
      Object.entries(state.playerProfiles || {}).forEach(([key, profile]) => {
        if(!key.startsWith(viewPrefix)){
          nextProfiles[key] = profile;
          return;
        }
        const currentIndex = Number(key.slice(viewPrefix.length));
        if(currentIndex === Number(removedIndex)){
          if(state.ui.profileSelectedKey === key){
            state.ui.profileSelectedKey = '';
            state.ui.profileOpen = false;
            state.ui.profileEditMode = false;
          }
          return;
        }
        if(currentIndex > Number(removedIndex)){
          const nextKey = buildImportedProfileKey(viewKey, currentIndex - 1);
          const nextProfile = ensureProfileShape(profile, nextKey);
          nextProfile.key = nextKey;
          nextProfile.sourceKey = nextKey;
          nextProfiles[nextKey] = nextProfile;
          if(state.ui.profileSelectedKey === key) state.ui.profileSelectedKey = nextKey;
          return;
        }
        nextProfiles[key] = profile;
      });
      state.playerProfiles = nextProfiles;
      (state.rosterRows || []).forEach(row => {
        if(!Array.isArray(row.linkedPlayers)) return;
        row.linkedPlayers = row.linkedPlayers.filter(lp => {
          if(String(lp?.viewKey || '') !== String(viewKey || '')) return true;
          const currentIndex = Number(lp?.rowIndex);
          if(currentIndex === Number(removedIndex)) return false;
          if(currentIndex > Number(removedIndex)) lp.rowIndex = currentIndex - 1;
          return true;
        });
        row.name = row.linkedPlayers.map(item => String(item?.name || '').trim()).filter(Boolean).join(' / ');
      });
      const rows = state.scorePools?.[viewKey] || [];
      rows.forEach((_, idx) => syncImportedProfileFromRow(viewKey, idx));
      rosterPatchSyncTextFromRows(false);
      if(state.tournament) rosterPatchApplyNamesToTournament(false);
    }

    function rosterPatchDeleteScorePoolRow(viewKey, rowIndex){
      if(viewKey !== 'maleRed' && viewKey !== 'femaleRed'){
        alert('Chỉ cho phép xóa từng VĐV ở tab điểm đỏ nam / điểm đỏ nữ.');
        return;
      }
      ensureScorePoolsState();
      const dataset = state.scorePools[viewKey];
      const idx = Number(rowIndex);
      if(!Array.isArray(dataset) || !dataset[idx]) return;
      const row = normalizeScorePoolRow(dataset[idx]);
      const playerName = String(row[1] || '').trim() || ('STT ' + String(row[0] || '').trim());
      if(!confirm('Xóa VĐV "' + playerName + '" khỏi tab ' + (viewKey === 'maleRed' ? 'điểm đỏ nam' : 'điểm đỏ nữ') + '?')) return;
      dataset.splice(idx, 1);
      rosterPatchReindexScorePoolReferencesAfterDelete(viewKey, idx);
      saveState();
      renderApp();
    }

    function rosterPatchEnsureState(){
      state.ui = state.ui || {};
      if(!state.ui.playersSubtab) state.ui.playersSubtab = 'register';
      if(!state.ui.scoreSelectorView) state.ui.scoreSelectorView = 'male';
      if(state.ui.scoreSelectorSearch === undefined) state.ui.scoreSelectorSearch = '';
      if(!state.rosterRows || !Array.isArray(state.rosterRows)) state.rosterRows = [];
      if(typeof state.rosterPasteText !== 'string') state.rosterPasteText = '';
      if(!state.drawState || typeof state.drawState !== 'object') state.drawState = { text:'', remaining:[], history:[], lastDraw:'', lastAssignedSeed:0, rotation:0, isSpinning:false };
      if(typeof state.drawState.rotation !== 'number' || Number.isNaN(state.drawState.rotation)) state.drawState.rotation = 0;
      state.drawState.isSpinning = false;
      ensureScorePoolsState();
      if(!state.rosterRows.length && String(state.rosterText || '').trim()){
        state.rosterRows = rosterPatchRowsFromText(state.rosterText);
      }
      state.rosterRows = rosterPatchNormalizeRows(state.rosterRows);
      rosterPatchSyncTextFromRows(false);
    }

    function rosterPatchCreateRow(seed){
      return {
        uid: 'RR-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8),
        seed: Number(seed) || 1,
        code: '',
        name: '',
        linkedPlayers: []
      };
    }

    function rosterPatchNormalizeRows(rows){
      const list = Array.isArray(rows) ? rows.slice() : [];
      const normalized = list.map((row, idx) => {
        const next = Object.assign(rosterPatchCreateRow(idx + 1), row || {});
        next.linkedPlayers = Array.isArray(next.linkedPlayers) ? next.linkedPlayers.filter(Boolean).slice(0,2) : [];
        return next;
      }).sort((a,b)=>(Number(a.seed)||0)-(Number(b.seed)||0));
      normalized.forEach((row, idx) => {
        row.seed = idx + 1;
        if(!row.uid) row.uid = 'RR-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
        if(typeof row.code !== 'string') row.code = String(row.code || '');
        if(typeof row.name !== 'string') row.name = String(row.name || '');
      });
      return normalized;
    }

    function rosterPatchRowsFromText(text){
      const lines = String(text || '').split(/\r?\n/).map(x => x.trim()).filter(Boolean);
      const rows = [];
      lines.forEach((line, idx) => {
        const cells = line.split(/\t|;/).map(x => String(x || '').trim()).filter(Boolean);
        let seed = idx + 1;
        let code = '';
        let name = '';
        if(cells.length === 1){
          name = cells[0];
        } else if(cells.length >= 2){
          let rest = cells.slice();
          if(/^\d+$/.test(rest[0])){
            seed = Number(rest.shift()) || seed;
          }
          if(rest.length >= 2){
            code = rest.shift();
            name = rest.join(' / ');
          } else {
            name = rest.join(' / ');
          }
        }
        rows.push({ uid:'RR-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8), seed, code, name, linkedPlayers: [] });
      });
      return rosterPatchNormalizeRows(rows);
    }

    function rosterPatchSyncTextFromRows(save=true){
      state.rosterText = (state.rosterRows || [])
        .slice()
        .sort((a,b)=>a.seed-b.seed)
        .map(row => String(row.name || '').trim())
        .filter(Boolean)
        .join('\n');
      if(save) saveState();
    }

    function rosterPatchGroupForSeed(seed){
      let cursor = 0;
      for(let g=1; g<=state.settings.groupCount; g++){
        const size = Number(state.settings.groupSizes[g-1] || 0);
        if(seed <= cursor + size) return g;
        cursor += size;
      }
      return null;
    }

    function rosterPatchBranchForGroup(groupNo){
      if(!groupNo) return null;
      let cursor = 0;
      for(let b=1; b<=state.settings.branchCount; b++){
        const count = Number(state.settings.groupsPerBranch[b-1] || 0);
        if(groupNo <= cursor + count) return b;
        cursor += count;
      }
      return null;
    }

    function rosterPatchBranchLabel(seed){
      const groupNo = rosterPatchGroupForSeed(seed);
      if(!groupNo) return 'Ngoài cấu hình';
      const branchNo = rosterPatchBranchForGroup(groupNo);
      return (branchNo ? ('Nhánh ' + branchNo + ' • ') : '') + getGroupName(groupNo);
    }

    function rosterPatchOpenSelector(seed){
      rosterPatchEnsureState();
      state.ui.scoreSelectorSeed = Number(seed) || 0;
      state.ui.scoreSelectorOpen = true;
      if(!state.ui.scoreSelectorView) state.ui.scoreSelectorView = 'male';
      if(state.ui.scoreSelectorSearch === undefined) state.ui.scoreSelectorSearch = '';
      saveState();
      renderApp();
    }

    function rosterPatchCloseSelector(){
      state.ui.scoreSelectorOpen = false;
      saveState();
      renderApp();
    }

    function rosterPatchFilteredImported(viewKey){
      const dataset = getScorePoolDataset(viewKey);
      const search = String(state.ui.scoreSelectorSearch || state.ui['scoreSearch_' + viewKey] || '').trim().toLowerCase();
      return (dataset.rows || []).map((row, idx) => ({ row, idx })).filter(item => {
        if(!search) return true;
        const text = [item.row[0], item.row[1], item.row[2], item.row[3], item.row[4]].join(' ').toLowerCase();
        return text.includes(search);
      });
    }

    function rosterPatchAddImportedPlayer(viewKey, rowIndex, targetSeed){
      rosterPatchEnsureState();
      const dataset = getScorePoolDataset(viewKey);
      const row = dataset.rows?.[Number(rowIndex)];
      if(!row) return;
      let seed = Number(targetSeed) || Number(state.ui.scoreSelectorSeed) || 0;
      if(seed < 1) {
        const found = state.rosterRows.find(x => !String(x.name || '').trim() || (Array.isArray(x.linkedPlayers) && x.linkedPlayers.length < 2));
        seed = found ? found.seed : (state.rosterRows.length + 1);
      }
      while(state.rosterRows.length < seed) state.rosterRows.push(rosterPatchCreateRow(state.rosterRows.length + 1));
      let target = state.rosterRows.find(x => x.seed === seed);
      if(!target){
        target = rosterPatchCreateRow(seed);
        state.rosterRows.push(target);
        state.rosterRows = rosterPatchNormalizeRows(state.rosterRows);
        target = state.rosterRows.find(x => x.seed === seed);
      }
      target.linkedPlayers = Array.isArray(target.linkedPlayers) ? target.linkedPlayers : [];
      if(target.linkedPlayers.some(x => x.viewKey === viewKey && Number(x.rowIndex) === Number(rowIndex))) return;
      if(target.linkedPlayers.length >= 2){
        alert('Mỗi dòng đăng ký chỉ ghép tối đa 2 VĐV.');
        return;
      }
      target.linkedPlayers.push({
        viewKey,
        rowIndex: Number(rowIndex),
        stt: String(row[0] || ''),
        name: String(row[1] || ''),
        club: String(row[2] || ''),
        score: String(row[3] || ''),
        phone: String(row[4] || '')
      });
      if(!String(target.code || '').trim()) target.code = 'DS' + target.seed;
      target.name = target.linkedPlayers.map(x => x.name).filter(Boolean).join(' / ');
      state.rosterRows = rosterPatchNormalizeRows(state.rosterRows);
      rosterPatchSyncTextFromRows();
      if(state.tournament) rosterPatchApplyNamesToTournament(false);
      saveState();
      renderApp();
    }

    function rosterPatchRemoveRegisterRow(seed){
      rosterPatchEnsureState();
      if(!confirm('Xóa dòng đăng ký này?')) return;
      state.rosterRows = rosterPatchNormalizeRows((state.rosterRows || []).filter(row => row.seed !== Number(seed)));
      rosterPatchSyncTextFromRows();
      if(state.tournament) rosterPatchApplyNamesToTournament(false);
      saveState();
      renderApp();
    }

      navigator.clipboard?.writeText(text).then(()=>alert('Đã copy toàn bộ danh sách.'), ()=>alert('Không copy được tự động. Hãy thử lại trên trình duyệt cho phép clipboard.'));

    function rosterPatchApplyPaste(){
      rosterPatchEnsureState();
      const rows = rosterPatchRowsFromText(state.rosterPasteText || '');
      if(!rows.length){ alert('Chưa có dữ liệu hợp lệ để thêm.'); return; }
      const start = state.rosterRows.length;
      rows.forEach((row, idx) => {
        row.seed = start + idx + 1;
        if(!row.code) row.code = '';
      });
      state.rosterRows = rosterPatchNormalizeRows((state.rosterRows || []).concat(rows));
      state.rosterPasteText = '';
      rosterPatchSyncTextFromRows();

    function applyImportedRedStorageToActiveState(redStorage){
      ensureScorePoolsState();
      const workspaceKey = String(shellState?.activeWorkspace ?? 0);
      const currentMale = Array.isArray(state.scorePools?.maleRed) ? state.scorePools.maleRed.map(normalizeScorePoolRow) : [];
      const currentFemale = Array.isArray(state.scorePools?.femaleRed) ? state.scorePools.femaleRed.map(normalizeScorePoolRow) : [];
      const storageCandidate = redStorage && typeof redStorage === 'object' ? redStorage : null;
      if(storageCandidate){
        const entry = normalizeRedScorePoolEntry(storageCandidate[workspaceKey]);
        const nextMale = Array.isArray(entry.maleRed) ? entry.maleRed.map(normalizeScorePoolRow) : [];
        const nextFemale = Array.isArray(entry.femaleRed) ? entry.femaleRed.map(normalizeScorePoolRow) : [];
        state.scorePools.maleRed = nextMale.length ? nextMale : currentMale;
        state.scorePools.femaleRed = nextFemale.length ? nextFemale : currentFemale;
      } else {
        state.scorePools.maleRed = currentMale;
        state.scorePools.femaleRed = currentFemale;
      }
      if(!Array.isArray(state.scorePools.maleRed) || !state.scorePools.maleRed.length){
        const fallbackMale = buildScorePoolFallbackRowsFromProfiles('maleRed');
        if(fallbackMale.length) state.scorePools.maleRed = fallbackMale.map(normalizeScorePoolRow);
      }
      if(!Array.isArray(state.scorePools.femaleRed) || !state.scorePools.femaleRed.length){
        const fallbackFemale = buildScorePoolFallbackRowsFromProfiles('femaleRed');
        if(fallbackFemale.length) state.scorePools.femaleRed = fallbackFemale.map(normalizeScorePoolRow);
      }
    }

    function rosterPatchGetVisibleImportedRows(viewKey){
      const filtered = rosterPatchFilteredImported(viewKey);
      const pageSize = rosterPatchGetScorePageSize();
      const pageKey = rosterPatchGetScorePageKey(viewKey);
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      let currentPage = Math.max(1, Math.floor(Number(state.ui[pageKey]) || 1));
      if(currentPage > totalPages) currentPage = totalPages;
      state.ui[pageKey] = currentPage;
      const startIndex = (currentPage - 1) * pageSize;
      return {
        rows: filtered.slice(startIndex, startIndex + pageSize),
        total: filtered.length,
        pageSize,
        currentPage,
        totalPages,
        startIndex,
        endIndex: Math.min(startIndex + pageSize, filtered.length)
      };
    }

    function rosterPatchSetScorePage(viewKey, page){
      state.ui = state.ui || {};
      const filtered = rosterPatchFilteredImported(viewKey);
      const totalPages = Math.max(1, Math.ceil(filtered.length / rosterPatchGetScorePageSize()));
      const nextPage = Math.max(1, Math.min(totalPages, Math.floor(Number(page) || 1)));
      state.ui[rosterPatchGetScorePageKey(viewKey)] = nextPage;
      saveState();
      renderApp();
    }

    function rosterPatchParseDrawEntries(text){
      return String(text || '')
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const cells = line.split(/\t|,|;/).map(x => String(x || '').trim()).filter(Boolean);
          if(!cells.length) return '';
          if(cells.length === 1) return cells[0];
          const filtered = /^\d+$/.test(cells[0]) ? cells.slice(1) : cells;
          return filtered.join(' / ');
        })
        .filter(Boolean);
    }

    function rosterPatchGetDrawAudioContext(){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      window.__drawAudioCtx = window.__drawAudioCtx || new Ctx();
      if(window.__drawAudioCtx.state === 'suspended'){
        window.__drawAudioCtx.resume().catch(()=>{});
      }
      return window.__drawAudioCtx;
    }

    function rosterPatchPlayDrawTone(freq, duration, type, gainValue){
      const ctx = rosterPatchGetDrawAudioContext();
      if(!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const now = ctx.currentTime;
      osc.type = type || 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainValue || 0.045, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(0.03, duration || 0.08));
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + Math.max(0.05, duration || 0.08) + 0.02);
    }

    function rosterPatchPlayDrawTick(intensity){
      const value = Math.max(0.025, Math.min(0.06, 0.03 + (intensity || 0) * 0.03));
      rosterPatchPlayDrawTone(980 + Math.random() * 120, 0.05, 'triangle', value);
    }

    function rosterPatchPlayDrawWin(){
      const notes = [784, 988, 1175];
      notes.forEach((freq, idx) => setTimeout(() => rosterPatchPlayDrawTone(freq, 0.18, 'sine', 0.05), idx * 130));
    }

    function rosterPatchStopDrawSpinSound(){
      const ctx = rosterPatchGetDrawAudioContext();
      const spinAudio = window.__drawSpinAudio;
      if(!ctx || !spinAudio) return;
      const now = ctx.currentTime;
      try{ spinAudio.master.gain.cancelScheduledValues(now); }catch(e){}
      try{ spinAudio.master.gain.setValueAtTime(Math.max(0.0001, spinAudio.master.gain.value || 0.0001), now); }catch(e){}
      try{ spinAudio.master.gain.exponentialRampToValueAtTime(0.0001, now + 0.14); }catch(e){}
      (spinAudio.nodes || []).forEach((node, idx) => {
        try{ if(typeof node.stop === 'function') node.stop(now + 0.16 + idx * 0.01); }catch(e){}
        try{ if(typeof node.disconnect === 'function') setTimeout(() => { try{ node.disconnect(); }catch(err){} }, 260); }catch(e){}
      });
      setTimeout(() => {
        if(window.__drawSpinAudio === spinAudio) window.__drawSpinAudio = null;
      }, 280);
    }

    function rosterPatchStartDrawSpinSound(durationMs){
      const ctx = rosterPatchGetDrawAudioContext();
      if(!ctx) return;
      rosterPatchStopDrawSpinSound();
      const now = ctx.currentTime;
      const duration = Math.max(2.8, (durationMs || 4200) / 1000);

      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.06, now + 0.18);
      master.connect(ctx.destination);

      const lowOsc = ctx.createOscillator();
      lowOsc.type = 'sine';
      lowOsc.frequency.setValueAtTime(46, now);
      lowOsc.frequency.exponentialRampToValueAtTime(64, now + duration);
      const lowGain = ctx.createGain();
      lowGain.gain.setValueAtTime(0.012, now);
      lowOsc.connect(lowGain);
      lowGain.connect(master);

      const pulseLfo = ctx.createOscillator();
      pulseLfo.type = 'triangle';
      pulseLfo.frequency.setValueAtTime(3.1, now);
      pulseLfo.frequency.linearRampToValueAtTime(5.8, now + duration);
      const pulseAmt = ctx.createGain();
      pulseAmt.gain.setValueAtTime(0.014, now);
      pulseLfo.connect(pulseAmt);
      pulseAmt.connect(lowGain.gain);

      const tensionOsc = ctx.createOscillator();
      tensionOsc.type = 'sawtooth';
      tensionOsc.frequency.setValueAtTime(165, now);
      tensionOsc.frequency.exponentialRampToValueAtTime(315, now + duration * 0.92);
      const tensionFilter = ctx.createBiquadFilter();
      tensionFilter.type = 'lowpass';
      tensionFilter.frequency.setValueAtTime(520, now);
      tensionFilter.frequency.exponentialRampToValueAtTime(1780, now + duration);
      tensionFilter.Q.value = 2.6;
      const tensionGain = ctx.createGain();
      tensionGain.gain.setValueAtTime(0.0001, now);
      tensionGain.gain.exponentialRampToValueAtTime(0.018, now + duration * 0.22);
      tensionGain.gain.exponentialRampToValueAtTime(0.028, now + duration * 0.9);
      tensionOsc.connect(tensionFilter);
      tensionFilter.connect(tensionGain);
      tensionGain.connect(master);

      const shimmerOsc = ctx.createOscillator();
      shimmerOsc.type = 'triangle';
      shimmerOsc.frequency.setValueAtTime(760, now);
      shimmerOsc.frequency.exponentialRampToValueAtTime(1320, now + duration);
      const shimmerGain = ctx.createGain();
      shimmerGain.gain.setValueAtTime(0.0001, now);
      shimmerGain.gain.exponentialRampToValueAtTime(0.0045, now + 0.5);
      shimmerGain.gain.exponentialRampToValueAtTime(0.0105, now + duration * 0.82);
      const shimmerLfo = ctx.createOscillator();
      shimmerLfo.type = 'sine';
      shimmerLfo.frequency.setValueAtTime(6.8, now);
      shimmerLfo.frequency.linearRampToValueAtTime(9.8, now + duration);
      const shimmerAmt = ctx.createGain();
      shimmerAmt.gain.setValueAtTime(0.0038, now);
      shimmerLfo.connect(shimmerAmt);
      shimmerAmt.connect(shimmerGain.gain);
      shimmerOsc.connect(shimmerGain);
      shimmerGain.connect(master);

      [lowOsc, pulseLfo, tensionOsc, shimmerOsc, shimmerLfo].forEach(node => node.start(now));
      window.__drawSpinAudio = {
        master,
        nodes:[lowOsc, pulseLfo, tensionOsc, shimmerOsc, shimmerLfo, lowGain, pulseAmt, tensionFilter, tensionGain, shimmerGain, shimmerAmt]
      };
    }

    function rosterPatchTrimWheelLabel(text, maxLen){
      const value = String(text || '').trim();
      const limit = maxLen || 18;

    }

    function rosterPatchDrawWheelCanvas(entries){
      const canvas = document.getElementById('drawWheelCanvas');
      const wrap = document.getElementById('drawWheelWrap');
      if(!canvas || !wrap) return;
      const dpr = window.devicePixelRatio || 1;
      const box = Math.max(320, Math.min(560, (wrap.clientWidth || 560) - 34));
      canvas.width = Math.round(box * dpr);
      canvas.height = Math.round(box * dpr);
      canvas.style.width = box + 'px';
      canvas.style.height = box + 'px';
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, box, box);
      const cx = box / 2;
      const cy = box / 2;
      const radius = box / 2 - 16;
      const ringRadius = radius - 22;
      const TAU = Math.PI * 2;
      const rotation = Number(state.drawState.rotation || 0);
      canvas.style.transform = `rotate(${rotation}rad)`;

      if(!entries.length){
        ctx.beginPath();
        ctx.arc(cx, cy, ringRadius, 0, TAU);
        ctx.fillStyle = '#0f1c2e';
        ctx.fill();
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#1d3657';
        ctx.stroke();
        ctx.fillStyle = '#dbeafe';
        ctx.font = '800 24px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('CHƯA CÓ', cx, cy - 8);
        ctx.fillText('DỮ LIỆU', cx, cy + 24);
        return;
      }

      const palette = ['#1d4ed8','#7c3aed','#0f766e','#ea580c','#be123c','#0891b2','#4f46e5','#15803d','#c2410c','#9333ea','#0369a1','#b45309'];
      const count = entries.length;
      const step = TAU / count;
      const fontSize = count <= 8 ? 14 : count <= 14 ? 12 : count <= 22 ? 10 : 9;
      const textRadius = count <= 10 ? ringRadius - 70 : ringRadius - 55;

      for(let i=0;i<count;i++){
        const start = -Math.PI / 2 + step * i;
        const end = start + step;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, ringRadius, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i % palette.length];
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(255,255,255,.22)';
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + step / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffffff';
        ctx.font = `800 ${fontSize}px Segoe UI`;
        ctx.shadowColor = 'rgba(2,6,23,.35)';
        ctx.shadowBlur = 4;
        ctx.fillText(rosterPatchTrimWheelLabel(entries[i], count <= 12 ? 22 : count <= 22 ? 16 : 12), textRadius, 4);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(cx, cy, ringRadius + 8, 0, TAU);
      ctx.lineWidth = 12;
      ctx.strokeStyle = 'rgba(191,219,254,.16)';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, 44, 0, TAU);
      ctx.fillStyle = '#0f1c2e';
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(191,219,254,.22)';
      ctx.stroke();
    }

    function rosterPatchFinalizeDraw(entries, pickIndex, finalRotation){
      const picked = entries[pickIndex];
      const remaining = entries.slice();
      remaining.splice(pickIndex, 1);
      let target = state.rosterRows.find(row => !String(row.name || '').trim());
      if(!target){
        target = rosterPatchCreateRow(state.rosterRows.length + 1);
        state.rosterRows.push(target);
      }
      target.linkedPlayers = [];
      target.name = picked;
      if(!String(target.code || '').trim()) target.code = 'BD' + target.seed;
      state.rosterRows = rosterPatchNormalizeRows(state.rosterRows);
      rosterPatchSyncTextFromRows();
      if(state.tournament) rosterPatchApplyNamesToTournament(false);
      state.drawState.remaining = remaining;
      state.drawState.lastDraw = picked;
      state.drawState.lastAssignedSeed = target.seed;
      state.drawState.rotation = ((finalRotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      state.drawState.isSpinning = false;
      state.drawState.history = [{ name:picked, seed:target.seed, time:new Date().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) }].concat(state.drawState.history || []);
      saveState();
      renderApp();
      rosterPatchStopDrawSpinSound();
      rosterPatchPlayDrawWin();
      requestAnimationFrame(() => {
        rosterPatchSpawnDrawBurst();
        rosterPatchShowDrawWinnerOverlay(picked, target.seed);
      });
    }

    function rosterPatchAnimateDraw(entries, pickIndex){
      const canvas = document.getElementById('drawWheelCanvas');
      const wrap = document.getElementById('drawWheelWrap');
      const spinBtn = document.getElementById('drawSpinBtn');
      if(!canvas || !wrap){
        const step = (Math.PI * 2) / Math.max(1, entries.length);
        const finalRotation = (Math.PI * 2) * 8 - step * (pickIndex + 0.5);
        rosterPatchFinalizeDraw(entries, pickIndex, finalRotation);
        return;
      }
      if(spinBtn) spinBtn.disabled = true;
      wrap.classList.add('spinning');
      const TAU = Math.PI * 2;
      const step = TAU / Math.max(1, entries.length);
      const current = Number(state.drawState.rotation || 0);
      const currentNorm = ((current % TAU) + TAU) % TAU;
      const baseTargetNorm = ((-step * (pickIndex + 0.5)) % TAU + TAU) % TAU;
      const deltaNorm = ((baseTargetNorm - currentNorm) % TAU + TAU) % TAU;
      const extraTurns = (8 + Math.min(6, Math.ceil(entries.length / 6))) * TAU;
      const finalRotation = current + extraTurns + deltaNorm;
      const duration = 4400 + Math.min(1800, entries.length * 20);
      rosterPatchStartDrawSpinSound(duration);
      const start = performance.now();
      let lastTick = Math.floor(current / step);
      const raf = now => {
        const progress = Math.min(1, (now - start) / duration);
        const ease = 1 - Math.pow(1 - progress, 3);
        const angle = current + (finalRotation - current) * ease;
        canvas.style.transform = `rotate(${angle}rad)`;
        const tickIndex = Math.floor(angle / step);
        if(tickIndex !== lastTick){
          const intensity = 1 - progress;
          rosterPatchPlayDrawTick(intensity);
          lastTick = tickIndex;
        }
        if(progress < 1){
          window.__drawWheelRaf = requestAnimationFrame(raf);
        }else{
          canvas.style.transform = `rotate(${finalRotation}rad)`;
          wrap.classList.remove('spinning');
          rosterPatchFinalizeDraw(entries, pickIndex, finalRotation);
        }
      };
      if(window.__drawWheelRaf) cancelAnimationFrame(window.__drawWheelRaf);
      window.__drawWheelRaf = requestAnimationFrame(raf);
    }

    function profileEnsureState(){
      state.ui = state.ui || {};
      if(typeof state.ui.profileOpen !== 'boolean') state.ui.profileOpen = false;
      if(typeof state.ui.profileSelectedKey !== 'string') state.ui.profileSelectedKey = '';
      if(typeof state.ui.profileEditMode !== 'boolean') state.ui.profileEditMode = false;
      if(!state.playerProfiles || typeof state.playerProfiles !== 'object') state.playerProfiles = {};
    }

    function profileRound(value, digits=5){
      const factor = Math.pow(10, digits);
      return Math.round((Number(value) || 0) * factor) / factor;
    }

    function profileParseNumber(value){
      if(value === '' || value === null || value === undefined) return '';
      const cleaned = String(value).replace(/,/g,'.').replace(/[^0-9.\-]/g,'');
      if(cleaned === '' || cleaned === '-' || cleaned === '.') return '';
      const number = Number(cleaned);
      return Number.isFinite(number) ? number : '';
    }

    function profileFormatNumber(value, digits=3){
      if(value === '' || value === null || value === undefined || Number.isNaN(Number(value))) return '—';
      return Number(value).toFixed(digits).replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1');
    }

    function profileFormatSigned(value, digits=5){
      if(value === '' || value === null || value === undefined || Number.isNaN(Number(value))) return '0';
      const n = Number(value);
      const text = profileFormatNumber(Math.abs(n), digits);
      return (n > 0 ? '+' : (n < 0 ? '-' : '')) + text;
    }

    function profileSlug(textValue){
      return String(textValue || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g,'')
        .replace(/đ/g,'d').replace(/Đ/g,'D')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g,'-')
        .replace(/^-+|-+$/g,'') || 'vdv';
    }

    function currentProfileEventKey(){
      return 'EVT|' + profileSlug(state?.settings?.eventName || 'giai-pickleball-12pm');
    }

    function importedPointType(viewKey){
      if(viewKey === 'male') return 'Điểm Nam';
      if(viewKey === 'female') return 'Điểm Nữ';
      if(viewKey === 'maleRed') return 'Điểm Đỏ Nam';
      if(viewKey === 'femaleRed') return 'Điểm Đỏ Nữ';
      return 'Tự do';
    }

    function statusTypeFromPointType(pointType){
      const textValue = String(pointType || '').toLowerCase();
      if(textValue.includes('đỏ')) return 'điểm đỏ';
      if(textValue.includes('nam') || textValue.includes('nữ')) return 'chính thức';
      return 'tự do';
    }

    function inferGenderFromPointType(pointType){
      const textValue = String(pointType || '').toLowerCase();
      if(textValue.includes('nam')) return 'Nam';
      if(textValue.includes('nữ')) return 'Nữ';
      return '';
    }

    function buildImportedProfileKey(viewKey, rowIndex){
      return 'IMP|' + String(viewKey || '') + '|' + String(rowIndex || 0);
    }

    function getImportedRow(viewKey, rowIndex){
      const dataset = getScorePoolDataset(String(viewKey || ''));
      return dataset.rows?.[Number(rowIndex)] || null;
    }

    function ensureProfileShape(profile, key){
      const next = Object.assign({
        key,
        stt:'',
        name:'',
        club:'',
        gender:'',
        phone:'',
        pointType:'Tự do',
        currentSystemScore:'',
        oldScoreAtStart:'',
        newScoreAfterLastEvent:'',
        statusType:'tự do',
        events:{},
        aliases:[],
        manualSource:'',
        sourceKey:'',
        officialUpdated:false,
        updatedAt:Date.now()
      }, profile || {});
      if(!next.events || typeof next.events !== 'object') next.events = {};
      if(!Array.isArray(next.aliases)) next.aliases = [];
      return next;
    }

    function ensureImportedPlayerProfile(viewKey, rowIndex){
      const existing = state.playerProfiles?.[buildImportedProfileKey(viewKey, rowIndex)] || null;
      return syncImportedProfileFromRow(viewKey, rowIndex) || existing;
    }

    function ensureManualPlayerProfile(nameValue, meta={}){
      profileEnsureState();
      const cleanName = String(nameValue || '').trim();
      if(!cleanName) return null;
      const key = String(meta.profileKey || ('MAN|' + profileSlug(cleanName)));
      const profile = ensureProfileShape(state.playerProfiles[key], key);
      if(!profile.name || profile.name === '—') profile.name = cleanName;
      if(meta.stt && !profile.stt) profile.stt = String(meta.stt || '');
      if(meta.club && !profile.club) profile.club = String(meta.club || '');
      if(meta.gender && !profile.gender) profile.gender = String(meta.gender || '');
      if(meta.phone && !profile.phone) profile.phone = String(meta.phone || '');
      if(meta.pointType && (!profile.pointType || profile.pointType === 'Tự do')) profile.pointType = String(meta.pointType || '');
      if(meta.statusType && (!profile.statusType || profile.statusType === 'tự do')) profile.statusType = String(meta.statusType || '');
      if((profile.currentSystemScore === '' || profile.currentSystemScore === null || profile.currentSystemScore === undefined) && meta.currentSystemScore !== undefined){
        profile.currentSystemScore = profileParseNumber(meta.currentSystemScore);
      }
      if(!profile.pointType) profile.pointType = 'Tự do';
      if(!profile.statusType) profile.statusType = statusTypeFromPointType(profile.pointType);
      [cleanName].filter(Boolean).forEach(name => {
        if(!profile.aliases.includes(name)) profile.aliases.unshift(name);
      });
      if(profile.aliases.length > 20) profile.aliases = profile.aliases.slice(0,20);
      state.playerProfiles[key] = profile;
      return profile;
    }

    function parseRosterIndividuals(nameValue){
      const clean = String(nameValue || '').trim();
      if(!clean) return [];
      const parts = clean.split(/\s*\/\s*|\s*&\s*|\s*\+\s*/).map(item => String(item || '').trim()).filter(Boolean);
      return (parts.length ? parts : [clean]).slice(0, 2);
    }

    function getRosterRowBySeed(seed){
      rosterPatchEnsureState();
      return (state.rosterRows || []).find(row => Number(row.seed || 0) === Number(seed || 0)) || null;
    }

    function getRosterIndividuals(row){
      if(!row) return [];
      const individuals = [];
      if(Array.isArray(row.linkedPlayers) && row.linkedPlayers.length){
        row.linkedPlayers.slice(0,2).forEach((lp, idx) => {
          let profile = null;
          if(lp && lp.viewKey !== undefined && lp.rowIndex !== undefined){
            profile = ensureImportedPlayerProfile(lp.viewKey, Number(lp.rowIndex));
            if(profile) lp.profileKey = profile.key;
          }
          if(!profile) profile = ensureManualPlayerProfile(lp?.name || '', { stt: lp?.stt || row.seed, club: lp?.club || '', phone: lp?.phone || '', pointType: lp?.viewKey ? importedPointType(lp.viewKey) : 'Tự do' });
          if(profile) individuals.push({ profileKey: profile.key, name: profile.name || lp?.name || '', rowSeed: row.seed, teamSeed: row.seed, teamName: row.name || '', index: idx });
        });
      } else {
        parseRosterIndividuals(row.name).forEach((nameItem, idx) => {
          const profile = ensureManualPlayerProfile(nameItem, { stt: row.seed, pointType: 'Tự do', statusType: 'tự do' });
          if(profile) individuals.push({ profileKey: profile.key, name: profile.name || nameItem, rowSeed: row.seed, teamSeed: row.seed, teamName: row.name || '', index: idx });
        });
      }
      return individuals;
    }

    function getAllRosterIndividuals(){
      rosterPatchEnsureState();
      return (state.rosterRows || []).flatMap(row => getRosterIndividuals(row));
    }

    function getIndividualsForTeamId(teamId){
      if(!state.tournament) return [];
      const team = getTeamById(teamId);
      if(!team) return [];
      const row = getRosterRowBySeed(team.stt);
      const individuals = row ? getRosterIndividuals(row) : parseRosterIndividuals(team.name).map((nameItem, idx) => {
        const profile = ensureManualPlayerProfile(nameItem, { stt: team.stt, pointType: 'Tự do', statusType: 'tự do' });
        return profile ? { profileKey: profile.key, name: profile.name || nameItem, rowSeed: team.stt, teamSeed: team.stt, teamName: team.name || '', index: idx } : null;
      }).filter(Boolean);
      return individuals.map(item => Object.assign({}, item, { teamId: team.id, teamName: team.name || item.teamName || '' }));
    }

    function getIndividualsFromDisplayName(nameValue){
      return parseRosterIndividuals(nameValue).map((nameItem, idx) => {
        const profile = ensureManualPlayerProfile(nameItem, { pointType: 'Tự do', statusType: 'tự do' });
        return profile ? { profileKey: profile.key, name: profile.name || nameItem, teamName: nameValue || '', index: idx } : null;
      }).filter(Boolean);
    }

    function getMatchSideIndividuals(match, side){
      if(match.type === 'group'){
        const teamId = side === 'A' ? match.teamA : match.teamB;
        const team = getTeamById(teamId);
        return { teamId, teamName: team?.name || '', individuals: getIndividualsForTeamId(teamId) };
      }
      const resolved = getResolvedParticipant(match, side);
      if(resolved?.teamId) return { teamId: resolved.teamId, teamName: resolved.name || resolved.sourceName || '', individuals: getIndividualsForTeamId(resolved.teamId) };
      return { teamId:'', teamName: resolved?.name || resolved?.sourceName || '', individuals: getIndividualsFromDisplayName(resolved?.name || resolved?.sourceName || '') };
    }

    function getProfileEventRecord(profile, eventKey, eventName){
      profile.events = profile.events || {};
      if(!profile.events[eventKey]){
        profile.events[eventKey] = {
          eventKey,
          eventName,
          createdAt: Date.now(),
          startScoreSnapshot: profileParseNumber(profile.currentSystemScore) === '' ? 0 : Number(profile.currentSystemScore),
          matches: [],
          totalMatches: 0,
          wins: 0,
          losses: 0,
          totalRecent10: 0,
          achievement: '',
          bonus: 0,
          pointBeforeEvent: profileParseNumber(profile.currentSystemScore) === '' ? 0 : Number(profile.currentSystemScore),
          pointAfterEvent: '',
          finalized: false,
          officialUpdated: false
        };
      }
      const record = profile.events[eventKey];
      if(record.startScoreSnapshot === '' || record.startScoreSnapshot === null || record.startScoreSnapshot === undefined || Number.isNaN(Number(record.startScoreSnapshot))){
        record.startScoreSnapshot = profileParseNumber(profile.currentSystemScore) === '' ? 0 : Number(profile.currentSystemScore);
      }
      if(!record.eventName) record.eventName = eventName;
      return record;
    }

    function getProfileBaseScore(profile, eventKey){
      const record = profile?.events?.[eventKey];
      if(record && record.startScoreSnapshot !== '' && record.startScoreSnapshot !== null && record.startScoreSnapshot !== undefined && !Number.isNaN(Number(record.startScoreSnapshot))) return Number(record.startScoreSnapshot);
      const scoreValue = profileParseNumber(profile?.currentSystemScore);
      return scoreValue === '' ? 0 : Number(scoreValue);
    }

    const PROFILE_SCORE_MULTIPLIER = Object.freeze({ male: 2, female: 1, default: 1 }); // Khóa cứng: Nam x2, Nữ x1

    function compute12pmChange(aScore, bScore, didWin, genderBucket=''){
      const A = Number(aScore) || 0;
      const B = Number(bScore) || 0;
      const denom = A + B;
      const tValue = denom > 0 ? Math.abs(A - B) / denom : 0;
      const baseDelta = didWin ? (0.005 * tValue) : (-0.0075 * tValue);
      const normalizedBucket = String(genderBucket || '').trim().toLowerCase();
      const multiplier = PROFILE_SCORE_MULTIPLIER[normalizedBucket] ?? PROFILE_SCORE_MULTIPLIER.default;
      const delta = baseDelta * multiplier;
      return { tValue: profileRound(tValue, 5), delta: profileRound(delta, 5) };
    }

    function getAverageOpponentScore(individuals, eventKey){
      const scores = (Array.isArray(individuals) ? individuals : []).map(item => {
        const profile = state.playerProfiles?.[item.profileKey];
        return profile ? getProfileBaseScore(profile, eventKey) : 0;
      }).filter(value => Number.isFinite(Number(value)));
      if(!scores.length) return 0;
      return scores.reduce((sum, value) => sum + Number(value || 0), 0) / scores.length;
    }

    function getTournamentContexts(){
      const items = [];
      if(!state.tournament) return items;
      state.tournament.groups.forEach(group => {
        group.matches.forEach(match => {
          items.push({ match, matchOrder: Number(match.order || 0), groupNo: group.no, groupLabel: getGroupName(group.no), branchLabel: '', stageLabel: getGroupName(group.no) + ' • Vòng ' + match.roundNo, matchCode: getGroupMatchCode(match) || match.id || '' });
        });
      });
      state.tournament.branches.forEach(branch => {
        branch.rounds.forEach(round => {
          round.matches.forEach(match => {
            items.push({ match, matchOrder: Number(match.order || 0), groupNo: 0, groupLabel: '', branchLabel: 'Nhánh ' + branch.branchNo, stageLabel: 'Nhánh ' + branch.branchNo + ' • Vòng ' + round.roundNo, matchCode: match.id || '' });
          });
        });
      });
      if(state.tournament.finals){
        state.tournament.finals.rounds.forEach(round => {
          round.matches.forEach(match => {
            items.push({ match, matchOrder: Number(match.order || 0), groupNo: 0, groupLabel: '', branchLabel: 'Sơ đồ tổng', stageLabel: 'Sơ đồ tổng • Vòng ' + round.roundNo, matchCode: match.id || '' });
          });
        });
      }
      return items.sort((a,b) => a.matchOrder - b.matchOrder || String(a.match.id || '').localeCompare(String(b.match.id || '')));
    }

    function buildProfileEntriesForMatch(match, context, eventKey, eventName){
      if(!isCompleteScore(match)) return [];
      const scoreA = Number(match.scoreA || 0);
      const scoreB = Number(match.scoreB || 0);
      const sideA = getMatchSideIndividuals(match, 'A');
      const sideB = getMatchSideIndividuals(match, 'B');
      if(!sideA.individuals.length || !sideB.individuals.length) return [];
      const oppAvgA = getAverageOpponentScore(sideB.individuals, eventKey);
      const oppAvgB = getAverageOpponentScore(sideA.individuals, eventKey);
      const entries = [];
      const updatedAtLabel = new Date().toLocaleString('vi-VN');
      sideA.individuals.forEach(item => {
        const profile = state.playerProfiles?.[item.profileKey];
        if(!profile) return;
        const baseScore = getProfileBaseScore(profile, eventKey);
        const calc = compute12pmChange(baseScore, oppAvgA, scoreA > scoreB, getProfileGenderBucket(profile));
        entries.push({
          profileKey: item.profileKey,
          entryKey: eventKey + '::' + match.id + '::' + item.profileKey,
          eventKey,
          eventName,
          matchId: match.id,
          matchCode: context.matchCode,
          stageLabel: context.stageLabel,
          branchLabel: context.branchLabel,
          groupLabel: context.groupLabel,
          matchOrder: context.matchOrder,
          updatedTimeLabel: updatedAtLabel,
          opponentNames: sideB.individuals.map(x => x.name).join(' / ') || sideB.teamName || 'Đối thủ',
          teammateName: sideA.individuals.filter(x => x.profileKey !== item.profileKey).map(x => x.name).join(' / '),
          scoreText: scoreA + '-' + scoreB,
          result: scoreA > scoreB ? 'Thắng' : 'Thua',
          tValue: calc.tValue,
          scoreDelta: calc.delta,
          court: match.court || '',
          time: match.time || '',
          note: match.type === 'group' ? 'Vòng bảng' : 'Knockout'
        });
      });
      sideB.individuals.forEach(item => {
        const profile = state.playerProfiles?.[item.profileKey];
        if(!profile) return;
        const baseScore = getProfileBaseScore(profile, eventKey);
        const calc = compute12pmChange(baseScore, oppAvgB, scoreB > scoreA, getProfileGenderBucket(profile));
        entries.push({
          profileKey: item.profileKey,
          entryKey: eventKey + '::' + match.id + '::' + item.profileKey,
          eventKey,
          eventName,
          matchId: match.id,
          matchCode: context.matchCode,
          stageLabel: context.stageLabel,
          branchLabel: context.branchLabel,
          groupLabel: context.groupLabel,
          matchOrder: context.matchOrder,
          updatedTimeLabel: updatedAtLabel,
          opponentNames: sideA.individuals.map(x => x.name).join(' / ') || sideA.teamName || 'Đối thủ',
          teammateName: sideB.individuals.filter(x => x.profileKey !== item.profileKey).map(x => x.name).join(' / '),
          scoreText: scoreB + '-' + scoreA,
          result: scoreB > scoreA ? 'Thắng' : 'Thua',
          tValue: calc.tValue,
          scoreDelta: calc.delta,
          court: match.court || '',
          time: match.time || '',
          note: match.type === 'group' ? 'Vòng bảng' : 'Knockout'
        });
      });
      return entries;
    }

    function profileIndividualsFromMatchSide(match, side){
      return getMatchSideIndividuals(match, side).individuals || [];
    }

    function getMatchWinnerSide(match){
      if(!isCompleteScore(match)) return '';
      return Number(match.scoreA) > Number(match.scoreB) ? 'A' : 'B';
    }

    function getMatchLoserIndividuals(match){
      const winnerSide = getMatchWinnerSide(match);
      if(!winnerSide) return [];
      return profileIndividualsFromMatchSide(match, winnerSide === 'A' ? 'B' : 'A');
    }

    function getMatchWinnerIndividuals(match){
      const winnerSide = getMatchWinnerSide(match);
      if(!winnerSide) return [];
      return profileIndividualsFromMatchSide(match, winnerSide);
    }

    function isMainTournamentFinished(){
      if(!state.tournament) return false;
      if(state.tournament.finals){
        const rounds = state.tournament.finals.rounds || [];
        const finalMatch = rounds.length ? rounds[rounds.length - 1].matches?.[0] : null;
        return !!finalMatch && isCompleteScore(finalMatch);
      }
      if(state.tournament.branches.length === 1){
        const rounds = state.tournament.branches[0].rounds || [];
        const finalMatch = rounds.length ? rounds[rounds.length - 1].matches?.[0] : null;
        return !!finalMatch && isCompleteScore(finalMatch);
      }
      return false;
    }

    function getAchievementBonus(label, genderBucket=''){
      let baseBonus = 0;
      if(label === 'Vô địch') baseBonus = 0.010;
      else if(label === 'Giải nhì') baseBonus = 0.005;
      else if(label === 'Giải ba') baseBonus = 0;
      const normalizedBucket = String(genderBucket || '').trim().toLowerCase();
      const multiplier = PROFILE_SCORE_MULTIPLIER[normalizedBucket] ?? PROFILE_SCORE_MULTIPLIER.default;
      return profileRound(baseBonus * multiplier, 5);
    }

    function getProfileAchievementHighlightType(label){
      if(label === 'Vô địch') return 'champion';
      if(label === 'Giải nhì') return 'runnerup';
      return '';
    }

    function renderProfileAchievementTag(label){
      const safeLabel = escapeHtml(label || 'Chưa chốt');
      const highlightType = getProfileAchievementHighlightType(label);
      const extraClass = highlightType ? (' achievement-highlight achievement-' + highlightType) : '';
      return '<span class="tag' + extraClass + '">Thành tích: ' + safeLabel + '</span>';
    }

    function renderProfileAchievementDisplay(label){
      const safeLabel = escapeHtml(label || 'Chưa chốt');
      const highlightType = getProfileAchievementHighlightType(label);
      if(!highlightType) return safeLabel;
      return '<span class="profile-achievement-spotlight ' + highlightType + '">' + safeLabel + '</span>';
    }

    function buildTournamentPlacementMap(){
      const map = {};
      if(!state.tournament) return map;
      let finalRounds = null;
      if(state.tournament.finals){
        finalRounds = state.tournament.finals.rounds || [];
      } else if(state.tournament.branches.length === 1){
        finalRounds = state.tournament.branches[0].rounds || [];
      }
      if(!finalRounds || !finalRounds.length) return map;
      const finalMatch = finalRounds[finalRounds.length - 1]?.matches?.[0];
      if(finalMatch && isCompleteScore(finalMatch)){
        getMatchWinnerIndividuals(finalMatch).forEach(item => { map[item.profileKey] = 'Vô địch'; });
        getMatchLoserIndividuals(finalMatch).forEach(item => { map[item.profileKey] = 'Giải nhì'; });
      }
      if(finalRounds.length >= 2){
        finalRounds[finalRounds.length - 2].matches.forEach(match => {
          if(!isCompleteScore(match)) return;
          getMatchLoserIndividuals(match).forEach(item => {
            if(!map[item.profileKey]) map[item.profileKey] = 'Giải ba';
          });
        });
      }
      return map;
    }

    function syncPlayerProfilesFromCurrentContext(){
      profileEnsureState();
      rosterPatchEnsureState();
      const before = JSON.stringify(state.playerProfiles || {});
      getAllRosterIndividuals().forEach(item => {
        const row = getRosterRowBySeed(item.rowSeed);
        if(row && item.profileKey && state.playerProfiles[item.profileKey]){
          const profile = state.playerProfiles[item.profileKey];
          if(!profile.stt) profile.stt = String(row.seed || '');
          if(!profile.name) profile.name = item.name || '';
        }
      });
      if(state.tournament){
        const eventKey = currentProfileEventKey();
        const eventName = String(state.settings?.eventName || 'Giải Pickleball 12PM').trim() || 'Giải Pickleball 12PM';
        const entriesByProfile = {};
        getTournamentContexts().forEach(context => {
          buildProfileEntriesForMatch(context.match, context, eventKey, eventName).forEach(entry => {
            if(!entriesByProfile[entry.profileKey]) entriesByProfile[entry.profileKey] = [];
            entriesByProfile[entry.profileKey].push(entry);
          });
        });
        const placementMap = buildTournamentPlacementMap();
        const finalized = isMainTournamentFinished();
        const activeKeys = new Set(Object.keys(entriesByProfile));
        getAllRosterIndividuals().forEach(item => activeKeys.add(item.profileKey));
        activeKeys.forEach(key => {
          const profile = state.playerProfiles[key];
          if(!profile) return;
          const record = getProfileEventRecord(profile, eventKey, eventName);
          const wasUpdated = !!record.officialUpdated;
          const previousMap = new Map((record.matches || []).map(entry => [entry.entryKey, entry]));
          const nextEntries = (entriesByProfile[key] || []).sort((a,b) => a.matchOrder - b.matchOrder || String(a.matchId || '').localeCompare(String(b.matchId || ''))).map((entry, idx) => {
            const previous = previousMap.get(entry.entryKey) || {};
            const entryChanged = previous.scoreText !== entry.scoreText || previous.result !== entry.result || String(previous.opponentNames || '') !== String(entry.opponentNames || '') || Number(previous.scoreDelta || 0) !== Number(entry.scoreDelta || 0) || Number(previous.tValue || 0) !== Number(entry.tValue || 0);
            return Object.assign({}, previous, entry, {
              indexInEvent: idx + 1,
              savedAt: previous.savedAt || Date.now(),
              updatedTimeLabel: entryChanged ? entry.updatedTimeLabel : (previous.updatedTimeLabel || entry.updatedTimeLabel)
            });
          });
          record.matches = nextEntries;
          record.totalMatches = nextEntries.length;
          record.wins = nextEntries.filter(entry => entry.result === 'Thắng').length;
          record.losses = nextEntries.filter(entry => entry.result === 'Thua').length;
          const recentTen = nextEntries.slice(-10);
          record.totalRecent10 = profileRound(recentTen.reduce((sum, entry) => sum + Number(entry.scoreDelta || 0), 0), 5);
          record.achievement = placementMap[key] || '';
          record.bonus = getAchievementBonus(record.achievement, getProfileGenderBucket(profile));
          record.pointBeforeEvent = record.startScoreSnapshot;
          const liveScoreWithoutBonus = profileRound(Number(record.startScoreSnapshot || 0) + Number(record.totalRecent10 || 0), 5);
          record.pointAfterEvent = profileRound(liveScoreWithoutBonus + Number(finalized ? (record.bonus || 0) : 0), 5);
          record.finalized = finalized;
          record.officialUpdated = finalized;
          profile.oldScoreAtStart = record.startScoreSnapshot;
          profile.newScoreAfterLastEvent = record.pointAfterEvent;
          profile.lastEventKey = eventKey;
          profile.lastEventName = eventName;
          profile.lastAchievement = record.achievement;
          profile.officialUpdated = finalized;
          profile.currentSystemScore = record.pointAfterEvent;
          profile.updatedAt = Date.now();
        });
      }
      return before !== JSON.stringify(state.playerProfiles || {});
    }
