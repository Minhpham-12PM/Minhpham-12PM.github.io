      setApplySetupButtonsBusy(true);
      const scrollX = window.scrollX || 0;
      const scrollY = window.scrollY || 0;
      requestAnimationFrame(() => {
        try{
          const snapshot = snapshotTournamentState(state.tournament);
          state.tournament = buildTournament();
          rosterPatchEnsureState();
          rosterPatchApplyNamesToTournament(false);
          restoreTournamentStateFromSnapshot(state.tournament, snapshot);
          rosterPatchApplyNamesToTournament(false);
          applyManualSourceOverridesToTournament(state.tournament);
          assignSchedule(state.tournament);
          state.ui.mainTab = 'groups';
          state.ui.groupTab = 1;
          state.ui.controlTab = 'overview';
          state.ui.bracketTab = state.tournament.branches.length >= 2
            ? 'overall'
            : ('branch-' + ((state.tournament.branches[0] && state.tournament.branches[0].branchNo) || 1));
          saveState();
          renderApp();
          requestAnimationFrame(() => window.scrollTo(scrollX, scrollY));
        } finally {
          __applySetupBusy = false;
          setApplySetupButtonsBusy(false);
        }
      });
    }

    function applyRosterToTournament(){
      rosterPatchApplyRosterToTournament();
    }

    function handleRosterInput(value){
      state.rosterPasteText = value;
      saveState();
    }

    function importRosterFile(input){
      rosterPatchImportTextFile(input);
    }

    window.rosterPatchSetSubtab = rosterPatchSetSubtab;
    window.rosterPatchAddImportedPlayer = rosterPatchAddImportedPlayer;
    window.rosterPatchOpenSelector = rosterPatchOpenSelector;
    window.rosterPatchCloseSelector = rosterPatchCloseSelector;
    window.rosterPatchSetScoreSearch = rosterPatchSetScoreSearch;
    window.rosterPatchAddEmptyRow = rosterPatchAddEmptyRow;
    window.rosterPatchClearEmptyRows = rosterPatchClearEmptyRows;
    window.rosterPatchCopyList = rosterPatchCopyList;
    window.rosterPatchApplyPaste = rosterPatchApplyPaste;
    window.rosterPatchImportTextFile = rosterPatchImportTextFile;
    window.rosterPatchUpdateRowField = rosterPatchUpdateRowField;
    window.rosterPatchRemoveRegisterRow = rosterPatchRemoveRegisterRow;
    window.rosterPatchApplyRosterToTournament = rosterPatchApplyRosterToTournament;
    window.rosterPatchLoadDrawPool = rosterPatchLoadDrawPool;
    window.rosterPatchDrawSpin = rosterPatchDrawSpin;
    window.rosterPatchResetDraw = rosterPatchResetDraw;
    window.rosterPatchImportDrawFile = rosterPatchImportDrawFile;
    window.openPlayerProfile = openPlayerProfile;
    window.closePlayerProfile = closePlayerProfile;
    window.togglePlayerProfileEdit = togglePlayerProfileEdit;
    window.savePlayerProfileEdits = savePlayerProfileEdits;

    function assignScheduleIfNeeded(){
      if(state.tournament) assignSchedule(state.tournament);
      saveState();
    }

    function hardResetDisplayCache(){
      try{
        [STORAGE_KEY, STORAGE_KEY_BACKUP, STORAGE_KEY_SNAPSHOT, STORAGE_META_KEY, STORAGE_PERSIST_REQUEST_KEY, STORAGE_PERMA_MAIN_KEY, STORAGE_PERMA_MAIN_BACKUP_KEY, STORAGE_MANUAL_SAVE_KEY, STORAGE_MANUAL_SAVE_BACKUP_KEY, STORAGE_MANUAL_META_KEY, STORAGE_LOCAL_JSON_AUTO_META_KEY, STORAGE_LOCAL_JSON_AUTO_META_BACKUP_KEY, RED_SCORE_POOL_STORAGE_KEY, RED_SCORE_POOL_STORAGE_BACKUP_KEY, STORAGE_LAST_CHANCE_KEY, STORAGE_LAST_CHANCE_BACKUP_KEY, STORAGE_LAST_CHANCE_META_KEY, ACCESS_MODE_PERSIST_KEY, ...STORAGE_ARCHIVE_KEYS, ...RED_SCORE_POOL_ARCHIVE_KEYS].forEach(key => localStorage.removeItem(key));
      }catch(err){
        console.warn('hardResetDisplayCache failed', err);
      }
      shellState = normalizeShell(createShellState());
      state = normalizeState(deepClone(shellState.workspaces[shellState.activeWorkspace]?.data || createDefaultState()));
      syncStoredGroupMatchCodes();
      saveState();
      renderApp();
    }

    window.setMainTab = setMainTab;
    window.setGroupTab = setGroupTab;
    window.setControlTab = setControlTab;
    window.setBracketTab = setBracketTab;
    window.updateSetting = updateSetting;
    window.setGroupCount = setGroupCount;
    window.setBranchCount = setBranchCount;
    window.setGroupSize = setGroupSize;
    window.setGroupQualifier = setGroupQualifier;
    window.setGroupsPerBranch = setGroupsPerBranch;
    window.autoBalanceBranches = autoBalanceBranches;
    window.handleRosterInput = handleRosterInput;
    window.importRosterFile = importRosterFile;
    window.applySetup = applySetup;
    window.applyRosterToTournament = applyRosterToTournament;
    window.savePermanentSystemState = savePermanentSystemState;
    window.chooseLocalJsonAutoSaveFile = chooseLocalJsonAutoSaveFile;
    window.writeNowToLocalJsonAutoSaveFile = writeNowToLocalJsonAutoSaveFile;
    window.exportSystemDataToFile = exportSystemDataToFile;
    window.openSystemDataImportPicker = openSystemDataImportPicker;
    window.resetTournament = resetTournament;
    window.commitGroupScore = commitGroupScore;
    window.setMatchCourt = setMatchCourt;
    window.setMatchTimeOverride = setMatchTimeOverride;
    window.setMatchOverride = setMatchOverride;
    window.commitBracketScore = commitBracketScore;
    window.handleScoreTyping = handleScoreTyping;
    window.maybeCommitScore = maybeCommitScore;
    window.zoomBracketBy = zoomBracketBy;
    window.saveBracketImage = saveBracketImage;
    const runCriticalPersist = (reason = '') => {
      const why = String(reason || 'critical');
      persistFocusedField(why);
      forcePersistAll({ localJsonReason: 'critical-' + why });
      try{
        flushLocalJsonAutoSave('critical-' + why).catch(err => console.warn('critical local json save failed', err));
      }catch(err){
        console.warn('critical local json save failed', err);
      }
    };

    window.addEventListener('beforeunload', () => runCriticalPersist('beforeunload'));
    window.addEventListener('pagehide', () => runCriticalPersist('pagehide'));
    window.addEventListener('freeze', () => runCriticalPersist('freeze'));
    document.addEventListener('visibilitychange', () => {
      if(document.visibilityState !== 'visible'){
        runCriticalPersist('visibility-hidden');
        try{ flushLocalJsonAutoSave('visibility-hidden').catch(err => console.warn('visibility-hidden local json save failed', err)); }catch(err){ console.warn('visibility-hidden local json save failed', err); }
      } else queueImmediatePersist('visibility-visible');
    });
    window.addEventListener('blur', () => {
      persistFocusedField('blur');
      queueImmediatePersist('blur');
      try{ flushLocalJsonAutoSave('blur').catch(err => console.warn('blur local json save failed', err)); }catch(err){ console.warn('blur local json save failed', err); }
    });
    window.addEventListener('focus', () => queueImmediatePersist('focus'));
    window.addEventListener('online', () => queueImmediatePersist('online'));
    document.addEventListener('pointerdown', event => {
      persistFocusedField('pointerdown');
      persistLastChanceField(event.target, 'pointerdown');
    }, true);
    document.addEventListener('pointerup', event => {
      persistLastChanceField(event.target, 'pointerup');
      queueImmediatePersist('pointerup');
    }, true);
    document.addEventListener('touchstart', event => {
      persistFocusedField('touchstart');
      persistLastChanceField(event.target, 'touchstart');
    }, true);
    document.addEventListener('touchend', event => {
      persistLastChanceField(event.target, 'touchend');
      queueImmediatePersist('touchend');
    }, true);
    document.addEventListener('input', event => {
      persistLastChanceField(event.target, 'input');
      queueImmediatePersist('input');
    }, true);
    document.addEventListener('change', event => {
      persistLastChanceField(event.target, 'change');
      queueImmediatePersist('change');
    }, true);
    document.addEventListener('compositionend', event => {
      persistLastChanceField(event.target, 'compositionend');
      queueImmediatePersist('compositionend');
    }, true);
    document.addEventListener('paste', event => {
      persistLastChanceField(event.target, 'paste');
      queueImmediatePersist('paste');
    }, true);
    document.addEventListener('cut', event => {
      persistLastChanceField(event.target, 'cut');
      queueImmediatePersist('cut');
    }, true);
    document.addEventListener('drop', event => {
      persistLastChanceField(event.target, 'drop');
      queueImmediatePersist('drop');
    }, true);
    document.addEventListener('focusout', event => {
      persistLastChanceField(event.target, 'focusout');
      queueImmediatePersist('focusout');
    }, true);
    document.addEventListener('click', event => {
      persistLastChanceField(event.target, 'click');
      queueImmediatePersist('click');
    }, true);
    document.addEventListener('keyup', event => {
      persistLastChanceField(event.target, 'keyup');
      queueImmediatePersist('keyup');
    }, true);
    document.addEventListener('keydown', event => {
      persistLastChanceField(event.target, 'keydown');
      if(event.key === 'Enter' || event.key === 'Tab') queueImmediatePersist('keydown-' + event.key);
    }, true);
    document.addEventListener('submit', () => queueImmediatePersist('submit'), true);
    document.addEventListener('beforeinput', event => {
      persistLastChanceField(event.target, 'beforeinput');
      queueImmediatePersist('beforeinput');
    }, true);
    document.addEventListener('mouseup', event => {
      persistLastChanceField(event.target, 'mouseup');
      queueImmediatePersist('mouseup');
    }, true);
    window.addEventListener('mouseup', () => queueImmediatePersist('mouseup-window'), true);
    window.addEventListener('resume', () => {
      persistFocusedField('resume');
      runCriticalPersist('resume');
    });
    window.addEventListener('error', () => runCriticalPersist('error'), true);
    window.addEventListener('unhandledrejection', () => runCriticalPersist('unhandledrejection'), true);

    window.hardResetDisplayCache = hardResetDisplayCache;
    window.forcePersistAll = forcePersistAll;
    window.queueImmediatePersist = queueImmediatePersist;
    window.enterViewerMode = enterViewerMode;
    window.enterAdminMode = enterAdminMode;
    window.submitAdminAccess = submitAdminAccess;
    window.clearAccessError = clearAccessError;
    window.resetAccessChoice = resetAccessChoice;

    hydrateAccessModePersistent();
    installAccessGuards();
    requestPersistentStorage();
    hydrateUiFromBootSnapshot();
    hydrateUiFromLastChanceDraft();
    Promise.resolve()
      .then(() => hydrateLocalJsonAutoSaveHandleFromVault())
      .then(() => hydrateFromLocalJsonAutoSaveFileIfPreferred())
      .then(localJsonLoaded => localJsonLoaded ? false : hydrateFromVaultIfNewer())
      .finally(() => {
        restoreLastChanceDraftToDom(0);
        renderApp();
        queueImmediatePersist('post-hydrate-boot');
        startAutosaveHeartbeat();
      });
  </script>
</body>
</html>
